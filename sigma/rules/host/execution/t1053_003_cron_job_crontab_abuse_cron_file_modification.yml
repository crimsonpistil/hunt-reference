    analyst_notes: 'Cron is both an execution and a persistence technique; this row focuses on detecting the abuse, and it pairs with the eventual Linux persistence coverage. The detection surface is broad because cron has many homes - the master /etc/crontab, drop-in files in /etc/cron.d, the script directories (/etc/cron.hourly|daily|weekly|monthly), per-user spools (/var/spool/cron on RHEL, /var/spool/cron/crontabs on Debian), and increasingly systemd .timer units which are the modern replacement and easy to overlook. Two detection angles: file modification on any of those locations (auditd watch rules keyed for easy searching, or Sysmon for Linux EID 11), and cron-spawned children that are suspicious (cron/crond as parent of a shell, python, curl, or a /tmp payload). The content tells are the same as elsewhere - curl/wget/base64, reverse shells, payloads in writable paths - plus the cron-specific @reboot directive favored for boot persistence. The proactive play is a full cron enumeration sweep across all users and all locations including systemd timers, flagging any entry that invokes a downloader, a shell, or a writable-path binary, and any crontab belonging to a service/nologin account that shouldn''t have one. This needs auditd watch rules on the cron paths to catch reliably in real time - note that as a prerequisite. Baseline legitimate scheduled maintenance (logrotate, package-update timers, monitoring agents) before alerting.'
