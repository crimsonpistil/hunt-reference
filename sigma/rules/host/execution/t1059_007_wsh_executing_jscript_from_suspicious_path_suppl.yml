    analyst_notes: 'The detection pattern here is nearly identical to T1059.005 VBScript - same engines (wscript/cscript), same suspicious paths, same EID 11 supplementary hunt. The distinctions that matter: .js files have a user-visible double-click association on Windows (wscript runs them silently), making them effective for lure-based delivery without requiring a macro or container trick. The user sees what looks like a document icon, double-clicks, and wscript silently executes the payload. JSE (.jse) is encoded JScript using Microsoft''s Script Encoder - same tool as VBE encoding - and is a stronger signal because legitimate software rarely produces .jse files in staging directories. Gootloader is worth calling out specifically because it uses an unusual pattern: a large multi-stage .js file (often 5,000+ lines of obfuscated code) that may be staged in the registry between stages rather than purely on disk - if you see wscript running a .js with an unusually large file size or see powershell.exe reading registry values and piping to wscript, that''s a Gootloader indicator. False positives: some legitimate software installers use .js files during setup, typically from their own installation directory rather than temp paths - path context resolves most of these.'
