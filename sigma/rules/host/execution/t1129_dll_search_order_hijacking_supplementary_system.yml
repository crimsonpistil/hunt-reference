    analyst_notes: 'DLL Search Order Hijacking is the broader category that includes DLL Side-Loading - the previous indicator (side-loading) is the specific case where the adversary brings both a trusted executable and the malicious DLL together. This indicator covers the case where the adversary drops a malicious DLL with a system name into a directory that resolves earlier in the search order than System32, causing the application to load the malicious DLL by name. The detection focuses on common hijack target DLL names (version.dll, wininet.dll, dwmapi.dll, etc.) loaded from non-system paths. False positives are lower than you might expect because the search order is well-defined and legitimate applications generally don''t redistribute these system-name DLLs - if you see wininet.dll loading from C:\ProgramData\some-app\, that is almost certainly malicious. Detection complement: hijacklibs.net catalogs the most commonly-hijacked DLLs by name, which is a good starting allowlist/watchlist seed. As with side-loading, this technique is heavily associated with China-nexus APT operators - PlugX, ShadowPad, and the broader APT41/Winnti ecosystem make it signature tradecraft.'
