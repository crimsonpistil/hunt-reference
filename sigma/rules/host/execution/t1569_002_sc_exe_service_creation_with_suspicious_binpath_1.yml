    analyst_notes: 'sc.exe create is the most explicit service creation path - the full binPath is visible in the Sysmon EID 1 command line, making it straightforward to detect suspicious binary paths at creation time. System Event 7045 is the broader net: it fires regardless of whether sc.exe, PowerShell, or a compiled binary''s API call was used to create the service. 7045 is underutilized in many detection stacks - it''s in the System log rather than Security, so it sometimes gets overlooked in log collection policies. Worth verifying your SIEM is ingesting System log events, not just Security. The registry artifact is the most durable - even if the service was created and the creating process logs have rolled, the registry entry under HKLM\SYSTEM\CurrentControlSet\Services persists until the service is explicitly deleted. Services with a blank Description, blank DisplayName, and an ImagePath in a user-writable directory are a high-confidence IOC combination. Adversaries sometimes use sc.exe create with start=demand followed immediately by sc.exe start - watch for that rapid create-then-start sequence in the same session as it indicates immediate execution intent rather than persistence setup.'
