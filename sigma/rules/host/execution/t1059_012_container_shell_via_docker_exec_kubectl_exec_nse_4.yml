    analyst_notes: 'Container administration exec commands (docker exec, kubectl exec, nsenter) are legitimate DevOps tools that also serve as primary lateral movement and post-exploitation mechanisms in containerized environments. The detection challenge is distinguishing authorized administrator use from attacker use: both generate identical process artifacts. Context is the key discriminator - alert on docker exec spawning a shell (bash/sh/dash) outside of expected maintenance windows, from unexpected source IPs or users, or targeting containers that should not have interactive sessions (databases, queue workers, monitoring agents). nsenter is especially powerful for attackers on the host: it allows entering a container''s namespaces directly using the container''s PID, bypassing the container runtime entirely, and requires only root or CAP_SYS_ADMIN on the host. The most dangerous scenario for detection purposes is a privileged container: any host-side exec into a privileged container, combined with nsenter --target 1 inside it, achieves full host root access. Falco provides the best real-time detection for container-side shell spawn; the Kubernetes audit log is the authoritative source for kubectl exec events.'
