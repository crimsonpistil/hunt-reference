    analyst_notes: 'mshta.exe is one of the cleanest one-line remote code execution primitives in Windows. The detection sweet spot is the argument: legitimate mshta usage almost never involves a URL or UNC path - HTAs in legitimate enterprise software are launched from local installed paths. A URL in the mshta command line is high-fidelity malicious in virtually all environments. The inline VBScript and JScript variants (`mshta.exe vbscript:...` and `mshta.exe javascript:...`) are even cleaner indicators because they require no remote fetch - the entire payload is on the command line. Worth pairing this indicator with parent process context: mshta spawned by an Office app, browser, or explorer.exe is a phishing chain; mshta spawned by a known IT management process is more likely legitimate. The network connection pivot (EID 3 from mshta) is useful for catching the fetch portion when the URL itself has been obfuscated in the command line.'
