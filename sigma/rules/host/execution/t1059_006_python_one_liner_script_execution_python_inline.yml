    analyst_notes: 'Python is included as its own execution row because it ships by default on virtually every Linux distribution, making it a reliable interpreter for attackers who can''t count on their own tooling being present. The two highest-value patterns: python -c with socket or pty.spawn (the canonical Python reverse shell, and the standard ''upgrade to interactive TTY'' step that follows a basic shell), and python running a script from /tmp, /dev/shm, or /var/tmp (dropped tooling). The pty.spawn pattern in particular is almost never legitimate and is extremely high-fidelity. As with the shell row, a python process spawned by a network-facing service points at RCE/webshell, and a python process whose /proc/<pid>/exe shows ''(deleted)'' is running fileless. One Python-specific persistence/execution wrinkle worth knowing: sitecustomize.py and usercustomize.py are auto-imported on every interpreter start, so a planted copy outside the standard library is both execution and persistence - check for those. Telemetry is the same stack as the shell row (auditd execve, Sysmon for Linux EID 1, Falco for containers). Baseline legitimate Python automation heavily - many infra tools (Ansible, salt, cloud agents, monitoring) are Python and will generate -c and subprocess activity; scope the suspicious-args rules to socket/pty/temp-path patterns rather than alerting on all python -c.'
