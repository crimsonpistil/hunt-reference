        - Windows.Forensics.Lnk (LNK file analysis)
        - Windows.Forensics.RecentFileCache
    tools: |-
        Container delivery mechanisms (post-2022 dominant):
        - ISO files (auto-mount in Win8+, no MOTW on contents)
        - IMG files (same auto-mount behavior)
        - VHD/VHDX files (auto-mount as virtual disk)
        - 7z archives (require extraction, but no MOTW on
          extracted contents if extracted via 7-Zip GUI)
        - Password-protected ZIPs (bypass email AV scan;
          user must enter password, primes engagement)

        LNK files inside containers:
        - LNK = Windows shortcut
        - Custom icon makes it look like a document
        - Target field contains the actual command/binary
        - User sees a document icon, double-clicks, gets RCE

        OneNote (.one) attachments:
        - Embedded attachments inside OneNote sections
        - User prompted to "click to view"
        - File extracted to %TEMP% and executed
        - Popular phishing vector 2023-2024

        Common payload types in containers:
        - .exe (direct binary)
        - .lnk (shortcut to cmd/powershell/script)
        - .vbs / .js / .hta (script files)
        - .iso containing nested .lnk (post-MOTW chain)

        Threat actors heavily using container delivery:
        QakBot (pivoted to ISO delivery 2022)
        IcedID, Bumblebee
        Various initial access brokers
        Most commodity phishing post-macro-block
    analyst_notes: 'User Execution: Malicious File is the technique that captures ''the user clicked the thing.'' The detection is largely about path context: execution from a mounted ISO drive letter, from a temp ZIP extraction directory, or from the Downloads folder all indicate a recently-acquired file being launched by the user. The explorer.exe parent context is essential - it confirms the user manually launched the file rather than some automated process. ISO mounting is the most important post-2022 delivery vector to understand: Windows auto-mounts ISO files when double-clicked, and files inside the mounted volume don''t inherit the Zone.Identifier ADS from the outer ISO file. This means the actual payload runs without the ''Mark of the Web'' warning that would otherwise prompt the user. The detection should pair container mount evidence (MountPoints2 registry key) with subsequent process execution from the mounted drive letter. False positives: legitimate ISO usage (software installers, OS recovery media) exists but is rare on user endpoints. Build allowlists from baseline behavior of your environment. This indicator is the host-side complement to T1566 Phishing in the Initial Access tactic - the network reference covers the delivery; this covers the execution.'
