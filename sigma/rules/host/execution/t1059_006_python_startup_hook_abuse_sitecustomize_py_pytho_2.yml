    analyst_notes: 'sitecustomize.py is a legitimate Python mechanism that executes automatically at every interpreter startup - it is designed for system administrators to customize the Python environment system-wide. An attacker with write access to this file gets code execution on every Python invocation on the host, regardless of which script is called or which user runs it. This is particularly dangerous in environments where Python is used in cron jobs, monitoring scripts, or system automation: backdoor code in sitecustomize.py runs with whatever privilege those scripts carry. The usercustomize.py variant is lower-privilege (no root needed, only affects current user) but easier to plant. The PYTHONSTARTUP variant is more limited - it fires only for interactive Python sessions, not scripted invocations - making it most useful for credential harvesting when administrators use the Python REPL. The .pth file technique is the most subtle: a .pth file with an import statement (supported in Python 2, via directory-based loading in Python 3) or an absolute path pointing to an attacker-controlled directory allows arbitrary module shadowing. Detection priority: file integrity monitoring on all Python site-packages directories, combined with package manager verification after any change - these directories should only change during dpkg/pip package installations.'
