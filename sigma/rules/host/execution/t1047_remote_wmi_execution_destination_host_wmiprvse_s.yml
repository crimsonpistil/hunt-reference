    analyst_notes: 'Remote WMI execution is one of the cleanest lateral movement techniques from an adversary perspective: it requires no dropped binary on the target, uses a legitimate Windows protocol (DCOM/RPC), authenticates via normal Windows credentials, and leaves a minimal footprint. The network traffic blends into background Windows management noise in environments that use WMI for legitimate remote management. Detection requires correlating artifacts across two hosts: the source (wmic /node: command or DCOM network connection) and the destination (wmiprvse.exe spawning an unexpected child, Security Event 4624 network logon). Neither artifact alone is high-fidelity - combined they are. This is a genuine case where your network sensor (Zeek/Suricata on the wire) and host sensor (Sysmon on the endpoint) complement each other: the DCOM connection is visible at the network layer, and the process creation is visible at the host layer. Neither sensor alone gives the full picture. If you see wmiprvse.exe spawning cmd.exe or powershell.exe on a host that is not a WMI management server, treat it as high-confidence lateral movement until proven otherwise.'
