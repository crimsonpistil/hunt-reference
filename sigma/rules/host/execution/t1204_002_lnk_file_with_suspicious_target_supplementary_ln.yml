    analyst_notes: 'LNK files are the connective tissue of modern phishing delivery chains - particularly in ISO containers where the LNK provides the user-clickable interface while the actual payload (often a script or DLL) sits hidden in the same container. The detection focuses on the execution artifact rather than the LNK file itself: when a user double-clicks a malicious LNK, Sysmon EID 1 captures the resulting process spawn with explorer.exe as the parent and the LNK''s target+arguments visible in the new process''s command line. This is why the explorer.exe parent context combined with risky command-line arguments (ExecutionPolicy Bypass, EncodedCommand, vbscript:, URL fetches, suspicious paths) is so high-fidelity. The live-host LNK enumeration PowerShell script is useful for IR triage: it parses every LNK in the user profile and flags ones with suspicious targets/arguments. False positives: some legitimate software ships .lnk files in user paths (Quick Launch, custom shortcuts created by installers), and developer workflows sometimes involve LNK files with command-line arguments - context matters. The strongest single signal is a LNK file in Downloads, Desktop, or a temp ZIP extraction directory with a TargetPath of cmd/powershell/wscript and an Arguments field containing payload-like content.'
