    tools: |-
        Explorer.exe parent (user double-click):
        - Most common for commodity JS delivery
        - User receives ZIP, extracts .js, double-clicks thinking
          it's a document - wscript runs silently

        Browser parent:
        - Drive-by download delivering .js file
        - Browser auto-opens downloaded .js (rare - most browsers
          now prompt before opening script files, but older
          configs and IE/legacy Edge allow auto-open)
        - More common: browser downloads, user manually opens

        Office parent:
        - VBA macro drops a .js file then executes it via Shell()
        - Less common than direct wscript.exe delivery but creates
          a cleaner two-stage chain (macro handles download,
          JS handles execution/persistence)

        Families using these chains:
        Gootloader (SEO poisoning -> browser download -> user opens .js)
        Qakbot variants
        TA505 campaigns
        Various phishing operators
    actors:
        - TA505
        - APT41
    analyst_notes: 'The explorer.exe parent is the most common real-world path for JScript delivery - it means the user double-clicked the .js file directly, relying on the default Windows file association (wscript.exe handles .js). This is the ''ZIP attachment -> extract -> double-click'' chain. Gootloader is the canonical example and worth understanding in depth: it uses SEO poisoning to rank malicious sites in search results for legal/business document searches, delivers a large obfuscated .js file disguised as the document, and relies entirely on the user double-clicking it. The browser parent variant is less common now because modern browsers (Chrome, Edge) warn before opening script files downloaded from the internet - but it still surfaces in environments with older browser configurations or where the .js is delivered inside a password-protected ZIP (bypasses browser warning because the file is ''opened'' from the ZIP handler, not the browser directly). The Office parent variant is the most sophisticated - it means a macro is orchestrating the JScript execution as a second stage, suggesting a more deliberate operator rather than commodity tooling.'
