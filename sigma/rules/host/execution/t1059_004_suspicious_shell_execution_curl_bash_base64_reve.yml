    analyst_notes: 'Unix shell is the Linux analogue of the PowerShell/cmd execution rows on the Windows side, and the highest-volume execution surface on Linux. The single most valuable pattern to hunt is a shell spawned by a network-facing service (nginx, apache, php-fpm, tomcat, java, node) - that lineage almost always means a webshell or exploited RCE, exactly mirroring the Windows ''Office spawns powershell'' logic. After that, the content patterns: curl|bash and wget|sh (download-pipe-execute), base64 -d piped to a shell (obfuscated payloads), and reverse-shell one-liners (bash -i >& /dev/tcp/.../..., nc -e, python -c socket). Telemetry: auditd execve logging is the foundation and should be enabled with a catch-all execve rule keyed for easy searching; Sysmon for Linux gives you the same EID 1 ProcessCreate model you already use on Windows, so the detection logic ports cleanly. Don''t rely on shell history as a primary control - attackers routinely unset HISTFILE or truncate it, so treat history tampering itself as a signal. A process whose /proc/<pid>/exe link shows ''(deleted)'' is running a binary that was unlinked while executing - a strong fileless tell worth a dedicated check. For containerized Linux, Falco is the strongest runtime detector. Baseline legitimate automation (config-management agents, cron-driven maintenance scripts, package managers running shells) to keep curl|bash and service-spawned-shell rules from drowning in deployment noise.'
