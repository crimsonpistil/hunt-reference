    analyst_notes: 'Perl reverse shells are a legacy technique that remains relevant on any Linux server where Perl is installed (which is most RHEL 6/7 and many Ubuntu systems). While Python has largely displaced Perl in modern attack tooling, Perl payloads are still encountered in exploitation of legacy CGI-era web applications, older OT-adjacent Linux systems, and situations where Python is absent but Perl is available. The canonical PentestMonkey Perl reverse shell is well-known and should be treated as a high-confidence alert: use Socket, fork, and exec /bin/sh in the same perl -e invocation with an outbound network connection is near-certain exploitation. For environments with legacy RHEL 6 or CentOS 6 systems - particularly common in OT/ICS adjacent networks - Perl webshell detection deserves priority attention because those systems often run Apache with CGI enabled and have perl in /usr/bin.'
