        // Auditd rules for shared library injection

        // /etc/ld.so.preload — highest severity; should not exist on clean host
        -w /etc/ld.so.preload -p wa -k ldso_preload_write
        -w /etc/ld.so.conf -p wa -k ldso_conf_write
