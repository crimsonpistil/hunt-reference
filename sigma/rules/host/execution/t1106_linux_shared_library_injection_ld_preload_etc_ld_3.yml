    analyst_notes: '/etc/ld.so.preload is the highest-severity LD_PRELOAD artifact: any library listed there is injected into every process that starts on the system, giving an attacker simultaneous hooks in sshd, sudo, cron, and every other daemon. On a clean system this file should not exist at all - its mere presence is a critical indicator warranting immediate investigation. The LD_PRELOAD environment variable variant is more targeted: it affects only processes launched from the shell where the variable is set, making it less persistent but harder to detect because it leaves no on-disk configuration artifact beyond a shell config modification. The detection counter is /proc/<pid>/environ, which preserves each running process''s environment - scanning all running processes for LD_PRELOAD pointing to non-standard paths catches active exploitation. For the Ebury/Windigo family specifically: it targets the libssl shared library, hooking authentication functions to capture SSH credentials in plaintext from every SSH connection the server processes. This is not just persistence - it is a credential harvesting mechanism that affects every user authenticating through the compromised server. File integrity monitoring on /etc/ld.so.preload and package manager verification of core libraries (libc6, libssl) are the primary controls.'
