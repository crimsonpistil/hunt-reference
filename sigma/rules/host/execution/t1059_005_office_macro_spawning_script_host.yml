    analyst_notes: 'wscript.exe and cscript.exe are the two Windows Script Host engines - wscript runs scripts with a GUI context (no console window visible), cscript runs them in a console. Adversaries strongly prefer wscript for macro-dropped scripts because it runs silently. The detection is the same as the Office-spawning-PowerShell and Office-spawning-cmd patterns - the anomaly is the parent, not the child. One important addition to the parent list vs the cmd/PS indicators: onenote.exe. Since the MOTW macro block in 2022, OneNote became a popular delivery vehicle - embedded attachments inside .one files execute via the OneNote process, not a standard Office app. Also worth noting: msaccess.exe and mspub.exe are lower-volume Office apps that get less scrutiny but are used in targeted operations specifically because defenders don''t always include them in parent-process watchlists. False positives: IT automation scripts occasionally use wscript legitimately - allowlist by known-good script paths and parent context.'
