    analyst_notes: 'The inline script variant (vbscript: / javascript: / jscript: protocol handlers) has near-zero legitimate use in modern enterprise environments. Unlike the URL variant where the false positive consideration is ''is this an internal HTA app being launched legitimately,'' the inline form is almost exclusively an attacker convenience. The payload appears directly in the command line, which is both an opportunity and a challenge: opportunity because the full intent is visible in a single Sysmon event; challenge because the payload is often obfuscated with string concatenation, character codes, or chained CreateObject calls to defeat string matching. Detection should focus on the protocol handler keywords (vbscript:, javascript:, jscript:) rather than trying to pattern-match the payload itself. Once an alert fires, manual decoding of the command line reveals intent. Pair with child process analysis: inline mshta almost always spawns cmd.exe or powershell.exe as a follow-on stage.'
