    analyst_notes: 'This is the Linux counterpart to the Windows Native API row, and it centers on fileless execution via memfd_create - the dominant Linux EDR-evasion execution technique. The mechanism: memfd_create() creates an anonymous file that exists only in RAM, the payload (typically an ELF) is written to that file descriptor, and execve runs it directly - nothing ever touches disk, so file-based AV and integrity monitoring see nothing. The defining, highest-fidelity indicator is a process whose /proc/<pid>/exe symlink resolves to ''/memfd:...'' or shows ''(deleted)'' - that single check catches the overwhelming majority of fileless Linux execution and is trivially scriptable across /proc. Because syscall visibility is what really nails this, eBPF tooling (Falco, Tetragon, Tracee) is the strongest detector - they see the memfd_create and execve syscalls directly, before the exec resolves; auditd with memfd_create+execve rules is the next best and works without eBPF. Sysmon for Linux surfaces the resulting exec with a /memfd: image path. Critical IR note: the payload lives only in memory and vanishes when the process exits, so if you find one, capture the memfd content or process memory (gcore, /proc/<pid>/mem) immediately - there''s no on-disk copy to recover later. This frequently pairs with a download step that deliberately left no file (curl piped straight into a memory loader), so correlate with network egress that has no matching file write.'
