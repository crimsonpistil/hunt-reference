    analyst_notes: 'wmic process call create is the most direct WMI execution path - it tells WMI to instantiate the Win32_Process class and call its Create method, spawning a new process. The resulting child process has wmiprvse.exe as its parent rather than cmd.exe or powershell.exe, which is the key detection pivot. This parent-swap is intentional: adversaries use it to break the process ancestry chain and make the spawned process appear to originate from a system management context rather than a user shell. The wmiprvse.exe suspicious child detection is arguably more durable than the wmic.exe detection because it catches cases where the attacker calls WMI COM objects directly (bypassing wmic.exe entirely) as well as the standard wmic path. False positives: wmiprvse.exe legitimately spawns msiexec.exe, scrcons.exe, and a handful of other management processes - build your allowlist from a baseline of normal WMI activity in your environment before alerting on everything. Also note: wmic.exe deprecated in Windows 11 24H2 but still present and functional on virtually all enterprise endpoints you will encounter in practice.'
