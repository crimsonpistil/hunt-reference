    analyst_notes: 'T1106 is the most detection-resistant technique in the Execution tactic because its entire value to an adversary is avoiding the artifacts that other techniques generate. The three Sysmon event IDs here (1, 8, 10) are the best available host-side telemetry, but each has significant false-positive challenges that require careful tuning. EID 8 (CreateRemoteThread) is the most actionable: legitimate software rarely injects threads into other processes, and a CreateRemoteThread event where StartModule is blank almost always indicates shellcode rather than a legitimate DLL-based operation. EID 10 (ProcessAccess) with write-capable access masks is noisier - AV and EDR products themselves open handles to other processes for scanning, so source-image allowlisting is essential. The empty command line on EID 1 is worth monitoring but generates false positives from some legitimate system processes and certain vendor software that uses Win32 CreateProcess with a NULL lpCommandLine argument. The honest detection gap to acknowledge: the most sophisticated operators use direct syscalls (Syswhispers-style) to bypass even ntdll.dll, making user-mode detection insufficient. Kernel-mode ETW (Event Tracing for Windows) sensors in modern EDR products are the frontier for that level of evasion. For most environments and most adversaries, the Sysmon EID 8 blank-StartModule detection is the highest-value single alert in this indicator.'
