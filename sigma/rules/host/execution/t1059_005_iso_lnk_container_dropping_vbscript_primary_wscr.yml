    analyst_notes: 'This indicator represents the post-2022 evolution of VBScript delivery after Microsoft''s macro block. The ISO container trick works because Windows auto-mounts ISO files when double-clicked (since Windows 8), and files inside the mounted ISO volume do not inherit the Zone.Identifier ADS from the outer ISO file - so the .vbs inside has no MOTW and runs without a macro security prompt. The detection pivot is twofold: first, the ISO mount event itself (MountPoints2 registry key, Sysmon EID 11 on the ISO), then wscript executing a script from a mounted drive letter or staging path. The drive-letter heuristic (wscript running D:\something.vbs where D: is not a standard drive) is high-fidelity but requires knowing which drive letters are fixed vs removable vs mounted in your environment. The %TEMP% and %APPDATA% path heuristics are broader and catch the cases where the script is first dropped to disk before execution. VBE (.vbe) is encoded VBScript - the content is obfuscated using Microsoft''s Script Encoder - and is a meaningful escalation signal when seen in these paths.'
