    analyst_notes: 'DLL side-loading is conceptually distinct from DLL injection - in injection, the adversary runs code in an existing process via API calls. In side-loading, the adversary tricks a trusted process into loading a malicious DLL through the normal Windows DLL search order. The result is a fully-trusted-looking process running attacker code with the trusted binary''s signature inheriting to the loaded DLL''s behavior from a process-trust perspective. The detection pattern is path-and-signature focused: a signed executable in a user-writable directory loading an unsigned DLL from that same directory is the canonical side-load chain. False positives: some legitimate software does run from temp directories with bundled DLLs (installers, portable apps) - signature checking on both the executable and DLL helps, but signed installers may bundle their own signed DLLs that look legitimate. The strongest signal is the combination: signed EXE in user-writable path + adjacent unsigned DLL with a system-sounding name (version.dll, wininet.dll, dwmapi.dll). This pattern is heavily used by China-nexus operators - APT41, PlugX, ShadowPad all use it as standard tradecraft.'
