    analyst_notes: 'HISTFILE and shell history suppression is the single most consistent attacker behavior on interactive Linux shells - it is near-universal because it costs nothing and eliminates a primary forensic artifact. The important detection insight: a missing or empty ~/.bash_history on a long-running server with active admin users is immediately suspicious. The /proc/<pid>/environ counter-move is powerful: even if an attacker unsets HISTFILE interactively, the live environment of their shell process retains HISTFILE=/dev/null or HISTSIZE=0, visible via /proc. This doesn''t survive process death, making it a live-host-only signal. For obfuscation, ${IFS} substitution is the most common evasion because it requires no encoding - it replaces the space character used to separate flagged keywords, evading simple string-match detection. The correct defense is full auditd execve capture: the audit log records all command arguments before the shell processes them, so even obfuscated commands appear partially decoded in the log. Pair HISTFILE monitoring with auditd execve to close both the evidence-destruction and evasion gaps.'
