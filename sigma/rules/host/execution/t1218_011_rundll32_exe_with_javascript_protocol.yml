    analyst_notes: 'The javascript: protocol abuse via rundll32 is conceptually similar to mshta inline script execution - both rely on a Microsoft-signed binary loading the MSHTML or scripting engine and executing attacker-supplied code inline. Detection is straightforward because the pattern has no legitimate use: rundll32.exe with javascript: in the command line is high-confidence malicious. The technique is less common than mshta inline scripts in commodity malware but appears in environments where the operator suspects mshta is blocked or heavily monitored. Pair with outbound network detection: rundll32 making HTTP/HTTPS connections after a javascript: invocation typically means the inline code is fetching a second-stage scriptlet.'
