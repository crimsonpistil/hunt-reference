        // On DESTINATION host:

        // PSEXESVC.exe written to C:\Windows\ (EID 11):
        EventID=11
        TargetFilename=*\PSEXESVC.exe

        // PSEXESVC service created (EID 13 - registry value set):
        EventID=13
        TargetObject=*\Services\PSEXESVC*

        // PSEXESVC process execution (EID 1):
        EventID=1
        Image=*\PSEXESVC.exe

