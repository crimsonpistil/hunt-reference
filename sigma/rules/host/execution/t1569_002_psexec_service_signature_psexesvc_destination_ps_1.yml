    analyst_notes: 'PSEXESVC is one of the most reliable lateral movement fingerprints in Windows forensics precisely because PsExec is so widely used - by both legitimate administrators and adversaries. The detection is straightforward: PSEXESVC.exe should never appear in C:\Windows\ in a healthy environment outside of an active PsExec session. The challenge is that PsExec cleans up after itself, so the window for live detection is short. The forensic artifacts that survive cleanup (System Event 7045, Sysmon EID 11, USN Journal) are your primary post-incident evidence sources. Context is everything here: seeing PSEXESVC in logs from a known IT admin workstation targeting a server it manages during business hours is probably legitimate. Seeing PSEXESVC originating from a developer workstation, a user endpoint, or targeting a domain controller is worth immediate investigation. Impacket psexec.py deserves a callout: it''s a Python reimplementation of the PsExec protocol that produces the same PSEXESVC artifact on the destination, so this detection catches Impacket psexec.py as well as the legitimate Sysinternals tool.'
