    analyst_notes: This indicator is hunting-oriented rather than real-time detection - it's about finding what already exists rather than catching creation live. The two previous T1053.005 indicators cover real-time creation via schtasks.exe EID 1 and Security EID 4698. This one covers the scenario where a task was created by a method that didn't generate obvious telemetry (COM API, fileless stager, pre-Sysmon deployment) and you need to sweep for it. The Get-ScheduledTask PowerShell script and the raw XML scan of C:\Windows\System32\Tasks\ are the most useful live-host forensic tools for this. The svchost.exe spawning suspicious children pattern bridges the gap - it fires when an existing task actually executes, regardless of how it was created, because all modern scheduled tasks run under the Task Scheduler svchost instance. The parent command line containing 'Schedule' distinguishes the Task Scheduler svchost from the dozens of other svchost instances running on a Windows system. Adversaries frequently disguise task names as Windows Update, Windows Defender, Google Update, or similar legitimate-sounding names - always inspect the action path, not the task name, as the primary detection signal.
