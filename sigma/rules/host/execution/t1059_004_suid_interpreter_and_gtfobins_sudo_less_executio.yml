    analyst_notes: 'SUID binaries and Linux capabilities are the primary sudo-less privilege escalation paths on Linux. The key insight is that SUID execution doesn''t look like privilege escalation at the process-creation level - it is a normal binary invocation. The signal is in process metadata: effective UID (euid) differs from real UID (ruid), meaning the binary ran with elevated privileges. Auditd SYSCALL records capture both uid and auid (audit UID = the original login UID), so a comparison reveals SUID execution. The GTFOBins site catalogs every Unix binary that can turn SUID into a shell, and the list is longer than most defenders expect: find, awk, vim, less, more, env, tee, and many more. Linux capabilities are the subtler variant - instead of the full SUID bit, a binary gets specific kernel capabilities (cap_setuid, cap_dac_override) that grant targeted but still dangerous privileges. Critically, these do not appear in ls -la permissions output and require getcap to discover. A python3 binary with cap_setuid+ep is functionally equivalent to SUID root but invisible to the standard SUID hunt command.'
