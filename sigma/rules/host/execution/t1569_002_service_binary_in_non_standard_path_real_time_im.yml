    analyst_notes: 'This is the hunt-oriented companion to the real-time sc.exe detection - same concept as the scheduled task action hunting indicator in T1053.005. The PowerShell registry sweep is the core tool: it enumerates every registered service''s ImagePath and flags anything outside standard system and program directories. The key challenge is normalization: ImagePath values can be quoted, unquoted, contain environment variables (%SystemRoot%), or embed arguments after the binary path - the hunt script handles this. Environment variable expansion is important because %SystemRoot%\system32\svchost.exe is legitimate but looks non-standard if you string-match on C:\Windows without expanding the variable first. Services running from C:\ProgramData\ deserve particular scrutiny - it''s a world-writable directory that doesn''t appear in standard path allowlists, making it a common adversary staging location. The services.exe parent filter in the Sysmon section is a useful real-time complement: services.exe is the SCM binary that directly spawns services, so filtering Sysmon EID 1 on ParentImage=services.exe and checking the child''s path against standard directories gives live execution coverage for this indicator.'
