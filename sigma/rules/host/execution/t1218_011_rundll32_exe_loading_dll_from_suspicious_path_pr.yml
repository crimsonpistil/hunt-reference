    analyst_notes: 'rundll32.exe is the most ubiquitous LOLBin in Windows - it''s used constantly by legitimate Windows operations to invoke functions in system DLLs. The detection is path-focused: legitimate rundll32 calls load DLLs from System32, SysWOW64, or known vendor program directories. Rundll32 loading a DLL from AppData, Temp, ProgramData, or Public is high-confidence malicious in nearly all environments. The unsigned DLL angle via Sysmon EID 7 is a useful complement - it catches cases where the path is plausible but the DLL itself has no Microsoft or vendor signature. False positives: some legitimate vendor software does invoke rundll32 with DLLs from non-standard paths during installation, particularly older or poorly-designed installers. Build allowlists from baseline data. Pair with parent process context: rundll32 spawned by an Office app, browser, or explorer.exe with a DLL in AppData = phishing chain.'
