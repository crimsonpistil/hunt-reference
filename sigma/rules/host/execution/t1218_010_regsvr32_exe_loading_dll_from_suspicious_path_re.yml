    analyst_notes: 'This indicator complements the Squiblydoo detection by covering the other regsvr32 abuse patterns - local DLL registration with a malicious DllRegisterServer, /u unregistration as an execution trigger, and local scriptlet execution without remote fetch. The detection is path-focused: legitimate regsvr32 calls load DLLs from System32, SysWOW64, or known vendor program directories. Regsvr32 loading a DLL from AppData, Temp, ProgramData, or Public is high-confidence malicious. The unsigned DLL angle via Sysmon EID 7 is a useful complement. False positive consideration: some legitimate software installers use regsvr32 with DLLs from their installation directories (rarely from temp paths) - build allowlists from installer baselines. The /u flag deserves specific attention: adversaries sometimes use unregistration as the execution vector because it''s slightly less monitored than registration, but both call into attacker-controlled DLL code.'
