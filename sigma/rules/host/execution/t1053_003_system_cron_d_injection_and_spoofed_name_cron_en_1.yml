    analyst_notes: 'System cron.d injection is preferred over user crontab by sophisticated operators because (a) /etc/cron.d files can specify the run-as user (root), (b) they survive user account changes, and (c) they are less visible than crontab -l for the affected user. Spoofed names (apache, sshd, sysstat) are a deliberate masquerade technique. The package-verification approach works: enumerate /etc/cron.d files, verify against the package manager, flag unpackaged entries.'
