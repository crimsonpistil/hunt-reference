    analyst_notes: 'rundll32.exe with no command-line arguments is one of the highest-fidelity Cobalt Strike Beacon indicators in default configurations. Cobalt Strike''s spawnto setting defaults to rundll32 with no arguments because rundll32 is signed, ubiquitous, and unexpected to run long-term - exactly what an adversary wants in an injection host. Legitimate rundll32 invocations always carry arguments (the DLL path and export function); empty rundll32 has effectively zero legitimate use cases. Sophisticated operators change Cobalt Strike''s spawnto to a different binary (notepad.exe, conhost.exe, etc.) for evasion - the broader detection technique is signed Microsoft binaries running unexpectedly long with no arguments, but rundll32 specifically remains the most common default. Pair with Sysmon EID 8 (CreateRemoteThread targeting rundll32) and EID 10 (ProcessAccess with write masks to rundll32) for the full injection chain: empty rundll32 spawn followed by remote thread injection from the parent or another process = Cobalt Strike spawnto pattern.'
