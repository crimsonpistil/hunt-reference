    analyst_notes: 'Web server process spawning a shell is the single highest-confidence RCE indicator on Linux servers. nginx, Apache, PHP-FPM, and Java application servers have no legitimate reason to spawn an interactive shell. When you see httpd → bash or php-fpm → sh → wget in your process tree, you are looking at webshell execution or direct web vulnerability exploitation. The detection is straightforward to implement and extremely low false-positive: the parent process set (web workers) is small and well-defined, and any shell child is anomalous. Correlate with web access logs to identify the exploited endpoint: look for POST requests to small PHP files or unusual URL patterns in the seconds before the shell spawn. The CGI pattern (httpd directly spawning a shell) is less common on modern stacks but still appears on legacy systems. The modern pattern is php-fpm → dash → curl/wget/python, or java (Tomcat/Spring/Log4j) → sh → payload. Falco provides this detection as a built-in rule with near-zero tuning required. Deploy it or the equivalent Sigma/Elastic rule as a high-severity alert on any Linux server hosting web applications.'
