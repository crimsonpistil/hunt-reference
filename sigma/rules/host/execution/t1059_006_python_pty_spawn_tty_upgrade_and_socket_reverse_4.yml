    analyst_notes: 'pty.spawn(''/bin/bash'') is the single most common Python command used in active Linux intrusions. It is the universal step taken immediately after gaining a non-interactive shell (from curl|bash, a webshell, or a cron payload) to upgrade it to fully interactive. Nearly every operator runs this exact command within the first few interactions of a new shell. It is such a strong signal that alerting on any invocation of python with pty.spawn in the arguments has near-zero false positive rate in production environments - there is essentially no legitimate production use case for python -c with pty.spawn. The socket + os.dup2 pattern that accompanies it creates a complete network-backed interactive shell: the attacker connects a socket to their C2, then duplicates the socket file descriptor over stdin (fd 0), stdout (fd 1), and stderr (fd 2), so all shell I/O flows through the socket. The pty allocation makes the session indistinguishable from SSH at the pseudo-terminal level. Detection: auditd execve capture for pty.spawn in arguments, combined with EID 3 network connection from the python process to a non-internal IP, is definitive.'
