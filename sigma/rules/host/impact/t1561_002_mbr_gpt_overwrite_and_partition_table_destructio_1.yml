    analyst_notes: 'MBR/GPT wipe detection is critical because it distinguishes nation-state destructive operations from commodity ransomware. Ransomware encrypts files but leaves the disk structure intact (the ransom note needs to display at boot). Wipers destroy the disk structure itself, making the system permanently unbootable. Detection is challenging because the wipe happens at the raw disk level, below the filesystem where most monitoring operates. Sysmon EID 9 (RawAccessRead) catches the precursor reads but not the writes. Kernel-level driver loads (EID 6) are the proxy signal: wipers like HermeticWiper load signed third-party drivers to get kernel disk access. UEFI Secure Boot provides some protection by preventing modified boot code from executing, but a GPT wipe still renders the system unbootable even if Secure Boot is enabled. The only real recovery is offline/immutable backups.'
