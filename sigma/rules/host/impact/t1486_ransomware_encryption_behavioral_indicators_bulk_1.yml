    analyst_notes: 'Ransomware encryption detection is a race against time: once encryption starts, every second of delay means more files lost. The most effective early warning is canary/tripwire files placed alphabetically first in monitored directories (000-canary.docx). Ransomware typically enumerates directories alphabetically, so the canary is encrypted first, triggering an alert before the bulk of files are affected. The automated response chain should be: canary alert -> immediate host isolation -> preserve evidence -> assess blast radius. Post-encryption forensics focuses on identifying the ransomware family (from the ransom note, extension pattern, and encryption markers in file headers) to determine if a decryptor exists.'
