    analyst_notes: 'A forced shutdown or reboot is rarely the primary detection for an attack. Its value is as a CORRELATION indicator: shutdown preceded by shadow copy deletion + service stops + file encryption = confirmed ransomware completion. Shutdown preceded by MBR overwrite = confirmed wiper activation. Shutdown alone (without preceding attack indicators) is usually legitimate maintenance. The investigation workflow is: detect the shutdown event, then look BACKWARD in the timeline for the attack chain that preceded it. On Linux, ''last -x shutdown reboot'' shows the reboot history, and ''journalctl --list-boots'' shows each boot with timestamps, revealing gaps where the system was down.'
