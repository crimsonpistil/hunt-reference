    analyst_notes: 'Ransomware operators stop services for two reasons: (1) to unlock files held open by databases and mail servers so they can be encrypted, and (2) to disable security tools that might detect or block the encryption process. The bulk nature is the key detection signal: a single net stop is normal administration, but 5+ service stops targeting different categories (AV + backup + database) within minutes is near-certain ransomware staging. Some ransomware families embed hardcoded service lists (Conti, REvil, BlackMatter each have documented target lists), and the specific combination of services stopped can be used for family attribution.'
