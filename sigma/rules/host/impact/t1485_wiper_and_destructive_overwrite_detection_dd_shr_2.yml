    analyst_notes: Wiper attacks are the most severe host-side impact because data is irrecoverably destroyed. Unlike ransomware, there is no negotiation path. Detection must be fast enough to trigger automated isolation before the wipe completes. The most reliable detection is auditd monitoring of dd/shred/mkfs commands targeting block devices (/dev/sd*, /dev/nvme*), which should never happen in normal operations. On Windows, the equivalent is cipher /w or direct disk writes via kernel drivers (as used by HermeticWiper). The only real mitigation is offline/immutable backups that the attacker cannot reach from the compromised network.
