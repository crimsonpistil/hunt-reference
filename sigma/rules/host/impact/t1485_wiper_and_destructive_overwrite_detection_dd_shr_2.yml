        Image=*/dd AND CommandLine=*of=/dev/sd* OR *of=/dev/nvme*
        Image=*/shred AND CommandLine=*/dev/*
        Image=*/mkfs* AND CommandLine=*/dev/sd* OR */dev/nvme*

