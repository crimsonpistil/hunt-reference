    analyst_notes: 'Shadow copy deletion is the single highest-confidence pre-ransomware indicator. In a non-ransomware context, vssadmin delete shadows is almost never run legitimately (backup software manages VSS through APIs, not CLI). A detection rule on this command with an immediate automated response (isolate host, preserve evidence) can stop ransomware deployment in the minutes between recovery inhibition and encryption start. The time gap between shadow deletion and encryption varies by ransomware family: some delete shadows immediately before encrypting (seconds), others prepare the environment hours in advance. Multiple recovery-inhibiting commands in sequence (vssadmin + bcdedit + wbadmin) is near-100% confidence ransomware staging.'
