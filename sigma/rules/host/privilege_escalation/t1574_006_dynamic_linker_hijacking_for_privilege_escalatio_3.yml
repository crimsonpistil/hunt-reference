    analyst_notes: 'Dynamic linker hijacking for privilege escalation is the privesc-focused framing of the LD_PRELOAD mechanism covered on the Execution page under T1106, and the distinction matters because of an important security control: glibc deliberately ignores the LD_PRELOAD and LD_LIBRARY_PATH environment variables for SUID binaries, precisely to prevent trivial escalation. The escalation paths in this row are therefore the specific cases where that protection does not apply. First and most common is sudo with env_keep += LD_PRELOAD: when a sudoers rule explicitly preserves LD_PRELOAD, it re-injects the variable into the privileged process, so an attacker can preload a malicious shared object that executes as root through any allowed sudo command. Second is /etc/ld.so.preload, which is a file rather than an environment variable - the setuid protection does not strip it, so any library listed there loads into SUID-root processes, granting root-context code execution. Third is a writable directory in the library search path (via ld.so.conf or a SUID binary''s RPATH/RUNPATH), where the attacker drops a library with a name the privileged binary loads. The primary controls are configuration audits: remove LD_PRELOAD and LD_LIBRARY_PATH from any sudoers env_keep directive, verify /etc/ld.so.preload does not exist, and check the RPATH/RUNPATH of SUID binaries for writable paths. This row cross-references the T1106 Execution coverage, which addresses the same mechanism from the code-execution and userland-rootkit (Ebury, Azazel) perspective.'
