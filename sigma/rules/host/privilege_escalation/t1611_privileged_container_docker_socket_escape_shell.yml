    analyst_notes: 'Privileged containers and mounted Docker sockets are the two most exploited container escape paths, and both are misconfigurations rather than vulnerabilities - meaning they are entirely preventable but extremely common in real environments, especially CI/CD pipelines and developer setups. A --privileged container can escape to host root in a single command by mounting the host disk and chrooting into it, or by using nsenter to enter PID 1''s namespaces. A mounted /var/run/docker.sock is functionally equivalent to giving the container host root, because the container can instruct the host Docker daemon to spawn a new container mounting the entire host filesystem. The detection strategy operates at two levels: posture (inventory containers for --privileged, socket mounts, host namespace sharing, and dangerous capabilities like CAP_SYS_ADMIN - this is a configuration audit) and runtime (Falco is the definitive tool, with built-in rules for privileged container launch, sensitive mount detection, namespace changes via nsenter, and container drift). From the host side, if the host PID namespace can see container processes, the escape commands (nsenter --target 1, mount of host devices, chroot to mounted root) are directly observable. The strongest controls are preventive: Kubernetes Pod Security Standards or OPA/Kyverno policies that simply refuse to schedule escape-enabling pod specs.'
