    product: windows
detection:
    selection:
        winlog.event_id: 1
        user.name: SYSTEM
        process.name:
            - cmd.exe
            - powershell.exe
            - pwsh.exe
    filter_0:
        process.parent.name:
            - services.exe
            - svchost.exe
            - wininit.exe
