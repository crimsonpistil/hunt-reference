title: T1134.001 - Token Impersonation / Theft (Process running as SYSTEM with a non-service parent)
id: f6a35d52-efbf-53af-b1e1-8da20875615c
status: experimental
description: 'Process calling DuplicateToken(Ex)/ImpersonateLoggedOnUser to assume another user''s token - often a SYSTEM or domain-admin context obtained from an existing process Query block: Process running as SYSTEM with a non-service parent.'
references:
