    analyst_notes: 'Escape to host completes the TA0004 set and is increasingly relevant as workloads containerize - though it''s worth being upfront that this Windows-host kit''s Sysmon/PowerShell/registry telemetry only partially covers it. Most container escapes are misconfiguration rather than exploit: a privileged container (--privileged), host namespace sharing (--pid/--net=host), a sensitive host filesystem mount, or - the big one - the container runtime socket (/var/run/docker.sock) mounted inside a container, which is trivial full host takeover since the container can then create a new privileged container mounting host root. The right telemetry for this lives at the container/runtime layer: Falco is the de-facto runtime detector (privileged container launch, docker.sock access, sensitive host mounts, in-container shells), eBPF tools (Tracee/Tetragon) catch the syscall-level escape, and Kubernetes admission control (OPA Gatekeeper/Kyverno, Pod Security Standards) blocks the misconfigurations outright. On a Windows container host, the docker named-pipe access pattern is visible in Sysmon EID 1; on Linux hosts, auditd/Sysmon-for-Linux watching the docker socket and for nsenter/unshare/capsh from container PIDs is the play. The highest-value defensive posture is preventative: inventory containers/pods for the privileged flag, host namespaces, host mounts, and socket exposure - those preconditions are enumerable and fixing them eliminates the overwhelming majority of escapes. I''ve included the host-side signals this kit can express and pointed clearly at the container-native tooling (Falco/eBPF/admission control) that owns the rest, rather than overstating what Sysmon alone covers here.'
