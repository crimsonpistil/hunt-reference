    analyst_notes: Service failure recovery actions (FailureCommand, RunProgram in FailureActions) execute when a service stops abnormally. Adversaries set these and then intentionally crash or stop the service to trigger execution. This is stealthier than ImagePath modification because (a) failure actions are not shown by default in services.msc, (b) most monitoring focuses on ImagePath and Start values, and (c) the execution only occurs on fault, making it intermittent and harder to reproduce during investigation.
