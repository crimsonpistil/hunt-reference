    analyst_notes: 'Sudoers misconfiguration is the single most common real-world Linux privilege escalation path - more prevalent than kernel exploits or pkexec because it requires no vulnerability, just an overly-permissive policy that administrators create routinely for convenience. The attacker workflow is universal and is the first thing run after any foothold: sudo -l to enumerate allowed commands, cross-reference against GTFOBins, and execute the escalation one-liner. The danger is that many seemingly-reasonable sudo grants are exploitable: allowing a user to run vim, find, less, awk, python, systemctl, apt, git, or tar via sudo grants effective root, because all of those binaries can spawn a shell or write arbitrary files from within their privileged execution. NOPASSWD rules compound the risk by removing even the password barrier. A subtler vector is env_keep: if sudoers preserves LD_PRELOAD or PYTHONPATH, an attacker can preload a malicious shared object that executes as root through any allowed sudo command. The detection approach is primarily configuration audit - regularly enumerate each user''s sudo rights (sudo -l -U), flagging NOPASSWD entries, GTFOBins-exploitable commands, wildcards, and env_keep directives - supplemented by behavioral detection of sudo invoking editors or interpreters followed by a root shell. Enabling sudo I/O logging (log_input/log_output) provides full forensic capture of every sudo session. This row covers misconfiguration abuse; the companion row addresses sudo binary CVEs.'
