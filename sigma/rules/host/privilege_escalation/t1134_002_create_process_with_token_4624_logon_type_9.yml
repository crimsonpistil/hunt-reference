    analyst_notes: 'T1134.002 is the action that consumes a stolen/duplicated token: CreateProcessWithTokenW (needs SeImpersonatePrivilege) or CreateProcessAsUser (needs SeAssignPrimaryTokenPrivilege) launches a new process under that token. It''s the natural follow-on to .001 token theft, and the cleanest single detection is in the Security log: a 4624 Logon Type 9 (NewCredentials) closely followed by a 4688 carrying TokenElevationTypeFull, where the new process is a shell/LOLBin running in a higher context than its creator. On the Sysmon side, the tell is a process whose user context and logon session diverge from its parent with no runas/service lineage. The privilege prerequisite is the key hunting pivot - only processes holding SeImpersonate or SeAssignPrimaryToken can do this, and those are typically service accounts on IIS/MSSQL, which is exactly where the Potato escalations land. Beware false positives from legitimate runas /netonly and from EDR/management agents that impersonate; baseline those by parent image and account before alerting.'
