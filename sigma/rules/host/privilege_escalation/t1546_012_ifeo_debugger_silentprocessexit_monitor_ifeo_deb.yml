    analyst_notes: 'IFEO injection is a flexible trigger primitive used for both privilege escalation and persistence, and it shares mechanism with two other rows (the accessibility backdoor''s IFEO variant and the run-key IFEO Debugger noted in persistence) - so this row focuses on the general technique and the stealthier SilentProcessExit variant. The Debugger value is the classic form: setting Image File Execution Options\<target>\Debugger = payload causes Windows to launch the payload whenever <target> runs, with the original as an argument. Point it at a SYSTEM service binary or a frequently-run app and you have escalation and/or persistence. The SilentProcessExit variant is sneakier and exit-triggered: GlobalFlag = 0x200 plus a SilentProcessExit\<target>\MonitorProcess value makes WerFault launch the payload when the target process exits - easy to miss because it fires on exit, not launch, and lives under a less-watched key. Detection is enumerable and high-fidelity: list every IFEO Debugger value and validate against the short allowlist of real debuggers (vsjitdebugger, windbg, vsdebugger); list every SilentProcessExit MonitorProcess (almost never legitimate); and watch Sysmon EID 13 writes to both key families in real time. Because both mechanisms are pure registry, a periodic sweep plus real-time EID 13 monitoring gives complete coverage. Beware the rare legitimate developer/debugging configuration as the only real FP source.'
