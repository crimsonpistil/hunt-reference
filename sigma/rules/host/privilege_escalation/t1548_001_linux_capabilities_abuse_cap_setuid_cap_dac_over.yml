    tools: |-
        Linux capabilities abuse:

        The stealthy cousin of SUID:
          Capabilities split root's power into ~40 distinct units.
          setcap assigns specific capabilities to a binary file.
          A binary with cap_setuid+ep can become root, but it does
          NOT show up in find -perm -4000. This invisibility makes
          it a favored persistence + escalation mechanism.

        Most dangerous for escalation:
          cap_setuid    - direct path to root (setuid(0) + exec shell)
          cap_dac_override / cap_dac_read_search - read/write any file
          cap_sys_admin - the "new root"; enables mount + many escapes
          cap_sys_ptrace - inject into privileged processes
          cap_sys_module - load a malicious kernel module = game over

        Enumeration tooling:
          LinPEAS    - dedicated capabilities section, flags dangerous ones
          getcap -r / - the core command; attackers run it first
          linux-smart-enumeration - capability + GTFOBins cross-ref

        GTFOBins has a Capabilities filter:
          gtfobins.github.io - filter by "Capabilities" shows which
          binaries escalate with which capability set

        Persistence angle:
          An attacker with root sets cap_setuid+ep on a benign-looking
          binary, then drops to a low-priv user. Re-escalation is one
          command and leaves no SUID artifact. Survives many cleanups.

        Container relevance:
          Container capabilities (capsh --print) determine escape
          surface. CAP_SYS_ADMIN in a container = likely escapable.
          See T1611 for the container escape chains these enable.

        Threat actor use:
          Less common than SUID in commodity malware (because it's
          less universally understood), but documented in targeted
          Linux intrusions and increasingly in container attacks.
    analyst_notes: 'Linux capabilities are the stealthy counterpart to SUID and represent a frequently-missed escalation and persistence vector precisely because they are invisible to the standard SUID hunt (find -perm -4000). Capabilities split root''s monolithic power into roughly 40 distinct units, and the setcap command assigns specific ones to a binary file. A binary with cap_setuid+ep can call setuid(0) and become root - functionally identical to SUID-root - but it does not appear in any permission-based search; only getcap -r / reveals it. This invisibility is exactly why it appeals to attackers for persistence: an attacker with root can grant cap_setuid+ep to a benign-looking binary, drop to a low-privilege account, and retain a one-command re-escalation path that survives cleanups focused on SUID binaries and cron jobs. The most dangerous capabilities for escalation are cap_setuid (direct root), cap_dac_override and cap_dac_read_search (read/write any file, including /etc/shadow and /etc/passwd), cap_sys_admin (the de facto new root, enabling mount and numerous escape paths), cap_sys_ptrace (inject into privileged processes), and cap_sys_module (load a malicious kernel module for total control). The single most important detection control is running getcap -r / on a schedule and diffing against a known-good baseline - on a normal server the legitimate capability set is tiny (typically just cap_net_raw on ping and a few network tools), so cap_setuid, cap_dac_override, or cap_sys_admin on any file is almost always worth investigating. GTFOBins includes a Capabilities filter mapping binaries to the capability needed for escalation.'
