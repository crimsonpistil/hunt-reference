    analyst_notes: 'Domain trust modification is the heavier, less-common sibling of GPO abuse and it''s included to complete T1484 - it''s a domain/forest/tenant-level escalation and persistence primitive rather than an endpoint technique. Two flavors. On-prem: creating or altering a trusted domain object, notably weakening SID filtering / quarantine on a trust so that injected SID-history (T1134.005) is honored across domains - turning a single-domain compromise into forest-wide rights. Federation: the Golden SAML family - stealing or replacing the AD FS token-signing certificate, or repointing a federated domain''s settings (Set-MsolDomainFederationSettings), lets an attacker forge SAML tokens for arbitrary users including admins, granting persistent cross-tenant access that survives password resets and MFA. Detection is identity-layer-centric: Security 4706/4707/4716 for on-prem trust changes, 5136 directory changes on trustedDomain objects, and federation cmdlet execution (Set-MsolDomainFederationSettings, Set-AdfsRelyingPartyTrust) on ADFS/admin hosts. The strongest controls are monitoring the AD FS token-signing certificate lifecycle and enumerating/baselining all trusts with SID filtering intact. Microsoft Defender for Identity and Defender for Cloud Apps detect both on-prem trust abuse and Golden SAML natively. As with GPO abuse, this is post-escalation domain-dominance tradecraft and requires directory/federation auditing to catch - note that prerequisite. It pairs directly with the SID-History row for the cross-domain escalation chain.'
