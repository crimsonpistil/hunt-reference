    analyst_notes: 'The sticky-keys/utilman backdoor is a classic that endures because it grants a SYSTEM shell from the logon screen, before any user authenticates - which makes it both a privilege escalation and a brutally effective access backdoor (especially over RDP). Two mechanisms: replace the accessibility binary on disk (sethc.exe for 5x-Shift sticky keys, utilman.exe for Win+U ease-of-access) with cmd.exe, or - cleaner and more common now - set an IFEO Debugger value so invoking the accessibility binary launches cmd instead without touching the WRP-protected file. Either way, triggering the accessibility hotkey at the lock screen spawns the shell in winlogon''s SYSTEM context. Detection is high-fidelity on all three legs: (1) any write to a System32 accessibility binary by something other than TrustedInstaller, or a signature/modified-time anomaly on those specific binaries; (2) ANY IFEO Debugger value on an accessibility exe (essentially never legitimate); (3) the runtime payoff - winlogon.exe spawning cmd/powershell, which is never normal. The IFEO Debugger leg overlaps mechanism with T1546.012 (IFEO injection) but the accessibility-binary targeting is the distinguishing escalation/backdoor pattern. A periodic signature check across the seven accessibility binaries plus an IFEO Debugger sweep catches the persistent installs; the winlogon-child-shell rule catches live use.'
