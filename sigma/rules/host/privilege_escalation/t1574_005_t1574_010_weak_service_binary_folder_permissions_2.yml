    analyst_notes: 'The file-permissions sibling of the registry-ACL row: instead of rewriting ImagePath, the attacker exploits write access to the service''s binary or its folder. Three variants share this row - (1) the service EXE itself is writable, so the attacker overwrites it; (2) the service''s folder is writable, so the attacker plants a DLL the service loads (a DLL search-order hijack landing in a SYSTEM process); (3) a dependency DLL lives in a writable location. All three end the same way: at the next service start the SCM runs the service as LocalSystem and the attacker''s code executes as SYSTEM. The precondition is enumerable - non-admin Write/Modify/FullControl on a service exe or its directory (accesschk -quvw, PowerUp Get-ModifiableServiceFile). The runtime detection: a non-installer process writing to a Program Files .exe that belongs to a service, an unsigned DLL loaded by a services.exe child, or a SYSTEM service binary whose signature suddenly mismatches the vendor original. Lead with the signature/modified-time anomaly on SYSTEM service binaries - it''s high fidelity. As always the fix is cheap (correct the ACL), so proactive enumeration is the strongest defense; this technique disappears the moment service binaries and folders are admin-write-only.'
