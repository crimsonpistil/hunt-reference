    analyst_notes: 'GPO modification is one of the most powerful domain privilege-escalation primitives because a single edit propagates SYSTEM-level execution or local-admin membership to every host the GPO applies to, at the next policy refresh. The two artifact surfaces are SYSVOL (the policy files - GptTmpl.inf for group membership and user rights, ScheduledTasks.xml for tasks including the fire-once ImmediateTaskV2, Groups.xml for local group pushes, Scripts\Startup for SYSTEM scripts) and the directory object (the groupPolicyContainer''s versionNumber and gPCMachineExtensionNames, which must update for clients to process the change). Detection should cover both: file-modify events on SYSVOL policy files (EID 11 / file auditing), especially any ImmediateTaskV2 which is almost always malicious, and Security 5136 directory-change events on GPO objects and their extension-name attributes. The strongest proactive control is auditing GPO write/link delegation - it''s frequently over-granted, and BloodHound maps exactly who can edit or link which GPOs (the WriteGPLink/GenericWrite-on-GPO edges that SharpGPOAbuse weaponizes). This needs SYSVOL file auditing and Directory Service Changes auditing enabled on DCs to catch reliably - flag that as a prerequisite. Defender for Identity detects this natively at the directory level and is the strongest single control if available. Note this requires existing GPO-edit rights, so it''s typically post-initial-escalation domain dominance rather than a first-foothold technique.'
