    analyst_notes: 'Process hollowing replaces the in-memory image of a legitimately-created (usually suspended) process with attacker code, so the process looks normal in a task list and on disk while running something else entirely. It''s harder to catch than remote-thread injection because there''s no CreateRemoteThread into a foreign process - the malicious code runs in the process''s own primary thread. Lean on two cheap, log-based tells before reaching for memory forensics: (1) process lineage anomalies - svchost.exe must be parented by services.exe; the .NET LOLBins (RegAsm, RegSvcs, MSBuild, InstallUtil, AddInProcess) are favorite sacrificial hosts and rarely have a legitimate reason to be spawned by Office or a script host; (2) path anomalies - a System32 binary running from anywhere but System32/SysWOW64. These catch the overwhelming majority of commodity hollowing (GuLoader, AgentTesla, Formbook all hollow .NET hosts). For confirmation, PE-sieve/Hollows-Hunter on the live host or hollowfind in Volatility will show the disk-vs-memory image divergence definitively. Commodity malware uses this constantly, so once you''ve baselined your legit RegAsm/MSBuild usage (dev machines, some installers), the document-host-spawns-.NET-LOLBin pattern is very high fidelity.'
