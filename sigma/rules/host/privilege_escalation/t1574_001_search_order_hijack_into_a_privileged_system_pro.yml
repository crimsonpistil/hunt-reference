    analyst_notes: 'DLL search-order hijacking and side-loading appear in execution (T1129) framing already, so this row is deliberately the privilege-escalation angle: the hijack lands in a process that runs at higher integrity or as SYSTEM, so the attacker inherits that context. The escalation precondition is the combination of (a) a privileged process loading a DLL by name rather than full path, and (b) a directory searched before the legitimate DLL that the attacker can write to - most often the privileged EXE''s own folder when it has weak ACLs, or a ''phantom'' DLL the process probes for but that doesn''t exist on the system. The single highest-value detection is a SYSTEM-context process loading an unsigned DLL from a user-writable path (AppData/Temp/ProgramData/a writable program folder) - that pattern is rarely legitimate and catches both classic and phantom hijacks. Pair the EID 7 load signal with the EID 11 drop (a non-installer writing a .dll into a privileged program folder or System dir). Proactive hunting mirrors the attacker''s recon: enumerate writable directories of SYSTEM-service binaries (the precondition), and use Procmon/Spartacus to find phantom-DLL targets before an adversary does. Baseline legitimate side-loading-prone apps (some vendor software genuinely loads unsigned helper DLLs from their own folder) to control FPs. Confirmation is the same as injection - PE-sieve flags proxy/implanted DLLs.'
