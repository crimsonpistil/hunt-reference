    analyst_notes: 'SID-History injection is a high-impact domain privilege escalation that doubles as stealthy persistence, so it belongs in the priv-esc set even though it''s directory-centric rather than pure host. The sIDHistory attribute legitimately exists to support domain migrations (an account keeps its old SIDs so it retains access during a move). Attackers abuse it by injecting a privileged SID - Domain Admins (RID 512), Enterprise Admins (519) - into a normal account''s sIDHistory; Windows then honors those rights at every logon, transparently, so the account wields DA without ever appearing in the Domain Admins group. That invisibility to group-membership audits is exactly what makes it dangerous. Three injection routes: mimikatz sid::add (needs DA already - so it''s persistence after escalation), DSInternals offline NTDS editing, and DCShadow (lsadump::dcshadow) which registers a rogue DC and writes the attribute via replication to evade normal directory-change logging. Detection priorities: (1) DC Security 4765 (SID History added) and 4766 (failed attempt) - direct signals; (2) periodic enumeration of every account with non-empty sIDHistory, validating each against real migration records - on a single-domain forest sIDHistory should essentially be empty; (3) 4662 with DRSUAPI replication GUIDs from a non-DC for the DCShadow variant. Microsoft Defender for Identity detects both the injection and DCShadow natively and is the strongest single control if you have it. This requires DC-level audit logging (Directory Service Access auditing) to catch reliably - flag that as a prerequisite if it''s not enabled.'
