    analyst_notes: 'The runc binary overwrite (CVE-2019-5736) and the cgroups release_agent escape represent the more sophisticated tier of container escape, beyond simple privileged/socket misconfiguration. CVE-2019-5736 is notable because it weaponizes a routine administrative action: when an operator runs docker exec into a malicious container, the container overwrites the host''s runc binary, and the next invocation of runc executes attacker code as root on the host. This makes runc binary integrity the single most critical file-monitoring target on any container host - the runc binary should never change except during a controlled package update, so any modification is a critical incident warranting immediate response. The cgroups v1 release_agent escape is not a CVE but a feature abuse: a container with CAP_SYS_ADMIN can mount a cgroup hierarchy, set a release_agent path pointing to an attacker payload, and trigger it to execute as root on the host when a cgroup empties. The two preventive controls that eliminate this entire class are dropping CAP_SYS_ADMIN from containers (which removes the release_agent precondition) and migrating to cgroups v2, which removed the release_agent mechanism entirely. For detection, Falco ships a dedicated release_agent escape rule, and file integrity monitoring on /usr/bin/runc with SHA-256 is the essential complement. Track CVE-2024-21626 (Leaky Vessels) as the modern runc escape requiring updated patching.'
