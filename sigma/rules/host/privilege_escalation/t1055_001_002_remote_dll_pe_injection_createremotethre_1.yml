    analyst_notes: 'Remote-thread injection is the workhorse of post-exploitation - almost every C2 framework injects its beacon into a long-lived host process (explorer, svchost, rundll32) to survive the loader exiting and to blend in. The classic chain is OpenProcess -> VirtualAllocEx -> WriteProcessMemory -> CreateRemoteThread, and Sysmon EID 8 captures that final CreateRemoteThread directly. The single most useful refinement is the StartAddress / StartModule: a remote thread whose start address is in private or mapped memory not backed by a module on disk (StartModule null/blank) is very likely injected code, whereas legit cross-process threads start in a known module. Pair EID 8 with EID 10 OpenProcess events carrying VM_WRITE/ALL_ACCESS to the same target. Expect false positives from EDR/AV (MsMpEng, Falcon), debuggers, and some installers - baseline those source images. When you get a hit, confirm with memory tooling (PE-sieve/Moneta/Volatility malfind) which finds the executable non-image regions definitively. This row deliberately covers .001 (DLL) and .002 (PE) together since the detection surface - remote write + remote thread into a foreign process - is identical; the difference is only what gets written.'
