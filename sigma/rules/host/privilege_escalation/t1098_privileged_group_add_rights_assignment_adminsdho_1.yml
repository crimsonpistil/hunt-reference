    analyst_notes: 'Account Manipulation appears in the persistence file (group changes / password resets framed as maintaining access), so this row is the privilege-escalation angle: granting an attacker-controlled account elevated rights to climb. Three mechanisms share the row. First, privileged group membership - adding the account to Domain/Enterprise/Schema Admins, local Administrators, or the under-watched DA-equivalents (DnsAdmins, which reaches SYSTEM via a malicious ServerLevelPluginDll; Backup/Account/Server Operators) - detected by Security 4728/4732/4756. Second, dangerous user-right/privilege assignment - SeDebug (own any process -> SYSTEM), SeImpersonate (Potato -> SYSTEM), SeLoadDriver (BYOVD -> kernel), SeBackup/Restore, SeTakeOwnership - via 4704, often pushed through a GPO (ties to T1484.001). Third, AdminSDHolder/SDProp abuse - adding an ACE to CN=AdminSDHolder propagates control over every protected admin account hourly, a durable escalation-and-persistence combo, visible as a 5136 nTSecurityDescriptor change. Lead detection with crown-jewel group-membership monitoring and AdminSDHolder ACL change alerts - both are low-volume and extremely high-fidelity. BloodHound maps the AddMember/WriteDACL/GenericAll edges attackers use to perform these. This needs Security audit policy for group membership and Directory Service Changes enabled on DCs; Defender for Identity detects the group adds and AdminSDHolder manipulation natively. The line vs persistence is intent: here the account-rights change is the escalation step itself, not just a way back in.'
