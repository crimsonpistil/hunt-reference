    analyst_notes: 'Grouping eventvwr, CompMgmtLauncher, and cmstp here because they''re the next-tier auto-elevate abuses after fodhelper - less common now but still seen, and cmstp in particular doubles as an application-control bypass. eventvwr/CompMgmtLauncher work like fodhelper but via the mscfile class handler instead of ms-settings: the auto-elevating MMC launcher opens an .msc through HKCU\...\mscfile\shell\open\command, which the attacker has hijacked. cmstp.exe is different - it''s a signed Microsoft binary that processes Connection Manager INF files, and a crafted INF with a RunPreSetupCommands/CustomDestination section executes arbitrary commands auto-elevated. Detection priorities: the mscfile HKCU handler write is the cleanest eventvwr signal (legitimate software never touches it); for cmstp, watch for cmstp.exe running with /s and an .inf argument, especially an INF in a temp/user path. cmstp invocations are rare enough on most endpoints that nearly any occurrence merits a look. As with all UAC bypasses, hunt the behavior pattern (auto-elevator -> shell, or signed-binary -> arbitrary-INF) rather than the specific binary, since Microsoft does not service UAC as a security boundary.'
