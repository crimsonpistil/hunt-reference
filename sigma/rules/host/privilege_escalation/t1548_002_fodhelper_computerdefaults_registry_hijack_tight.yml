    analyst_notes: 'Fodhelper is the single most common UAC bypass in the wild because it''s reliable, file-less (registry-only), and works without admin. The mechanism: fodhelper.exe is auto-elevating (autoElevate=true in its manifest) and, when launched, queries HKCU\Software\Classes\ms-settings\Shell\Open\command to decide what to run - HKCU is user-writable, so an attacker plants their command there and fodhelper runs it elevated. The DelegateExecute empty-string trick forces the older Open\command path to be honored. Detection is reliable because legitimate software essentially never writes to the ms-settings class handler under HKCU. The strongest single signal is the registry write to that path; the second-best is an auto-elevating binary (fodhelper/computerdefaults/sdclt/slui) spawning cmd/powershell/rundll32. Correlate the two and false positives are near zero. Note that UAC bypass is NOT a privilege boundary Microsoft commits to defend - they treat it as a convenience feature - so these techniques persist version to version with new auto-elevating binaries replacing patched ones. Hunt by behavior (auto-elevator spawning a shell) rather than chasing the specific binary of the month.'
