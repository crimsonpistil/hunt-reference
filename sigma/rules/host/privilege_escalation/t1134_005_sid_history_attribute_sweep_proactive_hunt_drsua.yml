    analyst_notes: SID-History injection is a domain-level privilege escalation that survives password resets, group membership changes, and most remediation actions because SID-History is an attribute on the account object, not a group membership. The injected SID grants the same access as being a member of that group. In production environments, SID-History should be empty except during active domain migrations. A scheduled sweep (weekly or after any suspicious DC access) is the primary detection. BloodHound's HasSIDHistory edge visualizes the escalation path.
