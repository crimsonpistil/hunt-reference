    analyst_notes: 'Thread execution hijacking is the stealthier sibling of remote-thread injection: instead of CreateRemoteThread, the attacker opens an existing thread in the target, suspends it, points its instruction pointer at code they''ve already written into the process (SetThreadContext), and resumes it. The operational reason matters for hunting - it specifically exists to avoid Sysmon EID 8, which is the highest-fidelity injection signal most defenders rely on. So the detection inverts: hunt for the OpenThread/OpenProcess with THREAD_SET_CONTEXT + SUSPEND_RESUME rights (EID 10), ideally correlated with a PROCESS_VM_WRITE to the same target and the ABSENCE of any EID 8 to that process. That correlation is SIEM work, but the EID 10 set-context access leg is a usable starting filter on its own once you baseline debuggers (devenv, windbg, vsdbg) and EDR. Confirmation is the same as other injection: memory scanners (PE-sieve, Volatility malfind) find the injected executable region, and the hijacked thread''s context points into it. Treat this as a must-have companion to the CreateRemoteThread row - an environment that only watches EID 8 has a blind spot exactly the shape of this technique.'
