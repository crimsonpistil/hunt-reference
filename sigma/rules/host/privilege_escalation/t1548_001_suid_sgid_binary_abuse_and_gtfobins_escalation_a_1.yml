    analyst_notes: 'SUID/SGID abuse is the foundational Linux privilege escalation technique and the first thing nearly every post-exploitation enumeration script checks. A SUID binary executes with its owner''s privileges (commonly root) regardless of the invoking user, so any SUID binary capable of spawning a shell, writing arbitrary files, or reading protected files is a direct escalation path. The GTFOBins project catalogs every standard Unix binary that can be abused this way, and the list is longer than most defenders expect - find, awk, vim, less, env, tee, cp, dd, python, perl, and dozens more. The detection approach has two halves: a static posture audit (enumerate all SUID/SGID binaries and compare against a known-good baseline - the legitimate set on a stock system is small, roughly su, sudo, passwd, chsh, chfn, newgrp, gpasswd, mount, umount, pkexec, fusermount, ping, so anything outside that set deserves scrutiny, and any SUID binary outside /usr, /bin, /sbin is highly suspicious), and a behavioral signal (auditd execve capture where the effective UID becomes 0 while the audit/login UID is non-zero, which precisely identifies a SUID-to-root transition). A common attacker persistence pattern that doubles as re-escalation is dropping a SUID-root copy of bash in /tmp - watch for root-owned SUID binaries in writable directories. This row is the privilege-escalation counterpart to the SUID execution row on the Execution page; the distinguishing signal here is the euid transition to root.'
