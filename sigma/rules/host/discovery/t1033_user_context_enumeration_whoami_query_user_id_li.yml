    os: win
    query_block: 3 of 3
    original_query: 'process.name: ("id" OR "whoami" OR "w" OR "who")'
    sysmon: |-
        // Sysmon EID 1 - whoami with enumeration flags
        Image=*\\whoami.exe
        // /priv = checking for SeDebugPrivilege, /all = full enum

        // Session enumeration
        Image=(*\\query.exe OR *\\qwinsta.exe OR *\\quser.exe)

        // Suspicious parent: whoami from web server or LOLBin
        ParentImage=(*\\w3wp.exe OR *\\httpd.exe OR *\\rundll32.exe OR *\\mshta.exe)
    powershell: |-
        # User discovery detection
        Write-Host "[*] === whoami executions ==="
        Get-WinEvent -FilterHashtable @{
          LogName='Microsoft-Windows-Sysmon/Operational'; Id=1
        } -MaxEvents 5000 -EA SilentlyContinue |
          Where-Object { $_.Properties[4].Value -like '*whoami*' } |
          Select-Object TimeCreated,
            @{n='Parent';e={$_.Properties[20].Value.Split('\')[-1]}},
            @{n='CmdLine';e={$_.Properties[10].Value}}
    registry: |-
        No registry artifact. Detection is process-based.

        Key whoami output for threat assessment:
          /priv: SeDebugPrivilege = can dump LSASS
          /priv: SeImpersonatePrivilege = potato escalation possible
          /groups: Domain Admins = domain-level access already held
    ossdetect: |-
        Sigma:
        - win_proc_creation_whoami_execution.yml
        - win_proc_creation_whoami_priv_groups.yml
        Elastic:
        - Whoami Process Activity
    tools: |-
        Sysmon (EID 1 command line)
        Security EID 4688 (process creation)
        Auditd execve monitoring (Linux)
    actors:
