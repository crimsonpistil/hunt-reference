    analyst_notes: 'whoami alone is low-confidence. Detection value comes from context: parent process (whoami from w3wp.exe is post-exploit), flags (/priv and /all are attacker-oriented), and timing (whoami + ipconfig + net user within 30 seconds is a discovery burst). Focus on SEQUENCES rather than individual commands.'
