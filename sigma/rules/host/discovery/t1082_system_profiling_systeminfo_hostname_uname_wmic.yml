    analyst_notes: systeminfo is notable because it returns the hotfix list, which attackers cross-reference against known LPE CVEs. An attacker running systeminfo followed by searching hotfixes for missing patches is a distinct chain. On Linux, uname -a + cat /etc/os-release + dpkg -l is the equivalent sequence.
