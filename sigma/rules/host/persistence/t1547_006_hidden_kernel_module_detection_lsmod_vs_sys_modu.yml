    analyst_notes: 'The lsmod-vs-sysmodule comparison is the primary userland detection for LKM rootkits. Rootkits that hide from lsmod typically hook the /proc/modules read path but leave /sys/module/ intact because removing sysfs entries can cause kernel instability. The detection has a known false-positive source: built-in modules appear in /sys/module/ but never in lsmod. The sections/ directory check distinguishes them. For higher confidence, memory forensics (Volatility linux_check_modules) compares the in-kernel module list against the /proc/modules output at the memory level, catching even rootkits that hook both paths.'
