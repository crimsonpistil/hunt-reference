    analyst_notes: 'Registry Run Keys + Startup Folders is the single most common persistence technique on Windows - if a piece of malware persists, there''s a good chance it''s using one of these mechanisms. The technique is so common that detection cannot be ''alert on every Run key modification'' - that would be overwhelming. Tune by value-data context: alert on Run key writes where the target path is in AppData/Temp/ProgramData, contains an interpreter (powershell/cmd/wscript/mshta), or matches known suspicious patterns. HKCU variants don''t require admin privileges - any compromised user can persist their own session through HKCU\Run. The IFEO Debugger trick is worth understanding: setting an Image File Execution Options Debugger value causes Windows to launch the Debugger value instead of the original binary when the original is invoked - so hijacking sethc.exe (Sticky Keys), magnify.exe, or osk.exe creates accessibility-feature persistence that triggers from the logon screen. Pair this real-time detection with the next indicator (hunting all locations) for full coverage - real-time catches new persistence as it''s installed; hunting catches persistence that was installed before logging started or that bypassed Sysmon coverage.'
