    analyst_notes: 'Password reset and service account manipulation is a subtle form of persistence - the account already exists, so there''s no creation event to detect; the manipulation is purely a credential operation. The Windows Security event 4724 (admin reset another user''s password) is the primary signal but requires context to be useful: legitimate IT help desk operations cause this event constantly. Detection focus should be: who reset whose password, was the target a privileged or service account, was the resetter expected to perform that action, and was the target account used immediately after the reset from an unusual location. The ''pwdLastSet attribute hunt'' in the PowerShell script is a useful baseline-deviation approach: list all AD users whose password changed in the last 30 days, focus on privileged accounts and service accounts in that list. Krbtgt password reset is the high-value extreme of this technique - the krbtgt account encrypts all Kerberos TGTs, so adversaries who extract the krbtgt hash can mint ''golden tickets'' valid for years. This is why Microsoft recommends ''krbtgt double-tap'' (reset twice consecutively) after suspected compromise - one reset isn''t enough because Kerberos retains the previous key for backward compatibility. Pair this hunt with privileged group membership analysis (previous indicator) - account manipulation often combines with group additions for compound persistence.'
