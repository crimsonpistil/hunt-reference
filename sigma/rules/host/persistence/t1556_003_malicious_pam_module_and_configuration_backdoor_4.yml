    analyst_notes: 'PAM backdoors are among the most dangerous Linux persistence mechanisms because they sit directly in the authentication path for every service on the host - SSH, sudo, su, login, and any PAM-aware application. A backdoored pam_unix.so with a master password gives an attacker authentication bypass that survives password resets, account deletions, and service restarts. What makes this especially insidious is that the authentication still succeeds for legitimate users - the backdoor adds an additional credential that works alongside normal credentials, so defenders see no authentication failures and no anomalous access patterns. The credential harvesting variant is equally dangerous: since PAM receives plaintext passwords before hashing, a malicious PAM module can log every password entered on the system, capturing admin credentials for lateral movement. Primary detection approach: file integrity monitoring on PAM module directories plus package manager verification after any suspicious system change. If dpkg --verify libpam-modules or rpm -V pam returns a ''5'' flag (checksum mismatch) on pam_unix.so, treat as critical compromise until proven otherwise. For the config-only variant (adding pam_permit.so to /etc/pam.d/sudo or common-auth), the file integrity alert on /etc/pam.d/ is your primary signal.'
