    analyst_notes: 'Local account creation is a noisy persistence technique - Windows Security Event 4720 fires reliably on every new user. The challenge is volume in larger environments where IT operations create new accounts regularly. The detection focus should be context: was the creating user expected to have user management rights, was the new account added to a privileged group within minutes (4720 + 4732 correlation), was the new account used from an unusual location at first logon. The ''lifecycle pattern'' is the highest-fidelity signal: 4720 (create) -> 4722 (enable) -> 4724 (password set) -> 4732 (add to Administrators) -> 4624 (first logon) all within a short time window is the classic adversary chain. Legitimate IT onboarding usually has gaps between these events (separate help desk tickets, password coordination). Hidden accounts are a more sophisticated subset - SAM ACL manipulation makes the account invisible to Get-LocalUser, requiring offline SAM parsing to surface. The ''$'' suffix trick is sometimes used to hide accounts from casual review since many tools filter out ''$''-suffixed names assuming they''re computer accounts. Workstation account creation is rare in most environments - any 4720 on a workstation warrants investigation. Server account creation is more common but still worth context-checking. Pair with the T1098 indicators: account creation + group manipulation are often combined for compound persistence (new account + Administrators membership = backdoor admin).'
