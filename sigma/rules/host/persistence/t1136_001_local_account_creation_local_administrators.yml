        CommandLine matches:
          *user*/add*
          OR *New-LocalUser*

        // Security Event (more reliable - all creation methods):
        EventID=4720 (user account created - workstation/local)
        EventID=4722 (user account enabled - account just created
                      is implicitly enabled; this event often
