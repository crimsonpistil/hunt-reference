    analyst_notes: The sshd_config manipulation angle is the stealth evolution of SSH key persistence. Basic SSH key injection (adding a key to authorized_keys) is now well-monitored by FIM tools and osquery, so sophisticated operators have shifted to more subtle approaches. Redirecting AuthorizedKeysFile to a non-standard path (/etc/ssh/admin_keys, /var/lib/sshd/.keys) means the keys won't appear in standard authorized_keys audits. Setting AuthorizedKeysCommand to a script that dynamically fetches keys means the persistence survives even if the authorized_keys file is cleaned. Enabling PermitRootLogin is the simplest high-impact change because it eliminates the sudo/su audit trail that connects actions to a named user account. The sshd_config changes require a service reload to take effect, so the sshd restart event is a useful correlation point. For cloud environments, key injection via instance metadata API compromise is an additional vector where the key never touches authorized_keys directly but instead appears through the cloud provider's key management integration.
