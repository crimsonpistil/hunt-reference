    analyst_notes: 'SSH authorized_keys injection is one of the most effective and durable Linux persistence mechanisms because it grants interactive shell access that survives password resets, account locks, and even service restarts (sshd reads authorized_keys on each connection attempt). A key injected in an obscure user account''s authorized_keys file may persist for months or years if defenders focus remediation only on the primary compromised account. Two underdetected variants deserve special attention: (1) AuthorizedKeysCommand - sshd can be configured to execute a binary to determine authorized keys instead of reading a file; adversaries can set this to a script that always returns their key; (2) AuthorizedKeysFile pointing to an unconventional path - setting this in sshd_config to a world-readable file or a path the adversary controls means key injection persists even if ~/.ssh/ is cleaned. For cloud environments, the attack surface extends to metadata API abuse: AWS SSM, GCP OS Login, and Azure VM extensions can all push SSH public keys to authorized_keys from the control plane, bypassing host-side security controls entirely. Baseline the fingerprints of all authorized keys across your fleet and alert on any unrecognized fingerprint appearing.'
