    analyst_notes: 'LNK hijacking is the more sophisticated cousin of Startup folder LNK persistence. Instead of dropping a new shortcut in Startup, the adversary modifies a pre-existing shortcut the user already clicks regularly (browser, email client, IDE on the desktop or taskbar). The hijack triggers every time the user clicks that shortcut, providing persistence without a scheduled task or registry entry. The detection challenge: legitimate software occasionally modifies existing LNKs during updates (updating the target path when the binary moves to a versioned subdirectory), so ''any LNK modification'' is too noisy. The PowerShell hunt focuses on suspicious target characteristics (interpreter, user-writable path, risky arguments) and icon-vs-target mismatch which is a strong indicator of the wrapper-and-launch hijack pattern - the LNK still has Chrome''s icon but the target is now wrapper.exe. The technique is less common than Startup folder LNK persistence because it requires reading-and-modifying an existing file rather than just dropping a new one, but when found it''s higher-confidence malicious because legitimate software very rarely targets pre-existing user shortcuts for modification. Pair this hunt with T1204.002 (User Execution) which covers the execution side when the user clicks the hijacked LNK.'
