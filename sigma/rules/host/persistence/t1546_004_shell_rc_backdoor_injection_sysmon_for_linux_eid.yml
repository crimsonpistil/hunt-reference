    analyst_notes: 'Shell configuration backdoors are among the simplest and hardest-to-notice Linux persistence mechanisms because the files are always present and frequently modified by legitimate package managers and users. The detection challenge is identifying unauthorized modifications rather than the files themselves. The /etc/profile.d directory is the highest-impact target - a single .sh file there runs for every user on every login, making it functionally equivalent to a local group policy startup script. It is also one of the most overlooked directories because administrators focus on /etc/profile rather than its fragments directory. Critical case to understand: ~/.bash_logout is frequently used specifically to clear bash history (unset HISTFILE; history -c; rm -f ~/.bash_history) - if you see this in a user''s .bash_logout and it wasn''t there in the baseline, the attacker is covering tracks. This wipe happens on clean logout, not kill/crash, so it runs on normal SSH session end. For detection in environments without file integrity monitoring, look at shell config file mtimes against the last known legitimate modification (package install, user home creation); unexpected mtime changes post-deployment are strong indicators.'
