    analyst_notes: 'COM hijacking via HKCU shadow entries is one of the more sophisticated persistence techniques in Windows. The attack leverages a fundamental Windows COM resolution behavior: HKCU\Software\Classes is checked before HKLM\Software\Classes when resolving CLSIDs. This means any user can effectively override machine-wide COM object definitions for their own session - no admin required. The detection is genuinely difficult because legitimate software occasionally uses HKCU CLSID entries for per-user COM registration. The high-fidelity signal is the combination of (1) HKCU CLSID entry that shadows an existing HKLM entry AND (2) the HKCU target DLL points to user-writable / unsigned binary. Both conditions together are essentially zero false positive. Single-condition detection generates too much noise to be useful. The phantom variant (hijacking CLSIDs where HKLM exists but the DLL is missing) is more common in modern malware than the shadow variant because phantom hijacking doesn''t break the original application functionality. APT41 and ZxShell are the canonical examples but the technique appears across China-nexus operators broadly. The PowerShell hunt script is genuinely useful here because manual review of CLSIDs is impractical (thousands of legitimate COM objects exist); the script focuses specifically on the shadow + suspicious target combination that indicates malicious intent. Hexacorn''s blog series ''Beyond good ol'' Run key'' has the most thorough public coverage of COM hijack variants if you want to dig deeper.'
