    tools: |-
        Baseline sweep approach is critical when:
        - Real-time auditd was not deployed at compromise time
        - Attacker established persistence BEFORE logging was enabled
        - Investigating host with unknown dwell time

        Fleet-wide sweep tools:
        - Velociraptor: Linux.Sys.Crontab VQL artifact
          (enumerate, collect, compare fleet-wide)
        - osquery: crontab table (SELECT * FROM crontab)
        - Ansible/Salt: run cron snapshot playbook fleet-wide
        - PANIX --cron: simulates all cron persistence vectors
          for testing your baseline detection

        Known malware cron entry patterns:
        - Rocke: /etc/cron.d/apache  (spoofed name, curl | bash)
        - TeamTNT: every-minute entries downloading from 
          cloud-provider-spoofed C2 domains
        - Generic miner: /tmp/ or /var/tmp/ payload paths
        - ESXiArgs: /var/spool/cron/crontabs/root directly

        Hunting additional @reboot-equivalent persistence:
          systemctl list-timers --all
          (systemd timers: see T1053.006 for full coverage)
    actors:
        - Rocke
        - TeamTNT
    analyst_notes: 'The sweep approach is essential when you cannot trust that real-time detection caught every persistence write - either because auditd wasn''t running or because the adversary disabled logging temporarily. Key anomalies to prioritize: (1) @reboot entries not associated with a known package installation, (2) entries with paths in /tmp, /dev/shm, /var/tmp, or user home directories, (3) entries with download commands (curl, wget, python -c), (4) frequency higher than daily for root-owned entries (legitimate system jobs almost never need every-minute execution), (5) cron entries that reference files with names mimicking system components (systemd-update, network-manager, atd). The cron.allow / cron.deny pair is frequently overlooked: if cron.deny is deleted and cron.allow does not exist, ALL users can create crontabs. Adversaries who gain a low-privilege shell may delete cron.deny to allow their compromised user account to schedule tasks. Baseline the existence and content of both files.'
