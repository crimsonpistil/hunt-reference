    analyst_notes: '/etc/profile.d/ is the most dangerous shell config persistence target because a single .sh file there executes for every user on every login, equivalent to a GPO startup script. Administrators focus on /etc/profile and ~/.bashrc, making profile.d a blind spot. The detection approach: enumerate all .sh files in profile.d, verify each against the package manager, and flag unpackaged scripts. Any script containing network commands (curl, wget, /dev/tcp) or encoding (base64) is high-confidence malicious.'
