    analyst_notes: 'ServiceDll hijack is a more sophisticated persistence technique than basic service installation - it specifically targets the svchost-hosted service model where multiple services share a single host process. The detection pivot is that you''re not looking at the ImagePath (which is legitimate svchost.exe), you''re looking at the Parameters\ServiceDll value which actually points to the executable code. This is a high-value indicator when found because it''s predominantly associated with deliberate, capable operators rather than commodity malware - most opportunistic infections use simpler Run key or service-with-EXE persistence rather than going through the trouble of building a proper ServiceDll. ShadowPad and PlugX malware families are the canonical examples and are heavily associated with China-nexus APT operations. The KnownDLLs registry protection does NOT apply here since the DLL is loaded by explicit path, not search order - so this technique works regardless of DLL search order hardening. False positives: legitimate Microsoft services use ServiceDll extensively (it''s the standard svchost service pattern), so the filter must include ''path outside System32/SysWOW64'' and ''unsigned'' to surface anomalies. Pair the Sysmon EID 13 real-time detection with the PowerShell hunt for full coverage.'
