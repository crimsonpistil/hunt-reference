    analyst_notes: 'This indicator covers the COM hijack variants beyond simple HKCU shadow attacks - phantom DLL hijacking, TreatAs redirection, and ProgID->CLSID hijacking. These are increasingly sophisticated and increasingly rare to detect because defender tooling rarely covers all of them. Phantom hijacking is particularly worth understanding: many Windows installations have HKLM CLSID entries that point to DLLs that no longer exist (legacy software references, removed components, version-specific paths). An adversary can fill these phantom entries via HKCU shadow without ''breaking'' anything - the legitimate application was already broken (the DLL was missing), and now suddenly the CLSID resolves to attacker code. The phantom-CLSID hunt in the PowerShell script identifies these opportunities proactively: enumerate HKLM CLSIDs, check each referenced DLL for existence on disk, surface the mismatches. Run this on a clean baseline reference and on suspect hosts; new phantoms-filled-in on the suspect host indicate hijacks. TreatAs redirection is even rarer in legitimate software and is essentially zero false positive when found - it''s an alternative key under a CLSID that says ''use this OTHER CLSID instead.'' Adversaries use it because most COM hunting tools don''t check the TreatAs key at all. The Hexacorn blog series remains the canonical public reference for understanding the full breadth of COM-related persistence; if you''re seriously hunting this technique, that''s where to look for additional variants beyond what''s covered here.'
