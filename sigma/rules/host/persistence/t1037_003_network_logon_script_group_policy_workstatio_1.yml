    analyst_notes: 'GPO-based persistence (T1037.003) is one of the highest-impact persistence techniques in Active Directory environments because a single GPO modification on a domain controller can establish persistence on every workstation joined to the domain. This is a ''force multiplier'' technique - it requires more initial access (domain admin) but provides exponentially more persistence reach than per-endpoint techniques. The technique is heavily documented in ransomware incident response: ransomware operators commonly compromise domain admin, then push deployment via GPO logon script to ensure ransomware runs on every workstation at next logon. Detection is split between endpoint and DC: endpoint detection focuses on the local GroupPolicy cache and gpscript.exe parent process events; DC detection focuses on AD audit events (5136/5137) on GPO objects and SYSVOL file changes. The endpoint side alone is not sufficient because the artifact source is the DC - a GPO change replicates to all workstations, and by the time you notice at one workstation, hundreds may already be affected. Pair endpoint detection with DC-side audit log forwarding and SYSVOL file change monitoring for full coverage. T1037.001 (registry-based logon script) is per-user / per-endpoint scope; T1037.003 (GPO) is domain-wide scope - the difference in impact is enormous.'
