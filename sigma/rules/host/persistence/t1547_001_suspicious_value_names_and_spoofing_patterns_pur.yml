    analyst_notes: 'Value name analysis is a behavioral fingerprinting approach to autostart hunting - it asks ''does this entry look like something a legitimate vendor would create, or does it look like an adversary''s attempt to blend in?'' The detection is necessarily fuzzy because legitimate software does occasionally use random-looking or generic value names, and adversaries with good opsec choose names that match the actual installed software on the target host. The strongest signals combine multiple flags: a Microsoft-sounding value name pointing to a binary in AppData is high-confidence malicious; a Microsoft-sounding value name pointing to a binary in C:\Program Files\Microsoft is probably legitimate. The ''name spoof + path mismatch'' pattern is the highest-value single check because legitimate Microsoft software is consistently installed under Program Files paths, never in user-writable directories. Pair this hunt with the previous indicator''s general autostart sweep - this indicator adds the spoofing/naming dimension that pure path-based detection might miss. False positives are inherent here - run this as a triage prioritizer, not a final alert.'
