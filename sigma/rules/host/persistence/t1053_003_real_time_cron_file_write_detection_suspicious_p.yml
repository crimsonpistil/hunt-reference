    analyst_notes: 'Cron is the single most common Linux persistence mechanism for opportunistic threat actors. Unlike Windows Run keys, cron entries require no active session - they survive reboots, user logouts, and process kills, re-executing on schedule. The @reboot directive is the highest-value IOC: it''s rarely used by legitimate software and is explicitly designed to run at startup, making it functionally identical to a Windows RunOnce key. Any @reboot entry written by a non-package-manager process should be investigated immediately. The /etc/cron.d directory is a major blind spot - administrators often monitor /etc/crontab but forget that individual files in /etc/cron.d receive no human review. Adversaries exploit this by naming their cron fragment after a legitimate package (systemd-update, network-manager-cron) to blend with expected entries. User-level crontabs in /var/spool/cron/crontabs are writable by any valid user without root - this means a compromised unprivileged account can establish cron persistence that survives across sessions. Detection strategy: pair file-integrity monitoring on all cron paths with process-creation events for the crontab binary; alert on any crontab execution from non-standard parents (web server processes, SSH sessions, unknown daemons). Run a scheduled baseline comparison of all cron content against known-good state.'
