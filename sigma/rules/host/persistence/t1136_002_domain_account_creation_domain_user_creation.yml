    analyst_notes: 'Domain account creation (T1136.002) is significantly higher impact than local account creation because the resulting account has domain-wide reach - it can authenticate to any workstation in the domain. The detection point is the Security log on the domain controller, not the workstation. This requires AD audit log forwarding to your SIEM and ensuring DC Security logs are actually being collected (a surprising number of environments don''t forward DC logs centrally). The DS audit events (5136/5137) provide more detail than the user creation events but require Directory Service auditing to be enabled in Group Policy - check your audit configuration if these aren''t appearing. The ''CN=Users default container'' hunt in the PowerShell script is a useful soft signal: legitimate AD admins typically move new accounts to proper OUs after creation, while adversary-created accounts are often left in the default Users container. SPN attribute presence on a new user account is another useful flag - normal user accounts rarely have SPNs, but adversaries set them to enable Kerberoasting. Computer account creation (T1136.003) is sometimes preferred by adversaries because computer accounts have different audit characteristics and some defensive tools filter them out of user-focused queries. The compound pattern - 4720 (create) + 4724 (set password) + 4728 (add to Domain Admins) + 4624 (logon) in close time proximity - is the classic adversary chain and the highest-fidelity multi-event correlation for this technique.'
