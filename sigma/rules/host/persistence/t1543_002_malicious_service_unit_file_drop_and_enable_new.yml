    analyst_notes: 'Systemd service persistence is the Linux equivalent of creating a Windows service - it requires root for system-level units but only a valid user account for user-level units in ~/.config/systemd/user. The asymmetry matters: system services run as root and start at boot; user services run as the owning user and start at user login. Attackers frequently use system services for the stronger persistence guarantee. The ExecStart path is the primary IOC: legitimate system services almost never point to /tmp, /dev/shm, or home directories. The Restart=always directive is a second-order IOC - it ensures the payload respawns if killed, exactly what a defender would do during remediation. For detection, the strongest signal is a new .service file appearing in /etc/systemd/system that was not created by a package manager (apt, yum, dpkg, rpm). Diff the mtime of all .service files against the last known package installation timestamp. Systemd generators are an advanced and underdetected variant: executables placed in generator directories run at boot before normal services and can dynamically create additional unit files, making them a persistent foothold that survives even removal of the visible .service artifact.'
