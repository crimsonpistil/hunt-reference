    analyst_notes: 'SysV init.d persistence is a legacy mechanism that remains effective because (a) systemd''s sysv-generator compatibility layer still runs these scripts on modern systems, and (b) many defenders only audit systemd units, not init.d. The same package-verification approach works: enumerate all init.d scripts, verify against the package manager, flag unpackaged scripts. Scripts pointing at binaries in /tmp, /dev/shm, or user home directories are high-confidence malicious. On ESXi hosts, /etc/rc.local.d/ is the primary persistence mechanism since ESXi uses a custom init, not systemd.'
