    analyst_notes: 'Privileged group manipulation is one of the most consequential persistence techniques because it directly grants the adversary administrative authority. The detection lives primarily in Windows Security events (4732 for local groups, 4728/4756 for domain global/universal groups) rather than Sysmon - Security log monitoring is essential for this technique. The high-value events to monitor are additions to: built-in Administrators (SID S-1-5-32-544), Domain Admins (RID 512), Enterprise Admins (RID 519), and Schema Admins. Nested group abuse is worth understanding: defenders often check direct Administrators membership but miss nested memberships - if ''Help Desk'' is a member of ''Administrators'' and the adversary adds themselves to ''Help Desk'', direct enumeration misses them. The recursive enumeration in the PowerShell script handles this. The ''add and wait'' pattern is the classic long-dwell adversary tradecraft: backdoor account added, then sits unused for weeks while initial intrusion artifacts are investigated and cleaned. Membership snapshot comparison against a known-good baseline is the only reliable detection for this pattern - real-time event detection works for fresh additions but misses pre-existing manipulation. PingCastle is genuinely useful for proactive AD security review; if you have RSAT and AD access, run it on a domain controller periodically.'
