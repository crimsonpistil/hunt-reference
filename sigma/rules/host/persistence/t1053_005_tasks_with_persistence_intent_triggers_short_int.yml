    analyst_notes: 'This is the persistence-hunting counterpart to T1053.005 in Execution. The Execution side covers task CREATION (real-time schtasks.exe and Security EID 4698); this side covers HUNTING established tasks with persistence-specific characteristics. The detection narrows by trigger type: OnLogon, AtStartup, OnEvent, and SessionStateChange are the persistence-intent trigger families. Time-based triggers can be persistence (daily/weekly recurring) but are also legitimate for many scheduled jobs - they need additional context (action analysis) to classify. Short recurring intervals (PT1M-PT15M) are a strong signal for beacon-style persistence: legitimate tasks rarely repeat that frequently, while adversary beacons commonly do. The combination ''OnLogon trigger + action invokes powershell + action contains EncodedCommand or AppData path'' is high-confidence malicious - any one of those alone has false positives, but the combination is rarely legitimate. Pair this hunt with the Execution side''s third indicator (task action hunting) for full coverage: this indicator filters by trigger type, that one filters by action path - together they catch the persistence-intent + suspicious-execution combination from both angles.'
