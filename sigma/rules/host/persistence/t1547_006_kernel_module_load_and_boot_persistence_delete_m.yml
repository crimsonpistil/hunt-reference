    analyst_notes: 'Kernel module rootkits are the highest-severity Linux persistence mechanism - once loaded, they operate at Ring 0 (kernel privilege level) and can subvert all userland detection tools, including the auditd daemon that''s supposed to catch them. The critical detection window is the module load event itself: once a rootkit is running, it can hide its own syscall table hooks, file entries, and module list presence. This makes init_module/finit_module syscall alerting (via auditd) the most important real-time signal - it fires before the rootkit can establish its hooks. The discrepancy technique for hunt mode is powerful: compare lsmod output against /sys/module/ directory listing. Some rootkits remove themselves from the module doubly-linked list (which lsmod reads) but cannot remove their /sys/module/ directory entry without kernel modification. The kernel taint flag in /proc/sys/kernel/tainted is another quick check: any value other than 0 indicates a module loaded that the kernel considers non-clean (unsigned, out-of-tree, or flagged). For investigations on potentially compromised hosts, do not trust userland tools if you suspect an active rootkit - collect a memory image using a trusted binary (AVML, LiME) from a separate storage path and analyze offline with Volatility.'
