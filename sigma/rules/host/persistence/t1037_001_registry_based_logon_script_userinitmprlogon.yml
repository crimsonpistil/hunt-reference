    analyst_notes: 'T1037.001 covers a small but high-signal cluster of logon script triggers. UserInitMprLogonScript is the most under-monitored: it''s an obscure registry value that has essentially no legitimate use in modern Windows environments, so any value set there is high-confidence malicious. Compare to Run keys where dozens of legitimate entries exist - a UserInitMprLogonScript value is anomalous on first principles. The Winlogon\Userinit append trick is more dangerous (runs as SYSTEM, machine-wide) and produces a distinctive artifact: the default value C:\Windows\system32\userinit.exe, (with trailing comma) is well-known, so any deviation immediately stands out. The AppInit_DLLs technique was historically common but is largely defunct on modern Windows (Secure Boot disables it by default since Windows 8) - still worth checking on older systems or environments without Secure Boot enforced. The userinit.exe parent-process check in Sysmon EID 1 is the execution-time complement: userinit.exe spawning anything other than explorer.exe at logon time is worth investigating. This is the kind of technique that finding even once strongly suggests deliberate adversary presence - commodity malware rarely bothers with these because Run keys are simpler and work fine.'
