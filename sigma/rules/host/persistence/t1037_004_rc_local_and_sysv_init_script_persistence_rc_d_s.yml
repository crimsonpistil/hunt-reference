    analyst_notes: 'RC scripts are a legacy persistence mechanism that remains highly relevant because /etc/rc.local is still present and functional on most modern Linux distributions (typically bridged through the systemd rc-local.service compatibility unit). Unlike systemd services, rc.local requires no service file, no systemctl enable, and generates minimal audit artifacts if auditd isn''t watching the file. On many default installations, /etc/rc.local exists but is empty or absent, making any new content immediately suspicious. The two-step detection: (1) watch for writes to /etc/rc.local and /etc/init.d/* in real time via auditd or file integrity monitoring; (2) sweep for anomalous content (especially payloads in /tmp, curl/wget, background processes with &) in any existing init scripts. SysV init.d scripts are slightly more complex because they require both the script file and rcN.d symlinks for autostart - however, the update-rc.d binary execution is a high-confidence signal, especially if invoked by a non-root user or a suspicious parent process. On ESXi, /etc/rc.local.d/*.sh is the equivalent and has been exploited by ransomware operators. Verify ESXi init scripts against VMware''s published baseline or your golden image.'
