    analyst_notes: 'mshta child-process detection catches the second stage: after the HTA/inline script executes, it almost always spawns a shell or LOLBin for the next phase. The parent-child edge mshta->powershell or mshta->cmd is high-confidence malicious with near-zero false positives in enterprise environments. Combining the network egress (remote HTA fetch) with the child spawn (script execution) gives a two-event chain that is essentially proof of the full attack sequence.'
