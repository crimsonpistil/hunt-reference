    analyst_notes: 'Kernel-mode LKM rootkits are the most powerful Linux rootkit class because, running in ring 0, the module rewrites what every userspace tool sees: once loaded and hooked, ps, ls, lsmod, ss, and find ask the kernel and the kernel lies, which is why naive host triage fails against a competent LKM rootkit. They hide by hooking the syscall table or using ftrace to intercept getdents64 (files), the /proc readers (PIDs), tcp_seq_show (ports), and the module-list iterator (themselves), filtering out anything matching a magic prefix or value. The hunter''s response is to distrust the hooked tools and cross-check: walk /proc directly and diff against ps to find hidden PIDs, read /proc/net/tcp and diff against ss for hidden ports, diff /sys/module against lsmod for the hidden module, and check /proc/sys/kernel/tainted because loading an out-of-tree or unsigned module sets taint bits that persist until reboot and that the rootkit cannot easily hide. The strongest out-of-band truth is memory forensics, where Volatility''s linux_check_syscall, linux_check_modules, and linux_hidden_modules read kernel structures the userspace hooks do not cover. The decisive early control is catching the load itself: if the init_module audit event ships off-box the instant it fires, you have proof of load even after the rootkit hides itself. This is especially relevant in OT and ICS fleets, where a single tailored .ko built for a known static kernel can be reused widely and sparse monitoring means long dwell time, making taint-flag and module-load monitoring cheap, high-value controls. This row is the rootkit/hiding lens on the same load mechanism that persistence T1547.006 covers from the persistence angle.'
