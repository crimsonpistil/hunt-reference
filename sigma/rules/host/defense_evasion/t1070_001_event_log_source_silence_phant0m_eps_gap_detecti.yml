    analyst_notes: 'Phant0m is the advanced variant of event log evasion: instead of clearing logs (which writes EID 1102), it suspends the threads of the EventLog service process so no new events are written at all. The service remains in ''Running'' state, so sc query and services.msc show no anomaly. The only on-host tell is the EID 10 ProcessAccess event showing the attacker opening the service''s svchost with thread-manipulation rights, but that event itself might not be written if Sysmon''s logging is also disrupted. The reliable detection is SIEM-side: a host that normally generates Security events going silent while heartbeat/Sysmon traffic continues flowing. This gap-based detection catches Phant0m regardless of implementation variant.'
