    analyst_notes: 'Disabling security tools is a standard pre-payload step where an adversary clears the field before deploying a miner, ransomware, or backdoor, and on Linux servers it prominently includes cloud-provider agents, which is a defining behavior of several cryptomining crews. The signature cloud TTP, extensively documented for Rocke, TeamTNT, and 8220 Gang, is shipping uninstall routines that specifically target Alibaba Cloud (aegis/AliYunDun) and Tencent Cloud (YunJing) host-security agents by calling the vendors'' own uninstall paths, a behavior so consistent it serves as an attribution signal. More generally, adversaries stop, kill, mask, or remove agents like Falco, Wazuh, osquery, ClamAV, and commercial EDR sensors, with masking favored over stopping because it prevents auto-restart. The decisive defensive principle is the external-console model: an on-host kill blinds the host locally, but agents that stream to an external manager turn the kill into a server-side alert, because the agent-down or missing-heartbeat event fires from infrastructure the attacker cannot reach, so local evasion becomes remote detection. The complementary principle is layered sensors, where auditd, Falco, and an EDR provide overlapping coverage so that disabling one is witnessed by another, for example auditd recording the pkill of Falco while Falco records the stop of auditd. For hunting, the highest-signal indicators are an expected agent in inactive or masked state, an agent install directory present without its running process (the uninstall tell), kill or pkill targeting known agent process names, and security packages appearing in removal logs.'
