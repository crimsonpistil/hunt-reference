          comm=$(cat /proc/$pid/comm 2>/dev/null)
          # does the name look like a kernel thread?
          case "$comm" in
            kworker*|kthreadd|ksoftirqd*|migration*|kswapd*|kdevtmpfs*|rcu_*|watchdog*|kcompactd*|khugepaged|kintegrityd*|\[*\]*)
