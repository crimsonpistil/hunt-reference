              [ -n "$cmdline" ] && fake=1
              [ -n "$maps" ] && fake=1
              [ "$ppid" != "2" ] && [ "$pid" != "2" ] && fake=1
              if [ "$fake" = "1" ]; then
                echo "[FLAG] PID $pid comm='$comm' is NOT a real kernel thread:"
