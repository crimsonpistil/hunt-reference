    tools: |-
        Disabling SELinux / AppArmor:

        Mandatory Access Control (MAC) is a containment layer: even
        after gaining code execution, a process is confined to what its
        SELinux domain or AppArmor profile permits. Adversaries disable
        MAC to break out of that confinement before escalating,
        persisting, or loading kernel components.

        SELinux:
          setenforce 0 is the one-liner - instantly drops to permissive.
          Editing /etc/selinux/config makes it survive reboot. The
          thorough move is SELINUX=disabled plus a GRUB selinux=0, which
          removes SELinux telemetry entirely. Permissive is a softer
          step that still logs denials (leaving evidence).

        AppArmor:
          aa-teardown unloads everything; aa-complain flips profiles to
          log-only; symlinking into /etc/apparmor.d/disable/ persists.
          apparmor_parser -R surgically removes a single profile (e.g.
          just the one confining the service the attacker is abusing).

        Why it is detectable:
          Both systems emit their own audit records on state change
          (SELinux MAC_STATUS / MAC_CONFIG_CHANGE). The runtime state
          is trivially queryable (getenforce / aa-status), so a simple
          scheduled posture check catches a host that has been flipped.
          And because MAC config lives in well-known files, FIM on
          /etc/selinux/config and /etc/apparmor.d/ flags tampering.

        The OT/ICS angle:
          Many hardened/regulated Linux deployments mandate enforcing
          SELinux. A host dropping to permissive/disabled is both a
          security event AND a compliance violation - doubly worth
          alerting in those environments.

        Threat actor use:
          setenforce 0 and AppArmor teardown appear broadly in Linux
          intrusion playbooks, especially where the next step needs
          filesystem or kernel access the MAC policy would block (web
          shell breakout, module loading, container escape prep).
    analyst_notes: 'SELinux and AppArmor are mandatory access control layers that confine what a process can do even after an adversary gains code execution, so disabling them removes containment before the attacker escalates, persists, or loads kernel components. On SELinux systems the one-liner setenforce 0 instantly drops to permissive mode, editing /etc/selinux/config makes the change survive reboot, and the thorough approach combines SELINUX=disabled with a GRUB selinux=0 to remove SELinux telemetry entirely. On AppArmor systems aa-teardown unloads all profiles, aa-complain flips profiles to log-only, symlinking into /etc/apparmor.d/disable/ persists the change, and apparmor_parser -R surgically removes just the profile confining the service being abused. A useful nuance is the difference between permissive and disabled: permissive mode still logs AVC denials and preserves some forensic value, while disabled produces no telemetry at all, so an attacker choosing disabled is more thorough. These actions are highly detectable because both systems emit their own audit records on state change (SELinux MAC_STATUS and MAC_CONFIG_CHANGE), the runtime state is trivially queryable with getenforce or aa-status, and the config lives in well-known files suited to file integrity monitoring. The simplest reliable control is scheduled posture monitoring that asserts getenforce equals Enforcing and AppArmor profiles are in enforce mode, alerting on any deviation. In OT, ICS-adjacent, and other regulated Linux deployments that mandate enforcing MAC, a host dropping to permissive or disabled is simultaneously a security event and a compliance violation, making it doubly worth alerting.'
