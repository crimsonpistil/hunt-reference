    analyst_notes: 'Indicator blocking is the proactive counterpart to log clearing: where T1070 reactively deletes evidence that already exists, T1562.006 stops the host from generating or shipping telemetry so the evidence never forms, which a sophisticated operator prefers because there is nothing to recover if it was never written or never sent. The suppression chain runs from local to network: killing or disabling the logging daemon stops local logs; stripping only the forwarding directive while leaving the daemon running is subtler because logs still write locally and look normal but nothing reaches the SIEM; disabling audisp-remote keeps auditd running and apparently healthy while audit events never leave the host; and network-layer blocking via an egress DROP to the collector or poisoning the collector''s name in /etc/hosts or DNS means telemetry is generated and even queued but never delivered. The decisive control is ingestion-gap detection, because every one of these methods produces the same observable on the collector side, namely a host that used to send data stops sending it, so a source-silence rule that alerts when an expected source has sent nothing for a defined interval while still being reachable catches all of them regardless of technique and fires from infrastructure the attacker cannot touch. This is the indicator-blocking analogue of the auditd events-per-second gap, and detecting the forwarding break early, before any local wipe, preserves the off-box copy that solves the case. The full anti-telemetry stack combines T1562.006 (break forwarding), T1562.012 (disable auditd), and T1070.002 (wipe local logs), so detecting the forwarding break is the highest-leverage early intervention, and managing logging configuration as code with drift detection or chattr +i immutability resists the edits in the first place.'
