    analyst_notes: 'Defender exclusion abuse has largely replaced outright disabling as the preferred evasion technique for sophisticated operators, because (a) Tamper Protection blocks the DisableAntiSpyware and DisableRealtimeMonitoring registry writes on MDE-enrolled systems, but does NOT block exclusion additions, and (b) exclusions are quieter in logs than full disablement. The exclusion typically targets the staging directory (C:\ProgramData\<folder>, a user Temp path, or the entire C:\ drive in aggressive cases) or the specific payload process name. Hunting for exclusions is therefore high-value: any exclusion pointing at a non-standard path, particularly one added by PowerShell or reg.exe rather than Group Policy, should be investigated. The Defender Operational log (EventID 5007) records configuration changes including exclusion additions but is often overlooked in favor of the Security log. Combining Sysmon EID 13 (who wrote the key) with Defender Operational 5007 (what changed) gives full attribution.'
