    analyst_notes: 'Disabling the Linux audit system is the keystone evasion technique, because auditd is the telemetry source that underpins detections for nearly every other Linux technique in this reference, so disabling it does not merely hide one action, it blinds the host. A knowledgeable adversary intending sustained access tampers with auditd early, which means any sign of audit tampering should immediately raise the severity of the entire investigation. The methods range from crude runtime disablement (auditctl -e 0, systemctl stop auditd) through selective rule flushing (auditctl -D, or editing rules.d to drop only the rules that would catch the operator while leaving auditd nominally running) to persistent config tampering (auditd.conf with log_file=/dev/null or disabling at boot). The defender retains the upper hand through three mechanisms. First, auditd narrates its own death: CONFIG_CHANGE, DAEMON_END, and DAEMON_ABORT are themselves audit events, and if forwarded off-box via audisp-remote they cannot be retracted. Second, the event-volume gap, where a live host abruptly stops sending audit events while still emitting other logs, is one of the most reliable detections in the whole tactic and catches disablement regardless of method. Third, immutable mode (auditctl -e 2) locks the configuration so changes require a reboot, forcing any adversary to generate a loud, attributable event to alter auditing. Running Falco alongside auditd adds critical cross-coverage because Falco uses its own eBPF or kernel-module source and still observes the auditctl or kill commands even when auditd itself is down. This is especially important in OT and ICS-adjacent Linux where monitoring is already sparse.'
