    tools: |-
        Clearing Windows event logs:

        The classic Windows anti-forensic act, and one with a built-in
        safety net for the defender: the clear operation writes its own
        obituary. Clearing the Security log generates EventID 1102, and
        clearing any other log generates System EventID 104, both from
        the Microsoft-Windows-Eventlog provider. These are produced by
        the clear API itself, so wevtutil cl, Clear-EventLog, and the
        .NET EventLog.Clear() all leave the record behind. The presence
        of a 1102 (with the clearing account) or a 104 is therefore a
        high-confidence detection on its own.

        The sophisticated evasion - and how it fails differently:
          To avoid the 1102, attackers turn to the EventLog SERVICE rather
          than the clear API. Phant0m enumerates the threads of the svchost
          hosting the Windows Event Log service and suspends/kills the ones
          doing logging. Result: the service still reports Running, no 1102
          is written, but logging silently stops. This defeats the 1102
          hunt but creates a louder signal for anyone watching VOLUME: the
          host simply stops emitting Security events. Source-silence /
          agent-stopped-reporting alerting catches it.

        The decisive control (same as the Linux story):
          Forward events off-box. Windows Event Forwarding to a WEC
          collector, or a SIEM agent streaming in near-real-time, makes
          local clearing pointless - the events are already gone from the
          attacker's reach. A 1102 on the endpoint combined with a
          forwarding gap is about as clean a detection as host evasion
          offers. This is the direct Windows analogue of the off-box
          forwarding control that anchors Linux T1070.002.

        Forensic recovery:
          even after a clear, prior records are often recoverable: carve
          the .evtx free space and unallocated disk, pull the forwarded
          copy from the collector, and check the file-size/mtime drop on
          Security.evtx as corroboration of when the clear happened.

        Threat actor use:
          log clearing is near-universal in cleanup. Destructive and
          financial Lazarus/APT38 operations clear logs; ransomware crews
          (Ryuk, Conti and successors) routinely wevtutil cl during
          pre-encryption staging; and Russian and Chinese intrusion sets
          clear logs as part of anti-forensic hygiene.
