        Windows Event Log artifacts and configuration:

        Self-record events (auto-written by the clear - the primary tell):
          Security channel  EventID 1102  "the audit log was cleared"
            (also records the account that performed the clear)
          System  channel   EventID 104   a named event log was cleared
          Provider: Microsoft-Windows-Eventlog. The clear API writes these
          as part of clearing, so an attacker cannot wevtutil their way out
          of leaving a 1102/104. ONLY avoiding the clear API (Phant0m
          thread suspension) avoids them - at the cost of total silence.

        Log files on disk:
          %SystemRoot%\System32\winevt\Logs\*.evtx
          a Security.evtx suddenly small and freshly timestamped is a
          strong post-clear artifact; carve prior records with EVTX tools.

        EventLog service + channel config (registry):
          HKLM\SYSTEM\CurrentControlSet\Services\EventLog
          HKLM\SYSTEM\CurrentControlSet\Services\EventLog\<Channel>
            File          - log path (relocation/redirection abuse)
            MaxSize       - shrink to force silent rollover/loss
            Retention / AutoBackupLogFiles
          HKLM\SOFTWARE\Microsoft\Windows\CurrentVersion\WINEVT\Channels\
            <Channel>\Enabled = 0   - disabling a channel outright

        Phant0m / service-thread technique:
          the Windows Event Log service runs inside a shared svchost.exe;
          killing or suspending its worker threads halts logging while the
          service still shows Running and NO 1102 is written. Tells: a
          total stop of Security events (source-silence), thread anomalies
          in the hosting svchost, and EID 4719 if audit policy was touched.

        The control that beats all local clearing:
          Windows Event Forwarding (WEF) to a collector, or a SIEM agent
          shipping near-real-time. Once events are off-box, local clearing
          is moot, and a 1102 plus a forwarded gap is high-confidence. This
          mirrors the off-box-forwarding control used for Linux T1070.002.
