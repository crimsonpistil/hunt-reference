    powershell: |-
        # T1070.001 - Windows event log clearing hunt
        # 1102 (Security) and 104 (System) are auto-written by the clear
        # itself, so their PRESENCE is the primary tell. Phant0m avoids
        # them by killing the service threads - hunt the resulting silence.

        Write-Host "[*] === Security-log-cleared (1102) events ==="
        Get-WinEvent -FilterHashtable @{LogName='Security';Id=1102} -MaxEvents 20 -ErrorAction SilentlyContinue |
          Select-Object TimeCreated, @{n='ClearedBy';e={$_.Properties[1].Value}} | Format-Table -Auto

        Write-Host "[*] === Log-file-cleared (104) events (System) ==="
        Get-WinEvent -FilterHashtable @{LogName='System';Id=104} -MaxEvents 20 -ErrorAction SilentlyContinue |
          Select-Object TimeCreated, @{n='Channel';e={$_.Properties[0].Value}}, @{n='User';e={$_.UserId}} | Format-Table -Auto

        Write-Host "[*] === EventLog service health (Phant0m: Running but silent) ==="
        Get-Service EventLog | Select-Object Status, StartType | Format-Table -Auto
        $last = Get-WinEvent -LogName Security -MaxEvents 1 -ErrorAction SilentlyContinue
        Write-Host ("    Newest Security event: " + $(if($last){$last.TimeCreated}else{'NONE - investigate immediately'}))

        Write-Host "[*] === Per-log record counts + oldest record (resets/gaps) ==="
        foreach($l in 'Security','System','Application','Microsoft-Windows-Sysmon/Operational','Microsoft-Windows-PowerShell/Operational'){
          $li = Get-WinEvent -ListLog $l -ErrorAction SilentlyContinue
          if($li){ Write-Host ("    {0}: {1} records, oldest #{2}, isEnabled={3}" -f $l,$li.RecordCount,$li.OldestRecordNumber,$li.IsEnabled) }
        }

        Write-Host "[*] === .evtx sizes / mtimes (a freshly tiny Security.evtx = recent clear) ==="
        Get-ChildItem "$env:SystemRoot\System32\winevt\Logs\*.evtx" -ErrorAction SilentlyContinue |
          Sort-Object Length | Select-Object Name, Length, LastWriteTime -First 15 | Format-Table -Auto

        Write-Host "[*] === Disabled channels (Enabled=0 in WINEVT\Channels) ==="
        $base='HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\WINEVT\Channels'
        Get-ChildItem $base -ErrorAction SilentlyContinue | ForEach-Object {
          $en = (Get-ItemProperty $_.PSPath -Name Enabled -ErrorAction SilentlyContinue).Enabled
          if($en -eq 0){ Write-Host ("    DISABLED channel: " + $_.PSChildName) }
        }
