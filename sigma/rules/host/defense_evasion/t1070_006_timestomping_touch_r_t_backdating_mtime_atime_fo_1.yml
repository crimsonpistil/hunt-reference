    analyst_notes: 'Timestomping falsifies file timestamps so a malicious file blends into the filesystem and slips past timeline analysis, with the canonical move being touch -r /bin/ls /tmp/backdoor to clone a trusted binary''s times onto a payload. The technique is meaningfully weaker on Linux than attackers tend to assume, and the reason is the ctime principle: touch and the utimensat syscall set only atime and mtime, but the kernel updates ctime (the inode change time) on the stomp operation itself, and ctime cannot be set from userspace without rolling the system clock. This leaves ctime newer than mtime as a near-universal structural signature of backdating, detectable by any file integrity monitor that records all three timestamps. Additional tells include an mtime predating the file''s inode allocation (a high, recently-allocated inode number paired with an old date), a binary in /usr/bin whose mtime differs from its package manifest (rpm -Va shows a T flag), and clusters of files sharing one odd timestamp from a batch stomp. Advanced actors may attempt to align ctime by manipulating the system clock or using debugfs to edit the ext4 birth time directly, but clock manipulation is itself loud (NTP logs, journal time jumps) and debugfs requires raw device access, so even sophisticated stomping tends to leave a thread to pull. The strongest control is real-time file-create telemetry forwarded to a SIEM, which records the genuine creation time before any stomp can rewrite it; for retrospective work, a Sleuth Kit mactime timeline surfaces mtime/ctime disagreement immediately.'
