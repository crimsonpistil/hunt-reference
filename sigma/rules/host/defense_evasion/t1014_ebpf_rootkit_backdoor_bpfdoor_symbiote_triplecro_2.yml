    analyst_notes: 'eBPF rootkits and backdoors are the most modern and most evasive Linux rootkit class because eBPF is a legitimate built-in kernel feature that defenders themselves rely on (Falco, Tetragon, Cilium, and many EDRs are eBPF), and attackers realized the same primitive hides activity and backdoors hosts with no kernel module and often no disk artifact, defeating every LKM-oriented hunt at once. What makes it so hard is that lsmod and /proc/modules stay clean, the loader can run from memfd and self-delete to be fileless, and the program lives in kernel memory attached to a kprobe, tracepoint, XDP hook, or socket filter. The defining example, BPFDoor, opens no listening port at all: it passively sniffs with a BPF filter on a raw socket and wakes only on an attacker-crafted magic packet, so nmap, netstat, and netflow-only approaches show nothing to find, which is how it achieved documented multi-year dwell in telecommunications and ISP networks. The detection strategy inverts the usual approach: since the customary artifacts are absent, you hunt the eBPF subsystem directly with bpftool prog show, map show, and net show to enumerate everything loaded, then ask whether each program is owned by a tool you deployed, baselining the legitimate eBPF (the EDR, the CNI) and treating unexplained kprobe, socket-filter, or XDP programs as suspect. For BPFDoor-class backdoors the host-side tell is a process holding an AF_PACKET raw socket with a BPF filter that is not a known sniffer, found via ss -0 or /proc/net/packet rather than port scanning. The decisive early control is auditing the bpf() syscall so program loads are recorded as they happen and, shipped off-box, survive the fileless loader''s self-deletion. This class is especially relevant to OT and ICS because portless, quiet backdoors are ideal for the long low-noise dwell that OT-targeting actors prefer and they sit below the application layer where ICS monitoring rarely looks, making baselining of loaded BPF programs and disabling unprivileged BPF proportionate controls. BPFDoor often masquerades its process name, cross-referencing T1036.005.'
