    tools: |-
        Disabling or blinding Microsoft Defender:

        Defender is the default sensor on most Windows hosts, so degrading
        it is a near-universal early step. The methods split into two
        families with very different detection profiles.

        Loud disables (well-logged):
          Set-MpPreference -DisableRealtimeMonitoring (and the behavior/
          script/IOAV variants), sc stop WinDefend, the DisableAntiSpyware
          policy key, MpCmdRun -RemoveDefinitions. Each produces a Defender
          Operational event (5001/5007/5010/5012) and a recognizable
          command line. With Tamper Protection on, most of these are
          outright blocked and logged as 5013 - a strong attack signal in
          its own right.

        Quiet exclusions (the real watch item):
          Add-MpPreference -ExclusionPath/-ExclusionProcess/-ExclusionExtension.
          Defender keeps running and every status check reports "protected",
          but the attacker's staging directory or payload extension is now
          invisible to scanning. This is the stealthy favorite precisely
          because it does not trip the disable hunts. Treat the exclusion
          LIST as a first-class artifact: enumerate it with Get-MpPreference
          and the registry Exclusions keys, baseline it, and alert on any
          addition. A 5007 config-change event accompanies exclusion edits.

        The off-box control:
          Microsoft Defender for Endpoint reports tampering, disables, and
          exclusion changes to its cloud console, where the attacker cannot
          reach them - the same principle as off-box log forwarding and the
          external heartbeat used against Linux agent kills. Tamper
          Protection blocks the registry/MpPreference disables at the
          kernel level and is the single highest-value hardening here.

        Where it sits relative to the next row:
          this row covers turning Defender off or blind. The companion
          T1562.001 row covers neutralizing the telemetry plumbing itself
          (AMSI and ETW) in memory, which blinds not just Defender but the
          script-scanning and EDR sensors that depend on those interfaces.

        Threat actor use:
          exclusion abuse and Defender disabling appear across ransomware
          affiliates, North Korean (Kimsuky, Lazarus) and other state
          operators, and commodity loaders - it is one of the most
          consistently observed defense-evasion behaviors on Windows.
    actors:
        - Kimsuky
        - Lazarus
