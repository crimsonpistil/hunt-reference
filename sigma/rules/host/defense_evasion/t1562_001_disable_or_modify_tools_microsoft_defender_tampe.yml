    sysmon: |-
        // Process create (Sysmon EID 1)
        Image=(*\powershell.exe OR *\pwsh.exe) CommandLine=(
          *Set-MpPreference* OR *Add-MpPreference* OR *Remove-MpPreference*
          OR *-DisableRealtimeMonitoring* OR *-DisableBehaviorMonitoring*
          OR *-DisableScriptScanning*    OR *-DisableIOAVProtection*
          OR *-ExclusionPath* OR *-ExclusionProcess* OR *-ExclusionExtension*)
        Image=*\sc.exe CommandLine=(*stop*WinDefend* OR *config*WinDefend*start= disabled*)
        Image=*\MpCmdRun.exe CommandLine=*-RemoveDefinitions*
        Image=*\reg.exe CommandLine=(*DisableAntiSpyware* OR *DisableRealtimeMonitoring*
          OR *\Windows Defender\Exclusions*)

        // Microsoft-Windows-Windows Defender/Operational (the authoritative source):
        //   5001  real-time protection disabled
        //   5004  real-time protection configuration changed
        //   5007  configuration changed (any MpPreference value)
        //   5010  scanning for malware (antimalware) disabled
        //   5012  scanning for viruses (antivirus) disabled
        //   5013  TAMPER PROTECTION blocked a change (the change was stopped)
        //   1116/1117  malware detected / action taken
        // Registry modify (Sysmon EID 13) on the Defender policy keys (below).
    powershell: |-
        # T1562.001 - Microsoft Defender tampering hunt
        # Check live posture (Get-MpComputerStatus / Get-MpPreference) AND
        # the Defender Operational log for the config-change events.

        Write-Host "[*] === Live Defender posture (Get-MpComputerStatus) ==="
        $s = Get-MpComputerStatus -ErrorAction SilentlyContinue
        if($s){
          $s | Select-Object RealTimeProtectionEnabled, BehaviorMonitorEnabled,
            IoavProtectionEnabled, OnAccessProtectionEnabled, AntispywareEnabled,
            AntivirusEnabled, AMServiceEnabled, IsTamperProtected, NISEnabled |
            Format-List
          foreach($p in 'RealTimeProtectionEnabled','BehaviorMonitorEnabled','AntivirusEnabled'){
            if(-not $s.$p){ Write-Host "[FLAG] $p is FALSE - protection degraded" }
          }
          if(-not $s.IsTamperProtected){ Write-Host "[FLAG] Tamper Protection is OFF" }
        }

        Write-Host "[*] === Defender preferences + EXCLUSIONS (the stealthy blind spots) ==="
        $p = Get-MpPreference -ErrorAction SilentlyContinue
        if($p){
          $p | Select-Object DisableRealtimeMonitoring, DisableBehaviorMonitoring,
            DisableScriptScanning, DisableIOAVProtection, MAPSReporting,
            SubmitSamplesConsent | Format-List
          if($p.ExclusionPath){ Write-Host "[FLAG] Path exclusions:";    $p.ExclusionPath }
          if($p.ExclusionProcess){ Write-Host "[FLAG] Process exclusions:"; $p.ExclusionProcess }
          if($p.ExclusionExtension){ Write-Host "[FLAG] Extension exclusions:"; $p.ExclusionExtension }
        }

        Write-Host "[*] === Defender Operational config-change / disable events ==="
        Get-WinEvent -FilterHashtable @{LogName='Microsoft-Windows-Windows Defender/Operational';Id=5001,5004,5007,5010,5012,5013} -MaxEvents 40 -ErrorAction SilentlyContinue |
          Select-Object TimeCreated, Id, @{n='Msg';e={($_.Message -split "`n")[0]}} | Format-Table -Auto

        Write-Host "[*] === WinDefend service state ==="
        Get-Service WinDefend, WdNisSvc, Sense -ErrorAction SilentlyContinue |
          Select-Object Name, Status, StartType | Format-Table -Auto

        Write-Host "[*] === Defender policy registry (DisableAntiSpyware / exclusions) ==="
        $rk='HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender'
        if(Test-Path $rk){
          Get-ItemProperty $rk -ErrorAction SilentlyContinue |
            Select-Object DisableAntiSpyware, DisableAntiVirus | Format-List
          Get-ChildItem "$rk\Exclusions" -ErrorAction SilentlyContinue | ForEach-Object {
            Write-Host ("[FLAG] policy exclusion key: " + $_.PSChildName)
            Get-ItemProperty $_.PSPath | Format-List
          }
        }
    registry: |-
        Microsoft Defender tampering - registry and config artifacts:

        Policy / disable keys (HKLM):
          SOFTWARE\Policies\Microsoft\Windows Defender
            DisableAntiSpyware = 1          (legacy global disable)
            DisableAntiVirus   = 1
          SOFTWARE\Policies\Microsoft\Windows Defender\Real-Time Protection
            DisableRealtimeMonitoring     = 1
            DisableBehaviorMonitoring     = 1
            DisableScanOnRealtimeEnable   = 1
            DisableIOAVProtection         = 1
          SOFTWARE\Microsoft\Windows Defender\... (mirror under non-policy)
          SYSTEM\CurrentControlSet\Services\WinDefend
            Start = 4   (service disabled)

        Exclusions (the stealthy variant - Defender stays ON but blind):
          SOFTWARE\Microsoft\Windows Defender\Exclusions\Paths
          SOFTWARE\Microsoft\Windows Defender\Exclusions\Processes
          SOFTWARE\Microsoft\Windows Defender\Exclusions\Extensions
          (and the \Policies\... mirror). An attacker adds their staging
          dir (e.g. C:\ProgramData\, a temp path) so payloads there are
          never scanned, while every status check still says "protected".
          Hunt the EXCLUSION LIST as carefully as the disable flags.

        The authoritative event source (Defender Operational log):
          Microsoft-Windows-Windows Defender/Operational
            5001 RTP disabled | 5004 RTP config changed | 5007 config changed
            5010 antimalware disabled | 5012 antivirus disabled
            5013 TAMPER PROTECTION blocked an attempt (attack signal)
          5007 fires for exclusion additions too - diff the config.

        Tamper Protection (the mitigating control):
          when enabled (default on consumer, manageable via Intune/MDE),
          it blocks Set-MpPreference disables and registry edits to the
          Defender keys, logging 5013. It does NOT block ExclusionPath in
          all configurations, so exclusions remain a watch item. MDE
          reports tamper attempts server-side, out of the attacker's reach.

        Cloud-delivered / MDE:
          Get-MpComputerStatus AMServiceEnabled / IsTamperProtected reflect
          live state; MDE's cloud console is the off-box record that local
          registry edits cannot reach - the Windows analogue of the
          external-console heartbeat control used on the Linux side.
