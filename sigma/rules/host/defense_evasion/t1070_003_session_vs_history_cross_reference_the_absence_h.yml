    analyst_notes: 'The session-vs-history cross-reference is the most powerful history evasion detection because it catches ALL methods (unset HISTFILE, history -c, symlink, kill -9, truncation) with a single logic pattern: ''did this authenticated session leave a proportional history footprint?'' A user who logged in for 30 minutes and ran zero commands either did nothing (unlikely) or evaded history (likely). The cross-reference requires two independent data sources (wtmp + history, or wtmp + auditd), which is why auditd is the authoritative control: it captures commands regardless of shell history settings, so the cross-reference always has a ground-truth side.'
