    analyst_notes: 'Login-record tampering targets the four binary accounting databases that drive who, w, last, lastb, and lastlog: utmp (current sessions), wtmp (login history), btmp (failed logins), and lastlog (last login per user). Because these are binary utmp-struct files rather than text, editing them cleanly requires utmpdump (dump to text, edit, reload) or a purpose-built wiper, which makes surgical removal of specific sessions a strong indicator of a knowledgeable, stealth-focused adversary rather than a sloppy smash-and-grab. The most reliable detection is a cross-correlation hunt that exploits a consistent attacker mistake: the same SSH login that writes a binary wtmp record also writes a text line to auth.log or secure (''Accepted publickey for ...''), and because those live in different formats and locations they are rarely cleaned in perfect sync. Counting auth.log Accepted lines against the session count from last exposes the gap, and in real time an empty who output alongside live ESTABLISHED port-22 sockets in ss is the same tell. The defensive posture is to audit all four databases with auditd (excluding the legitimate writers sshd, login, and systemd-logind), forward the text auth trail to a remote store so it survives binary-DB tampering, and treat any utmpdump round-trip or compiled binary in a writable path that strings-references utmp/wtmp as high-severity. This technique is long-standing Unix intrusion craft, more associated with hands-on operators than noisy commodity cryptomining.'
