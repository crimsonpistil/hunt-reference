    analyst_notes: 'This is the complementary detection to the on-host auditd tampering indicator. The on-host indicator catches the ACT of disabling (the commands themselves are logged before they take effect). This indicator catches the RESULT (silence) from the SIEM vantage point. Together they form a complete detection pair: the on-host detection catches clumsy disablement where the act is logged before it succeeds, and the gap detection catches sophisticated disablement where the adversary kills the forwarding chain first or uses a method that avoids generating its own log entry. In practice, the gap detection is more reliable because it is independent of the method used and cannot be evaded without also maintaining fake event flow, which is significantly harder. The implementation requires SIEM-side scheduled queries or alerting rules that monitor per-host event rates and alert on anomalous drops, which is a SIEM engineering task rather than a host configuration task.'
