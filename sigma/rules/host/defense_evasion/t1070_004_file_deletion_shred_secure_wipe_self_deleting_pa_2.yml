    analyst_notes: 'File deletion is typically the final anti-forensic action before an operator disconnects, intended to leave responders nothing to analyze, and it ranges from a quick rm -rf of the staging directory to multi-pass shred to self-deleting payloads. The crucial point for defenders is how much remains recoverable: plain rm only unlinks the file, leaving data blocks intact until overwritten, so prompt acquisition and carving (extundelete, foremost, photorec) recover recently-deleted files on ext4 and xfs, while shred defeats carving but its execution is itself a loud, high-intent signal worth alerting on directly. The single highest-value live-response technique is the /proc recovery path: a self-deleting malware process keeps running, and the kernel preserves its executable via /proc/<pid>/exe even though the path is marked ''(deleted)'', so cp /proc/<pid>/exe recovers the full binary, and any deleted file still held open by a process is similarly recoverable from /proc/<pid>/fd. osquery exposes the same signal directly with SELECT pid, path FROM processes WHERE on_disk=0, where on_disk=0 means the backing executable was deleted, the textbook self-delete pattern. The durable defensive posture is real-time create and exec telemetry that hashes files at creation, so the artifact''s identity and metadata survive even when the file itself is destroyed, combined with centralized collection so the EXECVE record persists regardless of local cleanup. File deletion is usually the last step in an anti-forensic cluster alongside history clearing, log wiping, and timestomping, and the full cluster in a single session is a reliable marker of deliberate operator cleanup.'
