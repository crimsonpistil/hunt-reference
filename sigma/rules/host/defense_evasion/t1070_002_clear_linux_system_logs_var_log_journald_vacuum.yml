    analyst_notes: 'Clearing system logs is the second anti-forensic step after history evasion, targeting the authentication and audit logs under /var/log that would otherwise reveal the intrusion. The techniques span a sophistication spectrum: crude bulk deletion (rm -rf /var/log/*, which is noisy and breaks logging), truncation of individual files (: > file, which leaves the inode intact but with a telltale mtime newer than the newest surviving entry), and the stealthiest approach, selective line excision via sed -i that removes only the attacker''s own entries and leaves a plausible-looking log. systemd''s binary journal is purged with journalctl --vacuum or --rotate. The decisive control is remote log forwarding: once events are shipped off-box to a SIEM or central collector, local clearing is pointless because the authoritative copy already exists elsewhere, and selective edits become detectable by diffing the local log against the forwarded copy. journald Forward Secure Sealing adds cryptographic tamper-evidence that journalctl --verify can check. For hunting, the high-signal indicators are zero-byte auth/audit logs on a live system, time-continuity gaps where a log jumps over a period, and a log mtime newer than its newest internal timestamp. Log clearing rarely occurs in isolation; it clusters with history evasion, audit tampering, and timestomping, and seeing that cluster together is a reliable marker of deliberate anti-forensics rather than misconfiguration.'
