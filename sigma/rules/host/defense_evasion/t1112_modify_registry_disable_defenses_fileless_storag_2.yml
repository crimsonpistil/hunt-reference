    sysmon: |-
        // Registry telemetry (Sysmon EID 12/13/14)
        //   12 - key create/delete
        //   13 - value set (the workhorse - covers most T1112)
        //   14 - key/value rename
        EventID=13 TargetObject ends with one of the sensitive values below.

        // Common defense-weakening value sets (Sysmon 13):
        //   *\Policies\System\EnableLUA = 0                (UAC off)
        //   *\Policies\System\ConsentPromptBehaviorAdmin = 0
        //   *\Windows Defender\DisableAntiSpyware = 1
        //   *\SmartScreenEnabled = Off
        //   *\Policies\...\DisableTaskMgr / DisableRegistryTools = 1
        //   *\System\CurrentControlSet\Services\<sec svc>\Start = 4

        // Fileless storage tells (Sysmon 13):
        //   a Run/RunOnce or custom value containing a long base64/hex blob
        //   values under HKCU\Software\Classes\... or odd app keys holding
        //   encoded script (read back by a loader - cross-ref persistence)

        // Tooling (Sysmon EID 1):
        Image=*\reg.exe CommandLine=(*add* OR *delete* OR *save* OR *restore* OR *import*)
        Image=(*\powershell.exe OR *\pwsh.exe) CommandLine=(*Set-ItemProperty*
          OR *New-ItemProperty* OR *Remove-ItemProperty* OR *reg save* OR *[Microsoft.Win32.Registry]*)
        Image=*\regini.exe
    powershell: |-
        # T1112 - Modify Registry hunt (defense-weakening + fileless + hidden)
        # Registry is BOTH a weapon (disable security) and a hiding place
        # (fileless payload/config, null-byte-hidden keys).

        Write-Host "[*] === Defense-weakening values ==="
        $checks = @(
          @{P='HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System'; N='EnableLUA'; Bad=0},
          @{P='HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\System'; N='ConsentPromptBehaviorAdmin'; Bad=0},
          @{P='HKLM:\SOFTWARE\Policies\Microsoft\Windows Defender'; N='DisableAntiSpyware'; Bad=1},
          @{P='HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Policies\Explorer'; N='DisableTaskMgr'; Bad=1}
        )
        foreach($c in $checks){
          $v = (Get-ItemProperty $c.P -Name $c.N -ErrorAction SilentlyContinue).$($c.N)
          if($v -ne $null -and $v -eq $c.Bad){ Write-Host ("[FLAG] {0}\{1} = {2} (weakened)" -f $c.P,$c.N,$v) }
        }

        Write-Host "[*] === SmartScreen state ==="
        (Get-ItemProperty 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Explorer' -Name SmartScreenEnabled -ErrorAction SilentlyContinue).SmartScreenEnabled

        Write-Host "[*] === Image File Execution Options (debugger hijack / SilentProcessExit) ==="
        $ifeo='HKLM:\SOFTWARE\Microsoft\Windows NT\CurrentVersion\Image File Execution Options'
        Get-ChildItem $ifeo -ErrorAction SilentlyContinue | ForEach-Object {
          $dbg=(Get-ItemProperty $_.PSPath -Name Debugger -ErrorAction SilentlyContinue).Debugger
          if($dbg){ Write-Host ("[FLAG] IFEO Debugger on {0} -> {1}" -f $_.PSChildName,$dbg) }
        }

        Write-Host "[*] === Fileless: oversized blobs under Run/RunOnce ==="
        foreach($rk in 'HKLM:\SOFTWARE\Microsoft\Windows\CurrentVersion\Run','HKCU:\SOFTWARE\Microsoft\Windows\CurrentVersion\Run'){
          $p = Get-ItemProperty $rk -ErrorAction SilentlyContinue
          if($p){ $p.PSObject.Properties | Where-Object { $_.Value -is [string] -and $_.Value.Length -gt 200 } |
            ForEach-Object { Write-Host ("[FLAG] large value {0}\{1} ({2} chars)" -f $rk,$_.Name,$_.Value.Length) } }
        }

        Write-Host "[*] === Null-byte hidden keys (reg.exe/regedit cannot show these) ==="
        Write-Host "    reg.exe and Get-ItemProperty miss keys with embedded null"
        Write-Host "    bytes in the name. Use Autoruns (handles them) or the native"
        Write-Host "    RegEnumKeyEx API / SysinternalsSuite to enumerate honestly."

        Write-Host "[*] === Recent reg.exe / registry tooling from event log ==="
        Get-WinEvent -FilterHashtable @{LogName='Microsoft-Windows-Sysmon/Operational';Id=13} -MaxEvents 200 -ErrorAction SilentlyContinue |
          Where-Object { $_.Message -match 'EnableLUA|DisableAntiSpyware|SmartScreen|Image File Execution|DisableTaskMgr' } |
          Select-Object TimeCreated, @{n='Detail';e={($_.Message -split "`n" | Select-String 'TargetObject:')}} -First 20 | Format-Table -Auto
    registry: |-
        Modify Registry - the registry as weapon and hiding place:

        The registry is both a control surface (flip a value, weaken a
        defense) and a covert store (hold a payload or config with no file
        on disk). T1112 covers the EVASION uses; persistence Run-key abuse
        (T1547.001) and the Defender keys (T1562.001) are adjacent and
        often co-occur.

        Defense-weakening values (representative, not exhaustive):
          HKLM\...\Policies\System\EnableLUA = 0           (UAC disabled)
          HKLM\...\Policies\System\ConsentPromptBehaviorAdmin = 0
          HKLM\SOFTWARE\Policies\Microsoft\Windows Defender\DisableAntiSpyware=1
          HKLM\...\Explorer\SmartScreenEnabled = Off
          HKLM\...\Policies\Explorer\DisableTaskMgr / DisableRegistryTools = 1
          HKLM\SYSTEM\CurrentControlSet\Services\<security svc>\Start = 4
          Image File Execution Options\<exe>\Debugger   (hijack a binary's
            launch) and the GlobalFlag/SilentProcessExit evasion variants

        Fileless storage (evade disk-based detection):
          encoded payloads or config written as registry VALUES, read back
          and executed by a small loader. Classic homes: Run/RunOnce values
          holding base64, HKCU\Software\Classes\<random>, or bespoke app
          keys. The tell is an unusually long binary/string value where a
          short path or flag is expected - hunt value LENGTH and entropy.

        Hidden keys (anti-enumeration):
          keys/values created via the native API with an embedded NULL byte
          in the name are not displayed by reg.exe or regedit (which use the
          Win32 string APIs that stop at the null). Autoruns and direct
          RegEnumKeyEx-based tools DO show them. If a host behaves as though
          a Run entry exists but none is visible, suspect a null-byte key.

        Telemetry:
          Sysmon EID 13 (value set) is the workhorse, 12 (key create/delete)
          and 14 (rename) round it out. Baseline the sensitive keys above and
          alert on changes; reg save of SAM/SYSTEM/SECURITY hives is a
          credential-access co-signal (T1003) worth wiring in here too.

        Why this locks the Windows schema:
          this row exercises the Registry tab as ACTUAL registry (keys,
          values, hives, Sysmon 12/13/14) rather than the Linux File
          Artifacts repurposing - the structural difference between the
          Windows and Linux rows on this page.
