        Sysmon config (the core telemetry):
          RegistryEvent 12/13/14 with a TargetObject allow/deny tuned to the
          sensitive keys (UAC, Defender, SmartScreen, services Start, IFEO,
          Run/RunOnce). Value-set (13) is the workhorse.

        Autoruns / Sysinternals:
          Autoruns enumerates persistence + IFEO keys AND handles null-byte
          hidden keys that reg.exe/regedit cannot display - run it for honest
          enumeration.

        osquery:
          SELECT path,name,data FROM registry WHERE path LIKE
            'HKEY_LOCAL_MACHINE\...\Policies\System\EnableLUA';
          SELECT * FROM registry WHERE path LIKE '%\Image File Execution Options\%'
