    tools: |-
        Modifying the registry for evasion:

        On Windows the registry is where a lot of security posture lives, so
        it is simultaneously something an attacker breaks (to weaken
        defenses) and something they hide inside (to avoid the disk). T1112
        is the evasion lens on both.

        As a weapon - weakening defenses:
          a single value flip can disable UAC (EnableLUA=0), turn off
          SmartScreen, set a security service Start type to disabled, or
          enable a debugger hijack via Image File Execution Options. These
          are high-signal when you baseline the keys: there is a small,
          well-known set of "never legitimately changed at runtime" values,
          and a Sysmon EID 13 on any of them deserves an alert.

        As a hiding place - fileless storage:
          malware increasingly stores its payload or configuration as a
          registry value rather than a file, then uses a tiny loader to read
          and execute it. This defeats file-scanning and leaves a thinner
          forensic trail. The detection pivot is data SHAPE: a Run value or
          app key holding a long base64/hex blob where a short path belongs.
          Hunt on value length and entropy, not just on key path.

        The anti-enumeration trick - null-byte keys:
          because reg.exe and regedit use string APIs that terminate at a
          null, a key or value created with an embedded null in its name is
          invisible to them while still functioning. Autoruns and tools that
          call RegEnumKeyEx directly reveal them. This is the registry analogue
          of the Linux hidden-process trick: trust the structural enumerator,
          not the convenient tool that can be fooled.

        The detection backbone:
          Sysmon 12/13/14 plus a baselined watch-list of sensitive keys is
          the core. Layer Autoruns (for null-byte and persistence keys),
          osquery's registry table for scheduled sweeps, and an alert on reg
          save of the credential hives. Because much of this is one-value-
          deep, baseline-and-diff beats signature matching.

        Relationship to the rest of the chunk:
          T1112 overlaps the Defender row (those disables ARE registry
          writes) but extends to UAC/SmartScreen/IFEO weakening and to
          fileless storage and hidden keys - the broader registry-as-evasion
          surface. It is also the row that exercises the Windows Registry tab
          as real registry, setting the schema for every Windows row to come.

        Threat actor use:
          fileless registry storage is a hallmark of families like Kovter and
          Poweliks; UAC/Defender/SmartScreen weakening via registry is broad
          across ransomware and commodity malware; IFEO and SilentProcessExit
          abuse appears in more targeted tradecraft.
