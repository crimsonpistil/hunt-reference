    powershell: |-
        # T1562.001 - AMSI bypass / ETW patching hunt
        # These are in-memory; the reliable host-side evidence is in the
        # PowerShell Operational log (4104) IF Script Block Logging is on.
        # Step 1 is therefore to CONFIRM logging is enabled, then hunt it.

        Write-Host "[*] === Is Script Block Logging enabled? (prerequisite) ==="
        $sbl='HKLM:\SOFTWARE\Policies\Microsoft\Windows\PowerShell\ScriptBlockLogging'
        $v = (Get-ItemProperty $sbl -Name EnableScriptBlockLogging -ErrorAction SilentlyContinue).EnableScriptBlockLogging
        Write-Host ("    EnableScriptBlockLogging = " + $(if($v -eq 1){'1 (good)'}else{'0/absent - ENABLE THIS, you are blind to script bypasses'}))

