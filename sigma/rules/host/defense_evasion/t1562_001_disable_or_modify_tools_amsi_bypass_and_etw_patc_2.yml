    registry: |-
        AMSI bypass and ETW patching - artifacts and the honest limits:

        What these techniques attack:
          AMSI (Antimalware Scan Interface): the choke point Defender and
          other AVs use to scan script/macro/in-memory .NET content before
          execution. Bypasses patch amsi.dll!AmsiScanBuffer to return clean,
          or set the amsiInitFailed flag via .NET reflection, so nothing is
          ever scanned.
          ETW (Event Tracing for Windows): the kernel/user telemetry bus
          many EDRs subscribe to (e.g. the .NET, threat-intelligence, and
          process providers). Patching ntdll!EtwEventWrite (overwriting the
          prologue with a ret) silences those events at the source, blinding
          ETW-based sensors.

        Why registry/process artifacts are THIN (set expectations):
          both are in-memory modifications inside the attacker's own process
          (or an injected target). There is usually NO new file, NO service,
          and NO registry change. Command lines may be obfuscated. This is
          the least disk-observable technique in this chunk, and detection
          honesty matters: you are mostly relying on content logging and
          EDR memory integrity, not on artifacts.

        The artifacts that DO exist:
          PowerShell Script Block Logging (4104): captures the bypass SOURCE
            even though AMSI is bypassed for execution, because SBL logs the
            script text independently. This is the single best host-side
            signal - but ONLY if EnableScriptBlockLogging is set first.
            HKLM\SOFTWARE\Policies\Microsoft\Windows\PowerShell\
              ScriptBlockLogging\EnableScriptBlockLogging = 1
          AMSI provider registry:
            HKLM\SOFTWARE\Microsoft\AMSI\Providers  - a missing/removed
            provider GUID indicates AMSI provider tampering.
          Sysmon image load (7): amsi.dll mapped into an unusual process.
          EDR memory scan: a modified first instruction at
            amsi.dll!AmsiScanBuffer or ntdll!EtwEventWrite.

        Hardening that raises the cost:
          enable Script Block Logging AND module/transcription logging;
          run PowerShell Constrained Language Mode where feasible; keep
          Defender + cloud protection on (AMSI bypass is still logged in
          4104); deploy an EDR that performs userland memory integrity
          checks on ntdll/amsi. .NET 4.8+ extends AMSI to assembly loads,
          shrinking the in-memory .NET gap.

        Cross-reference:
          this pairs with the Defender row (T1562.001): AMSI/ETW patching
          blinds the SCANNING and EDR plumbing, Defender tampering turns the
          product off or blind - attackers often do both, and process
          injection (T1055, planned) is the common delivery for ETW patches.
