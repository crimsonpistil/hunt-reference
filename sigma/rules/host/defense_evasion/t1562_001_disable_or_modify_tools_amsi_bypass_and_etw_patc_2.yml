          Where-Object { $m=$_.Message; $patterns | Where-Object { $m -match $_ } } |
          Select-Object TimeCreated, @{n='Hit';e={ ($patterns | Where-Object { $_.Message -match $_ }) -join ',' }}, @{n='Snippet';e={ ($_.Message -split "`n" | Select-Object -First 2) -join ' ' }} |
