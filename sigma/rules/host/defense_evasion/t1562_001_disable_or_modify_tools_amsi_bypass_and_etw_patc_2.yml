    tools: |-
        AMSI bypass and ETW patching:

        The most surgical evasion in this chunk, and the most honestly hard
        to detect. Rather than turning a product off (which logs), the
        attacker silences the plumbing the products listen to, in memory,
        inside their own process.

        AMSI bypass:
          AMSI is where Defender scans scripts, macros, and in-memory .NET
          just before they run. The two common bypasses patch
          amsi.dll!AmsiScanBuffer so it always returns AMSI_RESULT_CLEAN, or
          flip the amsiInitFailed field via .NET reflection so AMSI is never
          initialized. Either way, malicious PowerShell/JScript/.NET runs
          unscanned. The saving grace: PowerShell Script Block Logging
          records the bypass code itself, independent of AMSI, so the very
          act of bypassing is captured in EID 4104 - if SBL is enabled.

        ETW patching:
          Event Tracing for Windows carries the telemetry many EDRs depend
          on. Overwriting the first bytes of ntdll!EtwEventWrite with a
          return instruction stops those events at the source, blinding the
          sensor without touching the product. This one is genuinely stealthy
          - there is no event for "ETW was patched". Detecting it requires an
          EDR that periodically verifies the integrity of ntdll's exported
          functions in memory, looking for a modified prologue.

        The detection posture (be honest about it):
          1. Turn on PowerShell Script Block Logging FIRST - without it you
             are blind to the most observable part (the AMSI bypass code).
             Then hunt 4104 for the known signatures.
          2. Watch amsi.dll loading into processes that have no business
             loading it (custom unmanaged loaders).
          3. Rely on EDR userland memory integrity for the ETW prologue
             patch and for AmsiScanBuffer patches; this is not something
             classic event logs will show.
          4. Constrained Language Mode and current .NET (AMSI-for-assemblies)
             raise the cost of the script/.NET side.

        Why it matters for the program:
          this is the technique that most rewards layered, off-box, and
          memory-aware detection over endpoint event logs. In environments
          where EDR memory inspection is absent, ETW patching in particular
          can run essentially unseen - worth flagging where coverage gaps
          exist (including OT-adjacent Windows that may run lighter agents).

        Threat actor use:
          AMSI and ETW bypasses are baked into mainstream offensive tooling
          (Cobalt Strike, and most modern C2/loaders) and are used broadly
          by state and criminal actors alike; they are an assumed capability
          in current intrusions rather than a distinguishing one.
