    analyst_notes: 'The ctime-vs-mtime anomaly is the single most reliable timestomp detection on Linux because it exploits an architectural property of Unix filesystems: ctime is updated by the kernel on any metadata operation and cannot be set by userland tools. This means every touch -r / touch -t / touch -d command that moves mtime backward leaves ctime pointing forward as evidence. The only evasion is debugfs (requires root + unmount or read-only mount, extremely rare in practice) or direct block-device manipulation. The test is simple (ctime > mtime = anomaly) but the baseline matters: some package managers and backup tools legitimately create ctime > mtime patterns during restore operations, so the hunt should focus on non-package-owned files in writable directories. Combining the ctime test with package-manager verification (rpm -Va / dpkg --verify) narrows results to files that are both timestomped AND not legitimately installed. The auditd utimensat syscall rule catches timestomping at runtime regardless of the tool used (touch, python os.utime, custom binary), making it the most comprehensive runtime detection.'
