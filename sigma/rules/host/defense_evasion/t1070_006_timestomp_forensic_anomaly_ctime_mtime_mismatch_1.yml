        # Simpler approach using stat:
        for f in /tmp/* /dev/shm/* /opt/* /var/tmp/*; do
          [ -f "$f" ] || continue
          mt=$(stat -c %Y "$f")
          ct=$(stat -c %Z "$f")
          if [ "$ct" -gt "$mt" ]; then
            echo "TIMESTOMP? ctime>mtime: $(stat -c '%y %z %n' "$f")"
