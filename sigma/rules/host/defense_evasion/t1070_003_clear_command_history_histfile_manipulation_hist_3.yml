        // kill -9 of the current shell (skips history write on exit)
        Image=*/kill CommandLine matches: *-9 $$*  OR  *-KILL $$*

        // Auditd
        -a always,exit -F arch=b64 -S execve -k exec
        -w /root/.bash_history -p wa -k bash_history
