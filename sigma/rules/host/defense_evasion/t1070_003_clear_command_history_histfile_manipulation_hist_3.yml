    analyst_notes: 'Clearing command history is the most common and lowest-effort anti-forensic action on Linux, and it appears in nearly every interactive intrusion because shell history is the first artifact a responder examines. The techniques range from session-level disabling (unset HISTFILE, export HISTFILE=/dev/null, set +o history, HISTSIZE=0) to file wiping (history -c, truncation, shred, symlinking ~/.bash_history to /dev/null) to the subtle kill -9 $$ that terminates the shell before it flushes history on exit. The key insight for hunters is that the absence of history is itself the signal: a login session visible in wtmp/last with no corresponding shell history strongly implies cleanup, so the hunt is a cross-reference between authenticated sessions and history activity rather than a search for the wiping command alone. The decisive defensive principle is that shell history was never a security log, and auditd execve logging is the authoritative shadow record that captures every command regardless of shell history settings. This creates a useful escalation ladder: history evasion with intact auditd means you still have the commands; history evasion combined with auditd tampering (T1562.012 / T1070.002) signals a deliberate, knowledgeable adversary and should raise the severity of the entire investigation. Hardening centers on forcing per-command flush via PROMPT_COMMAND and shipping both history and auditd to a remote or immutable store, but auditd is the real control and history is best treated as a bonus signal.'
