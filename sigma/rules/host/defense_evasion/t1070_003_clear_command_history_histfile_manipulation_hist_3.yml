        // Sysmon for Linux EID 1 - history-disabling commands

        // History redirected/disabled in the running shell
        CommandLine matches:
          *unset HISTFILE*      *HISTFILE=/dev/null*
          *export HISTFILE=*    *HISTSIZE=0*  *HISTFILESIZE=0*
