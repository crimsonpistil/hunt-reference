    analyst_notes: 'Self-deleting processes are a fundamental anti-forensic technique in Linux malware. The pattern is simple: the dropper writes the payload to /tmp or /dev/shm, executes it, and the payload''s first action is to unlink its own binary (rm $0 or unlink() syscall). The process continues running from memory while the disk artifact is gone. This defeats disk-based scanning (AV, YARA) while the process is active, and defeats process forensics once it exits. The /proc filesystem is the decisive counter-measure: Linux keeps the binary''s inode alive as long as a process holds a reference to it, so /proc/<pid>/exe still points to the deleted file and cp /proc/<pid>/exe /destination recovers a perfect copy. osquery''s on_disk column automates this check across all processes. The hunt workflow is: (1) sweep for on_disk=0, (2) recover binaries before killing processes, (3) check /proc/<pid>/fd for additional deleted file handles. In containerized environments, the /proc path works from the host namespace but not from within the container, so host-level osquery or auditd is required.'
