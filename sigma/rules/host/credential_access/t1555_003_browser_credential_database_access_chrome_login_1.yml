    registry: |-
        Chrome credential encryption:
          Chrome 80+ uses AES-GCM with a key stored in:
          %LOCALAPPDATA%GoogleChromeUser DataLocal State
          The key itself is DPAPI-encrypted, so decryption requires
          the user's DPAPI master key (accessible to any process
          running as the user, or extractable from LSA Secrets).

        Browser credential database paths:
          Chrome: %LOCALAPPDATA%GoogleChromeUser DataDefaultLogin Data (SQLite)
          Edge:   %LOCALAPPDATA%MicrosoftEdgeUser DataDefaultLogin Data (SQLite)
          Firefox: %APPDATA%MozillaFirefoxProfiles<profile>logins.json (JSON + key4.db)
