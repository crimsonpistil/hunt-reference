    analyst_notes: Browser credential theft is extremely common because (a) most users save passwords in their browser, (b) the credential stores are readable by any process running as the user (no elevation required), and (c) the credentials often include high-value targets like SSO portals, cloud admin consoles, and VPN credentials that extend the compromise beyond the local network. Chrome 80+ encrypts credentials with DPAPI + AES-GCM, but any process running as the user can call CryptUnprotectData to decrypt them. The most reliable detection is monitoring for non-browser processes accessing browser credential database files, which should never happen in normal operations.
