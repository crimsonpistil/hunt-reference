    analyst_notes: 'Kerberoasting generates only EID 4769 (TGS request) on the DC, which is a normal Kerberos operation. The detection relies on behavioral anomalies: (1) RC4 encryption type (0x17) in an AES-capable environment, (2) high volume of TGS requests from a single user to different SPNs in a short window, (3) requests for service accounts that the requesting user has never accessed before. The fix is not detection but prevention: replace service account passwords with Group Managed Service Accounts (gMSAs, which auto-rotate 120+ character passwords), or enforce 25+ character passwords on all SPN-registered accounts. Targeted Kerberoasting (requesting a single high-value SPN) is much harder to detect because it generates only one TGS event.'
