    analyst_notes: 'NTDS.dit extraction is the domain-level equivalent of LSASS dumping: it yields ALL domain account hashes instead of just cached ones. The extraction always requires two files: ntds.dit (the database) and the SYSTEM registry hive (contains the boot key needed to decrypt the hashes). Any copy of ntds.dit outside its normal path (C:WindowsNTDS) on a DC is high-confidence credential theft. The ntdsutil IFM method is particularly dangerous because it is a legitimate AD administration tool, making it hard to block outright. The mitigation is monitoring: alert on ntdsutil execution, shadow copy creation on DCs, and any file copy targeting ntds.dit. DCSync (T1003.006) achieves the same result without touching the file at all.'
