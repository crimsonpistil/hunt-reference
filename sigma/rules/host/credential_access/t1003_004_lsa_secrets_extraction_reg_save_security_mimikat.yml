    analyst_notes: 'LSA Secrets are often overlooked in favor of LSASS and SAM, but they can contain the most operationally valuable credentials: service account passwords stored in plaintext (not hashed), cached domain logons that work even when the DC is unreachable, and DPAPI keys that decrypt saved passwords across the system. The detection is the same pattern as SAM dumping (reg save targeting SECURITY instead of SAM), making a combined rule for ''reg save targeting any of SAM/SYSTEM/SECURITY'' the most efficient approach. The cached logon count (CachedLogonsCount, default 10) determines how many domain credentials are available offline.'
