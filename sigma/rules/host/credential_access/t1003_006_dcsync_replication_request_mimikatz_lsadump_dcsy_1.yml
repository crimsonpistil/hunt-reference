    analyst_notes: 'DCSync is the most dangerous credential access technique because it extracts ALL domain password hashes (including krbtgt for Golden Ticket) without touching the DC filesystem, without running code on the DC, and using a legitimate AD protocol that many monitoring solutions don''t inspect. The detection relies on Security EID 4662 on the DC showing a non-machine account requesting DS-Replication-Get-Changes-All. Machine accounts (ending in $) legitimately replicate, so the filter is: any principal WITHOUT a trailing $ requesting replication. The proactive control is auditing who has replication rights (should be only DCs, DA, EA) and alerting on any delegation of those rights to non-standard accounts.'
