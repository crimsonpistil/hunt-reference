    analyst_notes: LSASS credential dumping is the pivot point of most enterprise intrusions. A single LSASS dump typically yields domain admin hashes if any privileged user has logged into that machine. Sysmon EID 10 (ProcessAccess) targeting lsass.exe is the primary detection and should be deployed as a high-priority alert with aggressive tuning of known-good callers. Modern evasion includes direct syscalls (ntdll unhooking), duplicate handle abuse, PPL bypass via vulnerable drivers, and silent process exit dumps. Credential Guard (VBS-based LSASS isolation) is the strongest preventive control because it moves credentials into an isolated VM that is inaccessible even to kernel-mode attackers. LSA Protection (RunAsPPL) is a weaker but widely deployable alternative that blocks unsigned callers from accessing LSASS.
