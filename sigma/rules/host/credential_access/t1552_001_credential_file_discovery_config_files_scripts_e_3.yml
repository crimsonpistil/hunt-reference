    analyst_notes: 'Credential-in-file discovery is the low-hanging fruit of post-exploitation: a simple grep -r ''password'' or find / -name ''.env'' across a development server almost always yields something usable. The cloud metadata API (169.254.169.254) is particularly dangerous because it returns IAM role credentials without authentication, turning any SSRF or web shell into cloud account access. Detection focuses on two patterns: (1) the grep/find sweep itself (process monitoring for recursive searches targeting credential keywords), and (2) direct access to known credential files (auditd read-watch). The proactive mitigation is secret management: move credentials from files to vaults (HashiCorp Vault, AWS Secrets Manager) and scan repos/filesystems for embedded secrets with trufflehog or gitleaks.'
