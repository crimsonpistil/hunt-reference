    analyst_notes: '/etc/shadow access by a non-authentication process (anything other than sshd, login, su, sudo, passwd, chage) is a high-confidence credential theft indicator. The auditd read-watch (-p r) on /etc/shadow is the decisive detection because it catches all access methods: cat, cp, scp, Python open(), or any other file read. The main false positive sources are authentication subsystem processes and account management tools. After harvesting, the attacker either cracks hashes offline (john/hashcat) or uses the hashes directly if the system uses a weak algorithm. The yescrypt algorithm (default on Debian 12+) is designed to be resistant to GPU cracking, making credential reuse the more likely exploitation path than brute force.'
