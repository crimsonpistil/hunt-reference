    analyst_notes: 'Keylogger detection on Windows is challenging because SetWindowsHookEx is also used by legitimate accessibility tools, input method editors, and some security products. The most reliable detection approach is behavioral: flag processes that load user32.dll from non-standard paths (temp directories, user profiles) since legitimate applications load it from System32. On Linux, /dev/input/event* access is more distinctive because only Xorg, display managers, and accessibility tools should read raw input devices. A non-X11 process (especially one running as root via SSH) reading from /dev/input is high-confidence keylogging. TTY-based capture (script -q, strace on TTY file descriptors) is a separate detection track that catches operators recording interactive sessions.'
