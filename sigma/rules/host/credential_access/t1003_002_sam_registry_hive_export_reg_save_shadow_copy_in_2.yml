    analyst_notes: 'SAM dumping yields local account hashes. In environments without LAPS (Local Administrator Password Solution), the same local admin password is often reused across every workstation, making a single SAM dump equivalent to lateral access to the entire fleet. The detection is straightforward: reg save targeting SAM/SYSTEM/SECURITY hives, shadow copy creation followed by SAM file access, or esentutl.exe copying the hive files. The hardening control is LAPS (randomized local admin passwords per machine) combined with disabling the local Administrator account where possible.'
