    analyst_notes: 'SSH key theft is the Linux equivalent of credential dumping: a single stolen key provides passwordless access to every system where the corresponding public key is authorized. Unlike passwords, keys have no lockout policy, no expiration by default, and no authentication log that distinguishes key-based access from legitimate use. The detection focuses on non-SSH processes reading key files (auditd read-watch is the primary control) and on enumeration commands (find/grep sweeps for key headers). Agent forwarding creates an additional risk: an attacker on a jump host with ForwardAgent=yes can hijack the forwarded agent socket to authenticate downstream without ever touching the private key file. Disable agent forwarding globally and use ProxyJump instead.'
