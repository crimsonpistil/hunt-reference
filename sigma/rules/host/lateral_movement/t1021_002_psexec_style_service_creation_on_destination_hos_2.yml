    analyst_notes: 'PsExec lateral movement leaves three artifact layers on the destination: (1) service creation in the System event log (EID 7045) and registry, (2) named pipe creation (PSEXESVC or variant), and (3) network logon (EID 4624 type 3). Impacket variants use random service names and cmd.exe /c commands as the ImagePath, making the service-name pattern less reliable than the ImagePath content. The most durable detection is: any EID 7045 where the ImagePath contains ADMIN$, a UNC path, or a cmd/powershell command. Legitimate remote service installations (SCCM, GPO) use MSI packages or known service names, not raw command-line ImagePaths.'
