    analyst_notes: 'SSH lateral movement is the Linux equivalent of RDP/PsExec on Windows. Detection relies on behavioral context rather than protocol signatures: which hosts normally SSH to which other hosts, which accounts are authorized for interactive SSH, and which processes should be spawning SSH clients. A web server (apache, nginx) spawning ssh is near-certain lateral movement. SSH tunneling (-L local, -R remote, -D SOCKS) enables network pivoting through a compromised host, effectively turning it into a proxy. The -N flag (no command) combined with -f (background) is the signature of a persistent tunnel with no interactive session.'
