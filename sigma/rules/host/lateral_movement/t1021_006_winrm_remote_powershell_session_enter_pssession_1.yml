    analyst_notes: WinRM is stealthier than PsExec because it does not create a service, does not write a binary to ADMIN$, and uses a legitimate management protocol. The primary artifact on the destination is the wsmprovhost.exe process, which hosts the remote PowerShell session. Commands executed through the session appear as children of wsmprovhost.exe, making process-tree analysis the key detection technique. PowerShell ScriptBlock logging (EID 4104) on the destination captures the actual commands the attacker runs through the remote session, even if they use Invoke-Command with encoded arguments.
