    analyst_notes: 'WMI lateral movement detection hinges on one artifact: the parent-child relationship. Any process whose parent is WmiPrvSE.exe was spawned by a WMI call, and if the WMI call originated remotely, that process is lateral movement. The false positive surface is manageable: legitimate remote WMI calls come from SCCM, monitoring tools (PRTG, SolarWinds), and admin scripts. Baseline your environment''s legitimate WmiPrvSE children and alert on anything outside that set. Impacket''s wmiexec is particularly stealthy because it uses a semi-interactive shell over WMI output objects, never writing to disk on the target. The only artifact is the WmiPrvSE -> cmd.exe parent-child edge.'
