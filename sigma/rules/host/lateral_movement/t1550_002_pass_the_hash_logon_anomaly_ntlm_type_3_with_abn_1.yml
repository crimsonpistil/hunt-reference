    analyst_notes: 'Pass-the-hash is extremely difficult to detect with a single event because NTLM type 3 logons are normal network authentication. Detection requires behavioral context: baseline which accounts authenticate from which workstations, then alert on deviations. The WorkstationName field in EID 4624 is self-reported by the source and can be spoofed, but most PtH tools report the attacker''s actual hostname, creating a mismatch between the account''s normal workstation and the PtH source. The strategic mitigation is Credential Guard (prevents hash extraction) combined with progressive NTLM reduction (audit, then restrict, then block). Protected Users group members cannot authenticate via NTLM at all.'
