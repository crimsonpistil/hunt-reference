    analyst_notes: 'Lateral tool transfer is the logistics step that connects initial access to execution on a new host. The most common pattern is PsExec-style: copy the payload to ADMIN$ or C$, then execute it remotely via service creation or WMI. Detection at the file-write stage catches the attack before execution, giving defenders a window to intervene. Admin share writes (ADMIN$, C$) from non-standard processes should be baselined and alerted. certutil and bitsadmin downloading from internal IPs (not external) are strong indicators of internal staging because these tools are rarely used for legitimate internal file transfers when robocopy and Copy-Item exist.'
