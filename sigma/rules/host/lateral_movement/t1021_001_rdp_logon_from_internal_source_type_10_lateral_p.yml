    analyst_notes: 'RDP lateral movement blends with legitimate administration, making behavioral context essential: which source IPs are authorized for RDP, which accounts normally use RDP, and does the timing match administrative patterns. The most reliable detection is a whitelist approach: maintain a list of authorized RDP source IPs (jump servers, admin workstations) and alert on any type 10 logon from a source not on the list. RDP session reconnects (EID 4778) indicate an attacker maintaining a persistent session across multiple work periods. On the source host, HKCU\Software\Microsoft\Terminal Server Client\Servers records every RDP destination, providing a lateral movement map.'
