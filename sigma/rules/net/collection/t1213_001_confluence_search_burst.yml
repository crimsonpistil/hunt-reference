    analyst_notes: 'Confluence''s REST API at /rest/api/content/search accepts CQL (Confluence Query Language) queries - adversaries use this to grep across all spaces for keywords like ''password'', ''api_key'', ''credentials'', ''AWS'', ''jenkins''. Tools: confluence-dump, internal pentesting frameworks, custom scripts. Pattern: 20+ distinct search queries from one source within 10 minutes. The Confluence web UI does periodic search but humans rarely fire 20+ distinct CQL queries in a short window. The REST endpoint pattern is high-confidence - UI search uses different paths. Pair with bulk content downloads (/rest/api/content/{id}?expand=body) for full collection chain. If Confluence is hosted internally, build $CONFLUENCE_HOSTS allowlist; if cloud (Atlassian Cloud), this detection moves to cloud-side audit logs (Atlassian Audit API).'
