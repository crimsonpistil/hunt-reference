    analyst_notes: 'Email forwarding rules persist after the adversary loses session access - set a rule to forward all incoming mail to an attacker-controlled address, and email exfiltration continues automatically. Common patterns: (1) BEC-style external forwarding (rule forwards to attacker@gmail.com), (2) deletion-after-forward to hide evidence, (3) keyword-triggered rules (''forward only emails matching invoice OR wire OR payment''). Detection points: EWS UpdateInboxRules SOAP body, Graph API mailFolders/inbox/messageRules POST, Exchange Online PowerShell Set-InboxRule cmdlet (visible in remote PowerShell sessions). Once you have hits, examine RULE BODY: rules forwarding outside the org are highest priority, rules with deletion enabled are next, rules matching financial keywords are next. M365 environments: Exchange Online audit logs (UnifiedAuditLog ''New-InboxRule'' / ''Set-InboxRule'' events) provide cleaner detection than network - but network catches it before logs are reviewed. Modern best practice: disable auto-forwarding to external recipients via tenant policy.'
