    analyst_notes: Exchange Web Services (EWS) at /EWS/Exchange.asmx is the SOAP API used by Outlook for Mac, mobile clients, and many third-party tools. It's also the API used by adversary tools like MailSniper, FireEye's RuleSnoop, and custom Python/PowerShell scripts. FindItem enumerates mailbox contents; GetItem retrieves specific items; ExportItems pulls items in bulk. The high-volume detection threshold (100 calls in 10 min) tunes for normal heavy mail clients; adjust per environment. Particularly important for on-prem Exchange or hybrid deployments. For M365 Exchange Online, much of this traffic terminates at outlook.office365.com - detection moves to M365 audit logs (mailbox audit, particularly MailItemsAccessed events for E5 licenses). Graph API equivalents at graph.microsoft.com/v1.0/me/messages produce similar network patterns.
