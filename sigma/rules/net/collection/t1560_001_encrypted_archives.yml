    analyst_notes: 'If you ship Zeek logs to Kibana, you can sharpen this KQL by adding zeek.smb_files.action or zeek.smb_cmd.command filters (e.g. "SMB_FILE_READ" / "SMB_FILE_WRITE" / "get_dfs_referral") - the baseline KQL above falls back to port/protocol since Zeek shipping is not assumed. Password-protected archives are a strong adversary signal - legitimate enterprise file sharing rarely uses password-protected ZIPs (people use proper file sharing platforms instead). When they DO appear, it''s often: (1) DLP-evading exfil prep (encrypted archive defeats simple DLP keyword scanning), (2) ransomware staging before exfil (archives are encrypted to prevent recovery), (3) insider data theft. Detection: ZIP files with general-purpose-bit-flag bit 0 set (encrypted), RAR files with HEAD_FLAGS encrypted bit, 7z files with header encryption. Zeek''s file analyzer can extract these flags. The signature shown is simplified; full implementation needs file-format-aware parsing. Particularly investigate when password-protected archives appear in staging directories (combine with sid 9107401). Treat as high-priority alert: encrypted-archive-on-network is one of the highest-fidelity collection-prep signals.'
