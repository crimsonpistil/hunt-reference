    analyst_notes: 'After triggering the SNMP config copy (or via direct SSH show running-config | redirect), network devices send the config file via TFTP (UDP/69) or SCP (TCP/22) to a destination. Filename patterns: running-config, startup-config, hostname-confg, *.cfg, *.conf. Detection: file transfers from network devices with these naming patterns. Particularly anomalous when destination is NOT the configured TACACS+/syslog/management server (build $NETWORK_MGMT_HOSTS allowlist). TFTP is unencrypted and trivially captured - passive attackers on the segment can grab configs from legitimate TACACS push operations as well. Modern best practice: disable TFTP entirely, use SCP with key-based auth, or SFTP, or vendor-specific encrypted config transfer. Volt Typhoon-style living-off-the-land operations use the device''s own config-copy mechanisms to avoid dropping tools.'
