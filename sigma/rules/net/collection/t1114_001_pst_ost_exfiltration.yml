    analyst_notes: 'Outlook stores email locally in .pst (Personal Storage Table - archives, exports), .ost (Offline Storage Table - cached Exchange data), .nst (group calendar caches). PST/OST files often contain years of email and can exceed 50GB. Adversaries who gain access to a workstation often exfiltrate the OST file directly - it''s a complete email archive without needing EWS bulk reads. Detection: SMB transfer of PST/OST files larger than 50MB (real archives are usually 1-50GB; tiny PSTs are typically templates or test files). False positives: legitimate IT migration of user mailboxes during platform changes - should originate from $IT_ADMINS hosts. After exclusions, large PST/OST movement is highly suspicious. Pair with subsequent outbound transfer of files matching the same size profile.'
