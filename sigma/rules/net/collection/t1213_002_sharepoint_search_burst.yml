    analyst_notes: 'SharePoint''s REST API at /_api/search/query accepts KQL (Keyword Query Language) for site-wide content search. /_api/web/lists enumerates document libraries; /_vti_bin/search.asmx is the legacy SOAP search interface. Adversaries use these for bulk document discovery before downloading. Tools: SharpHound (BloodHound has SharePoint enumeration support), custom scripts, Microsoft Graph API for M365 SharePoint. The 30-query threshold accounts for SharePoint''s chattier baseline (search-as-you-type, autocomplete) - adjust based on your environment. Internal SharePoint = $SHAREPOINT_HOSTS allowlist; M365 SharePoint Online detection moves to Microsoft 365 audit logs (UAL). Sysmon/PowerShell logging on workstations catches the user-side script execution that performed the queries.'
