    analyst_notes: 'If you ship Zeek logs to Kibana, you can sharpen this KQL by adding zeek.smb_files.action or zeek.smb_cmd.command filters (e.g. "SMB_FILE_READ" / "SMB_FILE_WRITE" / "get_dfs_referral") - the baseline KQL above falls back to port/protocol since Zeek shipping is not assumed. Archive creation as part of collection: 7-Zip, WinRAR, tar+gzip on Linux. Typical archives are 10MB-10GB depending on data volume. Detection: SMB write of files with archive extensions exceeding 10MB threshold. Adversary-typical naming patterns: random short names (a.zip, x.rar), date-stamped (2025-04-30.zip), location-named (data.zip, files.rar, backup.7z). Sophisticated adversaries password-protect archives - visible at archive header level: ZIP central directory, RAR header, 7z header all reveal encryption flags without revealing contents. False positives: legitimate backup archives, software distribution packages, IT operations. Build $BACKUP_HOSTS allowlist. The 10MB threshold filters out most legitimate small archives (installer .zips, log bundles) while catching realistic data-theft archives. Pair with subsequent outbound transfer of files matching the size profile and with staging-directory writes (sid 9107401).'
