    analyst_notes: 'If you ship Zeek logs to Kibana, you can sharpen this KQL by adding zeek.smb_files.action or zeek.smb_cmd.command filters (e.g. "SMB_FILE_READ" / "SMB_FILE_WRITE" / "get_dfs_referral") - the baseline KQL above falls back to port/protocol since Zeek shipping is not assumed. Staging locations are chosen because they''re: writeable by most users (including service accounts), often excluded from EDR/AV scanning, large enough for big archives, unlikely to be reviewed by users. Common patterns: C:\$Recycle.Bin\... (looks like deleted files; rarely browsed), C:\Windows\Temp (generic temp; massive baseline of writes), C:\ProgramData\... (hidden by default; service-account writeable), C:\Users\Public\... (legitimately writeable by all users), C:\PerfLogs (often empty; always present), C:\Intel\Logs (looks like driver logs). Detection focuses on UNUSUAL files appearing in these locations: .zip/.rar/.7z archives, .dat/.bin generic blobs, oddly-named files. Pair with file SIZE thresholds - staged archives are typically >50MB. Also pair with subsequent SMB read of the same files (preparation for exfil pulls them out) or outbound transfer matching the file size profile.'
