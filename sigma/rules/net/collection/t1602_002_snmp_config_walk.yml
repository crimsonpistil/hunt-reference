    analyst_notes: 'CISCO-CONFIG-COPY-MIB (1.3.6.1.4.1.9.9.96) and OLD-CISCO-SYSTEM-MIB (1.3.6.1.4.1.9.2.1.55) both allow remote dumping of running and startup configurations via SNMP - typically to a TFTP server. Adversaries with SNMP write community strings (or read-only on misconfigured devices) can pull configs containing: enable secrets (often weakly hashed), VPN preshared keys, BGP/OSPF auth keys, ACL contents, NAT rules. Volt Typhoon and other infrastructure-focused threats heavily target Cisco IOS, Juniper, Fortinet config extraction. Detection: SNMP getbulk/getnext walks of these specific OIDs, particularly from sources outside the $NETWORK_ADMINS allowlist. Pair with subsequent TFTP transfer (UDP/69) or SCP from network device to attacker - the config copy operation often uses TFTP put. Modern best practice: SNMPv3 with auth/priv (replacing SNMPv1/v2c community strings), restrict SNMP source IPs at device ACL, monitor SNMP set operations.'
