    analyst_notes: 'Internal code repos (GitLab, Gitea, Bitbucket Server, GitHub Enterprise) frequently contain hardcoded credentials, infrastructure secrets, business logic, customer data references. After credential compromise, adversaries clone many repos to grep offline for secrets. The git HTTP protocol uses /info/refs?service=git-upload-pack as the initial handshake - every clone hits this. Pattern: 5+ distinct repos cloned from one source in 10 minutes. Threshold lower than other bursts because legitimate developer behavior rarely involves cloning many distinct repos in rapid succession. Tools: gitleaks, trufflehog, or custom scripts run AFTER the clone - the network signal is the clone burst, the offline grep happens locally. Pair with subsequent outbound transfers of the cloned data (T1041 / T1567). For SSH-protocol git access (port 22), Zeek conn.log shows the connections but file paths aren''t visible - fall back to volume-based detection.'
