    analyst_notes: 'Hidden administrative shares (C$, ADMIN$, IPC$) and ad-hoc dollar-suffixed shares are rarely accessed legitimately by end-user workstations - they''re admin tooling endpoints. Adversaries connect to them for two reasons: (1) lateral movement preparation (already covered under T1021.002), and (2) collection - file servers often have full-disk shares (D$, E$) that expose entire data volumes. Detection: SMB tree connect requests targeting any \\host\X$ pattern from sources that aren''t on your $ADMIN_VLAN allowlist. Zeek''s smb_mapping.log captures every tree connect. Investigate which user account performed the connect (via the prior NTLMSSP_AUTHENTICATE or Kerberos AP-REQ) - admin shares accessed by service accounts during off-hours are particularly suspicious. Pair with subsequent file read volume from the same connection.'
