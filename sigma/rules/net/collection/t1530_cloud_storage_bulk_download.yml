    analyst_notes: 'Cloud storage providers each have distinctive SNI patterns: AWS S3 uses bucket.s3.region.amazonaws.com or s3.amazonaws.com, Azure Blob uses account.blob.core.windows.net, GCS uses storage.googleapis.com. Bulk download attacks: adversaries with stolen IAM credentials/SAS tokens enumerate buckets and download contents. Pattern: 200+ HTTPS requests to cloud storage SNI from one source within 10 minutes is well above normal application baseline. Tools: AWS CLI s3 sync/cp, rclone, custom boto3/azure-sdk scripts. Cloud-side detection is more precise (CloudTrail, Azure Activity Log, GCS audit logs) and SHOULD be your primary detection - but network-side catches the egress side and can fire before cloud audit logs are reviewed. Build $CLOUD_USERS allowlist of known sources that legitimately access cloud storage at scale (CI/CD runners, backup services, data pipelines). After exclusions, this signature catches adversaries operating with stolen tokens from compromised workstations.'
