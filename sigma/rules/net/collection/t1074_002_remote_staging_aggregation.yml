    analyst_notes: 'If you ship Zeek logs to Kibana, you can sharpen this KQL by adding zeek.smb_files.action or zeek.smb_cmd.command filters (e.g. "SMB_FILE_READ" / "SMB_FILE_WRITE" / "get_dfs_referral") - the baseline KQL above falls back to port/protocol since Zeek shipping is not assumed. Remote staging consolidates collection across many source hosts to one staging host inside the network - typically the host with the best outbound egress path. Pattern: multiple internal source IPs writing large files (>100MB) to one destination over short time window, accumulating to 1GB+ of inbound data at the destination. Common staging hosts: file servers (already trusted to receive bulk data), jump hosts (often have egress for legit reasons), forgotten dev servers (low monitoring). Detection: aggregate write volume per destination IP per hour; alert when total inbound writes exceed 1GB from multiple distinct sources. False positives: legitimate backup operations (allowlist $BACKUP_HOSTS), file server consolidation (allowlist $FILE_SERVERS - though those usually have outbound restrictions). Pair with subsequent outbound traffic from the staging host - the staging-then-exfil pattern is essentially diagnostic. Modern best practice: data exfiltration prevention via DLP at egress, but network-side staging detection catches the activity before egress.'
