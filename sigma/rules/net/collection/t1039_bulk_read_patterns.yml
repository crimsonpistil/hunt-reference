    analyst_notes: 'Source-scope this query with ip.src != $ALLOWED_SMB_CLIENTS (operator-maintained list of expected SMB-reading hosts e.g. backup servers, monitoring agents) - the default query catches all SMB traffic which will be noisy. If you ship Zeek logs to Kibana, you can sharpen this KQL by adding zeek.smb_files.action or zeek.smb_cmd.command filters (e.g. "SMB_FILE_READ" / "SMB_FILE_WRITE" / "get_dfs_referral") - the baseline KQL above falls back to port/protocol since Zeek shipping is not assumed. Normal user file access patterns are characterized by depth, not breadth - they open a project folder, read 5-10 related files, work for a while, occasionally open another related folder. Adversary collection is the inverse: shallow but wide reads across many directories within minutes. Detection: count unique file paths AND unique parent directories per source IP per 5-minute window. Threshold of 50 files across 10+ directories is a starting point - tune based on your environment (developers and analysts may legitimately hit higher baselines for code/data folders). Build per-role baselines if you can: HR users access HR shares, finance users access finance shares; cross-role access is highly anomalous. Zeek''s smb_files.log is the primary data source; pair with smb_mapping.log to see which shares the source first connected to.'
