    analyst_notes: IRemoteSCMActivator (UUID 000001a0-0000-0000-c000-000000000046) is the DCOM interface used to activate COM objects on a remote machine. Opnum 3 (RemoteCreateInstance) and 4 (RemoteGetClassObject) are the activation methods - adversaries call these with the CLSID of the object they want to instantiate. The traffic occurs on TCP/135 (RPC endpoint mapper) and then on a dynamically-allocated high port (49152-65535) for the actual object communication. Detection at the IRemoteSCMActivator level catches the activation phase. Legitimate DCOM use exists (some enterprise applications use it heavily - particularly older SCADA/ICS apps and some Office automation), so build $DCOM_CLIENTS allowlist for sanctioned sources.
