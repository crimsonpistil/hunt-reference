    analyst_notes: 'Byte-pattern detection of this signature lives in the Suricata content/pcre rule (see Suricata column). Arkime baseline has no field for deep-payload matching - payload8.src.hex / payload8.dst.hex only capture first 8 bytes. MMC20.Application (CLSID 49B2791A-B1AE-4C90-9B8E-E860BA07F889) is the COM object for Microsoft Management Console. Its Document.ActiveView.ExecuteShellCommand method allows remote command execution - Matt Nelson''s original research published in 2017 made this the canonical DCOM lateral movement technique. Tools: Invoke-DCOM (PowerShell), Cobalt Strike''s dcom command, custom scripts. Detection: the CLSID byte pattern in DCERPC activation traffic is highly distinctive - almost no legitimate use case for remote MMC20.Application instantiation. Microsoft has not deprecated this interface; mitigation requires disabling DCOM on workstations or restricting MMC.exe permissions. Worth alerting on every match - false positive rate near zero.'
