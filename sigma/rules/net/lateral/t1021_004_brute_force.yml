    analyst_notes: 'SSH brute force and password spray patterns produce many short-lived connections from one source. Successful SSH auths last seconds-to-hours; failed auths terminate quickly (typically <2 seconds, with <20 packets). The detection: 10+ short-lived SSH connections from one source in 5 minutes against many distinct destinations. Internet-facing SSH brute force is heavily filtered by tools like fail2ban - internal SSH brute force is less commonly defended and is a strong lateral movement indicator. Tools: hydra, medusa, custom scripts, Metasploit ssh_login. Build $SSH_HEALTHCHECKS allowlist for monitoring tools that legitimately make short SSH connections (uptime checkers, configuration drift detection). After exclusions, this pattern is essentially always either red team or active threat actor.'
