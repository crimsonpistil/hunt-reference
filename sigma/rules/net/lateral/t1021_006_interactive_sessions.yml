    analyst_notes: 'Most legitimate WinRM use is short-lived: Invoke-Command runs, returns output, disconnects. Sustained 30+ minute WinRM sessions indicate Enter-PSSession (interactive remote shell) - the adversary opens a PowerShell prompt on the target and works there. The pattern: long session with substantial bidirectional data flow. Legitimate use: rare - usually a sysadmin troubleshooting a specific issue interactively. Sustained interactive PSSessions, especially during off-hours or from non-admin sources, are essentially always either red team operations or threat actor lateral movement. Combine with hostname/destination analysis: Enter-PSSession to a domain controller from a workstation = high-confidence pre-DCSync activity.'
