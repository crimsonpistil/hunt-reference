    analyst_notes: 'If you ship Zeek logs to Kibana, you can sharpen this KQL by adding zeek.smb_files.action or zeek.smb_cmd.command filters (e.g. "SMB_FILE_READ" / "SMB_FILE_WRITE" / "get_dfs_referral") - the baseline KQL above falls back to port/protocol since Zeek shipping is not assumed. Impacket''s wmiexec.py creates output files on the target with names like ''__1234567890.123'' (timestamp.fraction) in ADMIN$ - the executed command''s stdout/stderr is redirected here, then the script reads back the file via SMB and deletes it. The filename pattern is highly distinctive: double underscore + 10+ digit number + period + fractional digits. Other Impacket tools (atexec.py, smbexec.py) use similar patterns. Zeek smb_files.log captures the filenames; the regex catches the canonical Impacket signature. Modern Impacket forks sometimes change the format - the upstream repo''s pattern remains the dominant signature. Adversaries using stock Impacket (which is most of them) generate this pattern; only those who modify Impacket source escape it.'
