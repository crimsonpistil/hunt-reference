    analyst_notes: 'After dropping the service binary to ADMIN$, PsExec uses the svcctl RPC interface (UUID 367abb81-9844-35f1-ad32-98f038001003) to create and start the service. Key opnums: RCreateServiceW (opnum 12), RStartServiceW (opnum 19), RDeleteService (opnum 2), RChangeServiceConfigW (opnum 24), RControlService (opnum 1). The full PsExec sequence: ADMIN$ tree-connect → write PSEXESVC.exe → svcctl create service → svcctl start service → connect to \\.\pipe\psexesvc for I/O. Detection at the svcctl RPC level catches the service creation step. Combine with ADMIN$ write detection (sid 9100203) - they should occur within 60 seconds of each other. Together they''re essentially proof of remote execution. Particularly clean signal in environments with restricted SCCM (where legitimate svcctl traffic is rare).'
