    analyst_notes: 'PsExec uses the named pipe \\.\pipe\psexesvc for stdin/stdout/stderr redirection between the controlling host and the executed command. Variants: PAExec (\\.\pipe\paexec), RemCom (\\.\pipe\remcom_communication), CSExec, Impacket psexec.py uses customizable but often default-named pipes. Detection at the pipe-name level is high-confidence - these are essentially never used outside their respective tools. Modern Cobalt Strike SMB beacons use customizable pipe names (default postex_, status_, msagent_) which are covered in the C2 indicators (T1090.001 sid 9109002). This indicator targets the classic PsExec family specifically. Sophisticated operators rename pipes - but defaults still appear in many real operations. Worth maintaining as low-cost coverage even with caveats.'
