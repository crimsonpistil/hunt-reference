    analyst_notes: 'RDP supports multiple security layers: Standard RDP Security (legacy, weak, vulnerable to MITM), TLS, and CredSSP/NLA (Network Level Authentication - most secure, requires authentication BEFORE session establishment). NLA is the modern default and adversaries sometimes try to downgrade to weaker security to bypass MITM defenses or exploit older vulnerabilities. The Standard Security protocol negotiation pattern is visible in cleartext during the RDP X.224 connection request. Modern environments should require NLA - workstations attempting Standard Security RDP are either misconfigured or attempting downgrade. Maintain $LEGACY_RDP_CLIENTS for known-legitimate sources (older systems, embedded devices). Combine with subsequent CredSSP negotiation absence - if a session goes from Standard Security request directly to RDP data without the NLA exchange, that''s a successful downgrade.'
