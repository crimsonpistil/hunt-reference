    analyst_notes: 'Adversaries with valid credentials often use Invoke-Command -ComputerName @($targets) to fan out PowerShell execution across many hosts simultaneously. The network pattern: one source establishing WinRM connections to 5+ distinct destinations within 10 minutes. Legitimate management automation (Ansible, custom PowerShell DSC) can produce similar patterns from sanctioned automation hosts - these should be in $WINRM_ADMINS or a separate $AUTOMATION_HOSTS exclusion. After exclusions, fan-out from non-automation sources is essentially always either red team operations or active threat actor activity. Particularly clean signal in environments where PowerShell-based mass administration isn''t used.'
