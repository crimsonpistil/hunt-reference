    analyst_notes: 'Microsoft''s tscon.exe utility, when run with SYSTEM privileges, allows attaching to a disconnected RDP session WITHOUT requiring the original user''s credentials - a classic privilege escalation and lateral movement technique. The full attack: adversary on Server X with SYSTEM access, identifies a disconnected RDP session belonging to a Domain Admin, runs ''tscon <session-id> /dest:rdp-tcp'' and inherits the session. From the network perspective, the RDP traffic just continues - no new authentication, no new connection. Detection requires Windows Event ID 4778 (session connect) and EDR command-line monitoring for tscon.exe with /dest parameters. Mention here for kill-chain completeness - this is a critical lateral movement technique that network-only detection misses entirely. Pair with privileged user behavior analytics: a Domain Admin''s session ''continuing'' from a host they never logged into is the smoking gun.'
