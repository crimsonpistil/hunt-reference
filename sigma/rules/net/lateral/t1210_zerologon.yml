    analyst_notes: 'ZeroLogon (CVE-2020-1472) is a critical authentication bypass in MS-NRPC (Netlogon Remote Protocol) - the AES-CFB8 implementation has a flaw where 1-in-256 attempts with all-zero ciphertext succeed. Exploits send NetrServerAuthenticate3 calls (NETLOGON interface UUID 12345678-1234-abcd-ef00-01234567cffb, opnum 26) with all-zero client credentials repeatedly until success. Network signature: NetrServerAuthenticate3 calls with zero-byte client credential fields, often in rapid bursts (the exploit needs ~256 attempts on average). Detection: count NetrServerAuthenticate3 calls per source per minute - burst patterns indicate active exploitation. Microsoft patched in August 2020; environments with unpatched DCs remain critically vulnerable. Pair with subsequent DCSync activity (which often follows successful ZeroLogon) for kill-chain visibility.'
