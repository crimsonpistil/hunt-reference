    analyst_notes: 'ADMIN$ is a hidden administrative share that maps to %SystemRoot% (typically C:\Windows). Access requires local admin rights on the target. Legitimate use: SCCM agent operations, IT management tools, manual administrative maintenance from sanctioned admin workstations. Adversary use: PsExec drops PSEXESVC.exe to ADMIN$, smbexec writes batch files, wmiexec uses ADMIN$ for output redirection. Build $ADMIN_VLAN allowlist tightly - your actual sanctioned admin sources, NOT the broader IT VLAN. After exclusions, ADMIN$ access from workstations is essentially always lateral movement. Pair with subsequent svcctl RPC calls (sid 9100204) - the ADMIN$ access alone is enumeration; ADMIN$ + service creation is execution.'
