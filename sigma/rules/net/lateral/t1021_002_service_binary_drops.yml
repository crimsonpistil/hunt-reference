    analyst_notes: 'If you ship Zeek logs to Kibana, you can sharpen this KQL by adding zeek.smb_files.action or zeek.smb_cmd.command filters (e.g. "SMB_FILE_READ" / "SMB_FILE_WRITE" / "get_dfs_referral") - the baseline KQL above falls back to port/protocol since Zeek shipping is not assumed. PsExec and equivalents drop their service binary to ADMIN$ before invoking it: PsExec writes PSEXESVC.exe, Impacket psexec.py writes a randomly-named .exe, smbexec writes a batch file. The SMB command sequence is tree-connect to ADMIN$ → create file → write data → close. Zeek smb_files.log captures filename and write operations. The Suricata signature looks for the PE magic bytes ''MZ'' (0x4D 0x5A) within 1KB of the ADMIN$ tree connect - catches PE writes to admin shares. False positives: legitimate SCCM updates, Windows Update Server pushes - both should be allowlisted by source. After exclusions, executable writes to ADMIN$ are the highest-confidence single network signal for SMB lateral movement. Particularly powerful when the destination is a workstation rather than a server.'
