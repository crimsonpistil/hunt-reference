    analyst_notes: 'RDP brute force / password spray patterns: many failed authentication attempts from one source against one or many targets within a short window. RDP doesn''t have great network-visible authentication state - TLS/CredSSP encrypts the actual credentials - but Zeek''s RDP analyzer can capture the connection sequence and infer success/failure from session lengths. Failed RDP auths typically last 1-2 seconds (TLS handshake + auth + reject). Successful auths last longer (full session establishment, screen data flowing). A burst of short-lived RDP connections from one source = brute force or spray. Pair with Windows Event ID 4625 (failed logon) on destination hosts for definitive correlation. Adversaries who''ve compromised one set of credentials often try the same credentials across many targets - lateral spray.'
