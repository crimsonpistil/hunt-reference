    analyst_notes: 'Evil-WinRM is the most popular non-Microsoft WinRM client - written in Ruby, used heavily in red team operations and HackTheBox-style exploitation. It uses the Faraday HTTP library, producing User-Agent strings containing ''Ruby'' or ''Faraday''. These are essentially never seen in legitimate enterprise WinRM traffic. The signature catches both the canonical Evil-WinRM and most Ruby-based custom WinRM clients. Detection is high-confidence: legitimate WinRM uses ''Microsoft WinRM Client'' UA; Ruby/Faraday UA on /wsman = adversary tool. Sophisticated operators may patch Evil-WinRM to spoof the Microsoft UA, but most don''t. Worth maintaining as low-cost coverage for the common case.'
