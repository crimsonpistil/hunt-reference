    analyst_notes: 'Salt Typhoon modifies the loopback interface address on a compromised switch and then uses that loopback as the SOURCE of SSH connections to additional devices - because management ACLs often trust traffic from infrastructure/loopback ranges, this bypasses the access controls that would block an arbitrary host. The result is device-to-device SSH that looks like it came from trusted infrastructure. Hunt method: SSH (TCP/22) where BOTH ends are network devices and the source is not one of your sanctioned admin/jump sources ($SSH_ADMINS). Even more telling: SSH sourced from a loopback address that does not match the device''s known/baselined loopback, or a loopback that recently changed. Pair with config-integrity monitoring for interface Loopback stanza changes and ACL edits (T1686), and with new authorized_keys appearing on the target devices (Salt Typhoon adds SSH authorized_keys under root). This is infrastructure lateral movement - it never touches a host OS, so it is invisible to endpoint tooling and must be caught on the wire and in device config.'
