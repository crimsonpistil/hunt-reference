    analyst_notes: 'If you ship Zeek logs to Kibana, you can sharpen this KQL by adding zeek.smb_files.action or zeek.smb_cmd.command filters (e.g. "SMB_FILE_READ" / "SMB_FILE_WRITE" / "get_dfs_referral") - the baseline KQL above falls back to port/protocol since Zeek shipping is not assumed. After establishing a foothold, adversaries copy tools to multiple internal hosts: PsExec, BloodHound, Cobalt Strike beacons, custom binaries, archive files containing tool collections. The pattern: bulk SMB write of executable/script/archive files from one non-file-server source. Build $FILE_SERVERS allowlist (sanctioned file servers, SCCM distribution points). After exclusions, sustained executable file writes via SMB from a workstation source = adversary tool staging. Particularly powerful when destinations are administrative shares (combine with sid 9100203 for ADMIN$ writes specifically). Pair with EDR file-creation events on destination hosts for definitive correlation. Sophisticated adversaries sometimes archive their tools (.7z, .rar, .zip with passwords) to defeat content inspection - extension monitoring catches this anyway.'
