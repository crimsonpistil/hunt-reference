    analyst_notes: In healthy networks, RDP flows from admin workstations and jump hosts to servers - not between user workstations. Workstation-to-workstation RDP is a strong lateral movement indicator. Build $RDP_JUMP_HOSTS allowlist from your sanctioned admin sources (PAW devices, jump servers, IT support workstations). Build $WORKSTATIONS from your VLAN allocation. After exclusions, peer RDP is essentially always either an unsanctioned IT shortcut or active lateral movement. Particularly powerful when combined with EDR - the source process initiating mstsc.exe or RDP-related WMI calls confirms the activity. Pair with subsequent network traffic from the destination workstation (does it start probing more hosts? exfiltrating data?) for full kill-chain correlation.
