    analyst_notes: 'WinRM is rarely used in environments without explicit deployment - most workstations don''t speak it, and the WinRM service is disabled by default on workstation editions. Server-to-server WinRM is more common (Exchange, SCCM, PowerShell-based automation), but workstation-to-server or peer WinRM is anomalous. Build $WINRM_ADMINS allowlist tightly. The detection has very low false-positive rate after exclusions because legitimate WinRM use is concentrated in specific known sources. Pair with PowerShell logging (Event ID 4103/4104) on destination hosts for definitive correlation. Adversary tools that use WinRM: PowerShell Remoting (native), Evil-WinRM, Invoke-Command in scripts, Cobalt Strike''s PowerShell pivot.'
