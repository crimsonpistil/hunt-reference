    analyst_notes: The WS-Management protocol uses HTTP POST to the /wsman endpoint with SOAP envelope payloads. The User-Agent for the native Windows client is 'Microsoft WinRM Client' - distinctive and rarely spoofed even by adversary tools. PowerShell Remoting and Invoke-Command both use the native client. Evil-WinRM and other Ruby/Python-based tools have their own User-Agent strings (often 'Ruby' or 'Python-Requests') - those are different signatures. The native client is the dominant pattern in operations using PowerShell. WinRM HTTP traffic IS encrypted at the application layer (Kerberos/SPNEGO wrap-and-unwrap on the SOAP body), so the User-Agent and URI are visible but content isn't - perfect for detection without privacy concerns.
