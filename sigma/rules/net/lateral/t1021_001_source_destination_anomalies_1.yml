    analyst_notes: 'Adversaries with valid credentials work through the network methodically - RDPing to many hosts in sequence to find the right target. Even legitimate IT admins typically RDP to a small set of servers; sustained RDP fan-out (5+ distinct destinations in 10 minutes from one source) is anomalous. The pattern is especially clean when adversaries are doing post-exploitation enumeration via RDP rather than scripted means. Tune the threshold based on environment: in a small environment 5 might be normal admin behavior; in a large enterprise 5+ within 10 minutes from a single non-admin source is strong signal. Pair with EDR for mstsc.exe parent-process analysis - adversary RDP often originates from cmd.exe, powershell.exe, or unusual parents.'
