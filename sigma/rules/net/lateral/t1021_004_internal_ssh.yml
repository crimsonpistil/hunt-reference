    analyst_notes: 'In well-segmented environments, SSH should originate from a small set of admin sources: jump hosts, bastion servers, IT admin workstations, automation systems (Ansible, Salt, Puppet). Build $SSH_ADMINS tightly. Internal SSH from compromised workstations or unexpected sources is a strong lateral movement indicator. Particularly relevant in cloud environments where SSH is the primary admin protocol for Linux workloads - adversaries who compromise one EC2 instance often pivot to others via SSH using harvested keys. Pair with T1552.004 (Private Keys) detection - if you observe a host accessing SSH private keys (.ssh/id_rsa, ~/.aws/credentials) followed by SSH to a new destination, that''s a clear credential-then-lateral chain.'
