    analyst_notes: 'PrintNightmare (CVE-2021-1675, CVE-2021-34527) is a vulnerability in the Windows Print Spooler service - RpcAddPrinterDriverEx (opnum 89 in the spoolss interface) accepts a driver path that the spooler loads with SYSTEM privileges, allowing arbitrary code execution. Exploits provide UNC paths to remote DLLs (\\attacker\share\evil.dll) that get loaded as printer drivers. Network signature: RpcAddPrinterDriverEx calls with UNC paths or .dll references in the parameters. Detection challenge: legitimate printer driver installation uses this same RPC - but only from sanctioned print servers (SCCM, your print management infrastructure). Build $PRINT_SERVERS allowlist; alert on RpcAddPrinterDriverEx from anywhere else. Microsoft has issued multiple patches; many environments still have unpatched systems particularly in OT and healthcare networks.'
