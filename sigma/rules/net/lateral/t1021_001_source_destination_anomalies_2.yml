    analyst_notes: 'Internet-facing RDP is one of the top initial access vectors for ransomware - exposed RDP servers get credential-sprayed within hours of going online (Shodan-discoverable). Adversaries who succeed often use the same RDP access for lateral movement once inside. Detection: any external IP connecting to internal RDP that isn''t your sanctioned RDP gateway (CloudFlare, Citrix Gateway, RD Gateway, AWS Session Manager). The detection IS the alert - there should be NO direct external RDP to your internal network. If you find any, you have a perimeter exposure problem regardless of whether the connection is malicious. Many environments inherit these exposures from M&A activity or shadow IT - periodic scanning of your own external IP space (Shodan, custom port scans) catches them.'
