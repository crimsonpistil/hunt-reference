    analyst_notes: EternalBlue (MS17-010, CVE-2017-0144) is the SMB1 vulnerability used by WannaCry, NotPetya, and many subsequent attacks. The exploit uses crafted SMB1 trans2/nt_trans requests with specific patterns that produce a buffer overflow in the SMB driver. Detection at the SMB1 dialect level catches the vulnerable protocol use; combined with trans2/nt_trans commands and characteristic byte patterns, near-zero false positive rate. Modern environments should disable SMB1 entirely - but it remains active in many legacy OT, healthcare, and embedded systems. Maintaining detection coverage is important even though widespread exploitation has decreased - particularly in environments where MS17-010 patching is incomplete (which is many environments). The signature catches both Metasploit's eternalblue module and direct PoC implementations.
