    analyst_notes: 'C$ maps to the entire C: drive - full filesystem read/write access for local administrators. Adversaries use C$ for: dropping arbitrary tools to non-system paths (C$\Users\Public\), reading sensitive files (C$\Users\<victim>\.aws\credentials, browser data), staging exfiltration. Multiple admin share access from one source within seconds (e.g. tree-connect to C$ then ADMIN$ then IPC$ in 30 seconds) is the PsExec / Impacket pattern: enumerate IPC$ for RPC binding, write binary to ADMIN$, execute via svcctl, retrieve output via C$. The detection catches the multi-share access pattern. Pair with SMB write operations to ADMIN$ for service binary deployment confirmation (sid 9100203).'
