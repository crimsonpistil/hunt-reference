    analyst_notes: 'SSH agent forwarding (-A flag, ForwardAgent yes) lets a session use the original client''s SSH keys to authenticate further hops. Adversaries abuse this for lateral movement: compromise a user''s session on Host A → user SSHs to Host B with -A → adversary on Host B uses the forwarded agent socket to SSH to Host C without ever knowing the user''s keys. Detection at the network layer is hard - agent forwarding doesn''t change the wire-protocol signature visibly. SSH protocol uses RFC 4254 channel types but the channel name ''auth-agent@openssh.com'' is sent encrypted. Detection requires either: (1) host-side ssh daemon logging with LogLevel VERBOSE+, (2) auditd hooks on socket creation, or (3) SSH bastion proxies (Teleport, Boundary) that log explicitly. Mention here for completeness - best detected at the host or bastion layer.'
