    analyst_notes: 'If you ship Zeek logs to Kibana, you can sharpen this KQL by adding zeek.smb_files.action or zeek.smb_cmd.command filters (e.g. "SMB_FILE_READ" / "SMB_FILE_WRITE" / "get_dfs_referral") - the baseline KQL above falls back to port/protocol since Zeek shipping is not assumed. [AIR-GAP TRIPWIRE] This indicator detects outbound traffic from MPNET to off-MPNET infrastructure. In a properly air-gapped environment this query should never produce hits; any hit indicates a likely air-gap violation: bridged USB tether, rogue cellular modem, vendor/maintenance laptop bridging networks, supply-chain implant calling home, or misconfigured perimeter device. Treat as priority-1 escalation; do not dismiss as false positive without thorough investigation. Zeek''s Dynamic Protocol Detection (DPD) identifies the actual protocol being spoken in a TCP session by content inspection, regardless of the port number. When the detected protocol differs from the port''s standard assignment, that''s a port-protocol mismatch - strong indicator of either misconfigured legitimate service or adversary using non-standard ports for known protocols. Examples: SSH on TCP/443, HTTP on TCP/22, custom binary protocol on TCP/80. The dpd.log captures these mismatches explicitly. This is the most general detection for non-standard port abuse and complements signature-based detections - it catches cases where neither the port nor a JA3/JA4 fingerprint match expectations. Suricata can produce similar signals via its app-layer protocol detection (`app-layer-protocol:!http` on port 80, etc).'
