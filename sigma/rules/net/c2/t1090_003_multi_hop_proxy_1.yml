    analyst_notes: Tor pluggable transports (obfs4, meek-azure, snowflake) disguise Tor traffic to bypass network-level Tor blocking. obfs4 uses a custom obfuscated protocol that doesn't match TLS or any standard application protocol - Zeek's protocol detection logs these as 'unknown' protocol on TCP. meek wraps Tor traffic in TLS to legitimate CDN endpoints (Azure CDN, AWS CloudFront historically) - the SNI looks legitimate but the traffic is Tor. Snowflake uses WebRTC over TURN servers. Each has characteristic JA3/JA4 fingerprints because they use custom TLS implementations. Detection on these is harder than entry node lookup but possible with current TLS fingerprint feeds (FoxIO maintains JA4 fingerprints for major pluggable transports). Most enterprise environments should block all pluggable transport traffic.
