    analyst_notes: 'CDN-hosted endpoints carry massive volumes of legitimate traffic - most large websites use CloudFront, Akamai, Fastly, or Azure CDN. The challenge is distinguishing legitimate CDN-fronted services from C2 infrastructure on the same CDN. Per-host first-contact analysis helps: a workstation establishing a sustained connection to a never-before-seen CDN endpoint subdomain is more suspicious than connecting to a popular SaaS service''s CDN. Build per-host CDN endpoint history. Pair with destination certificate examination - domain-fronted C2 often uses cloudfront.net wildcard certs while legitimate services use brand-specific certs. Cloud Functions URLs (cloudfunctions.net, *.run.app) are increasingly abused - these are dynamically allocated and trivial for adversaries to register.'
