    analyst_notes: 'For process attribution, pivot to Kibana with Sysmon Event 3 filtered by the destination IP/port from this session - read winlog.event_data.Image for the culprit process. [AIR-GAP TRIPWIRE] This indicator detects outbound traffic from MPNET to off-MPNET infrastructure. In a properly air-gapped environment this query should never produce hits; any hit indicates a likely air-gap violation: bridged USB tether, rogue cellular modem, vendor/maintenance laptop bridging networks, supply-chain implant calling home, or misconfigured perimeter device. Treat as priority-1 escalation; do not dismiss as false positive without thorough investigation. Google Workspace is one of the most-abused web services for C2 by Iranian and North Korean actors. Charming Kitten (APT35) has used Google Docs/Drive extensively for both C2 and exfiltration - implants read commands from a Google Doc, write results back to it, and upload exfil to Drive. The Google Drive API endpoints (/drive/v3/files, /upload/drive/v3/files) are visible in URL paths even over HTTPS via SNI and request URI inspection. Process correlation: legitimate Drive sync comes from Google Drive client, browsers, or sanctioned backup tools. Audit OAuth grants in your Google Workspace admin console.'
