    analyst_notes: End-user workstations shouldn't initiate outbound SMTP - mail flows through your authenticated mail relay (Exchange, O365, Google Workspace). Any non-mail-server host initiating outbound SMTP is anomalous. C2-via-email implants (Hammertoss, custom Lazarus implants) use Gmail/Outlook drafts as a dead-drop channel - see T1102.001 for that variant. Direct SMTP to attacker-controlled mail server is more obvious. Watch for outbound 587 (submission) and 465 (SMTPS) in addition to legacy 25 - modern implants typically use the encrypted submission ports. Zeek smtp.log captures HELO/EHLO, MAIL FROM, RCPT TO, and message subject lines.
