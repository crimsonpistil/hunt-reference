    analyst_notes: 'Salt Typhoon modifies the running-config of compromised switches and routers to stand up Generic Routing Encapsulation (GRE, IP protocol 47) tunnels, then routes collection and exfiltration traffic through them - blending into normal carrier/router-to-router traffic and side-stepping inspection that only watches TCP/UDP. GRE between routers and VPN concentrators is legitimate, so the signal is a NEW or unexpected GRE peering: a device tunneling to an endpoint that is not in your sanctioned peer list, or a device that never spoke GRE suddenly originating it. Hunt method: baseline your GRE peerings ($SANCTIONED_GRE_PEERS) and alert on first-seen tunnels, especially those terminating outside your AS or toward hosting/VPS ranges. Pair with config-integrity monitoring on the device (diff running-config against a known-good baseline for tunnel interface stanzas) and with the loopback/ACL changes Salt Typhoon makes to source traffic from trusted addresses. Because the tunnel lives in device config rather than on a host, EDR will not see it - this is a network-and-config hunt.'
