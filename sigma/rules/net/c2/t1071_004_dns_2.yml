    analyst_notes: 'DNS NULL records (type 10) are rarely used legitimately - they were intended for experimental data and are essentially unused outside C2 abuse. Iodine uses NULL records in default mode because they can carry the most data (no formatting restrictions). Any NULL query from a workstation is highly suspicious. CNAME chain abuse - many CNAME records resolved in sequence - can encode data in the chain. MX record queries from workstations are also anomalous (mail clients query MX for the destination domain, but workstations don''t normally do this). Build per-host DNS query type baselines: a workstation querying types other than A/AAAA in volume = anomaly worth investigating.'
