    analyst_notes: Repeated DNS queries from a workstation to a domain registered in the last 7 days is a high-confidence C2 indicator. Most legitimate domains accessed by enterprise users have been around for years. Newly registered domain (NRD) data is available from threat intel feeds (DomainTools, Whoisxml, SecurityTrails). Integrate with Suricata rule sets via lua scripts or with Kibana via threat intel enrichment. Pair with low-reputation TLD (.xyz, .top, .pw, .tk, .ml, .ga, .cf) detection - combination of NRD + low-rep TLD is near-certain malicious infrastructure. Zeek dns.log + passive DNS database (CIRCL, DomainTools, VirusTotal) makes this a powerful retro-hunt capability.
