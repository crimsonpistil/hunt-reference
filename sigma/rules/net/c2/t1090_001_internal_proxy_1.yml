    analyst_notes: 'Internal proxies (compromised host used as a pivot for lateral C2 routing) generate a distinctive east-west pattern: a single internal IP receiving inbound connections from many other internal IPs to a single port. Workstations don''t normally serve as connection targets for other workstations. Servers that legitimately receive many internal client connections (DCs, file servers, app servers) should be in your asset inventory and excluded from this detection. The remaining hosts that show this pattern - workstation, IoT device, printer, IP camera - receiving many internal connections are anomalous. Pair with EDR for definitive identification of which process is listening. Common Cobalt Strike pivot pattern: SMB beacon listening on \\.\pipe\beacon or named pipes, or HTTP listener on 8080.'
