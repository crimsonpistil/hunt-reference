    analyst_notes: FTP (TCP/21) is largely deprecated for legitimate use - SFTP, FTPS, and HTTPS file transfer have replaced it. End-user workstations and application servers shouldn't initiate outbound FTP. When they do, it's often legacy systems pulling from internal mirrors (legitimate but should be on internal IPs only) or implants using FTP as a low-sophistication C2/exfil channel. The USER command at the start of the session reveals the username being used - adversary credentials often appear here in cleartext. Zeek ftp.log captures the full transaction including filenames transferred. FTP data channel uses dynamic ports (passive mode) - the control channel on 21 is what's reliably visible.
