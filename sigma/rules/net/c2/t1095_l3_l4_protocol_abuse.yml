    analyst_notes: GRE (protocol 47), SCTP (132), AH (50), and ESP (51) are L3/L4 protocols normally seen between routers and VPN concentrators - not from end-user workstations. When these protocols originate from a workstation IP, it's either a misconfigured tunnel client (rare) or an exotic C2 channel (also rare but very interesting). End-user hosts shouldn't speak GRE outbound. SCTP is occasionally used by SS7-related telecom applications but only on dedicated systems. Protocol abuse for C2 is uncommon but documented - adversaries occasionally use unusual L3 protocols specifically to evade network controls that only inspect TCP/UDP.
