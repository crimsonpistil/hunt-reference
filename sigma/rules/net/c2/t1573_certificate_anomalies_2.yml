    analyst_notes: Let's Encrypt issues free 90-day TLS certificates with minimal validation - they're heavily used by adversaries for C2 infrastructure because they're free, fast, and provide the same green-padlock UX as commercial certs. The detection signal isn't 'Let's Encrypt cert' (which has many legitimate users) but 'Let's Encrypt cert issued in the last 7 days on a first-contact destination'. Combine with NRD detection (destination is a newly registered domain) for very high confidence. Build per-host destination history; alert when a host establishes its first connection to a destination AND that destination has a recently-issued Let's Encrypt cert AND is a low-reputation domain. This stacked signal is near-certain malicious.
