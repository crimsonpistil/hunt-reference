    analyst_notes: Residential proxy networks (Bright Data formerly Luminati, Oxylabs, Smartproxy, NetNut, IPRoyal) route traffic through real consumer IP addresses - devices owned by users who installed an SDK in exchange for free apps or VPN services. Adversaries use these networks because each request appears to originate from a different residential ISP IP, defeating IP reputation, geolocation analysis, and rate limiting. The destination IPs of these networks change rapidly as the proxy pool rotates. Detection requires threat intel feeds that track residential proxy network IPs. Spur.us specializes in this - both reactive (lookup) and bulk feeds. Residential proxies are also legitimately used by competitive intelligence, ad verification, and price comparison services. Block where no legitimate business case exists.
