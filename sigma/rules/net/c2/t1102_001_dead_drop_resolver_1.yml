    analyst_notes: 'For process attribution, pivot to Kibana with Sysmon Event 3 filtered by the destination IP/port from this session - read winlog.event_data.Image for the culprit process. [AIR-GAP TRIPWIRE] This indicator detects outbound traffic from MPNET to off-MPNET infrastructure. In a properly air-gapped environment this query should never produce hits; any hit indicates a likely air-gap violation: bridged USB tether, rogue cellular modem, vendor/maintenance laptop bridging networks, supply-chain implant calling home, or misconfigured perimeter device. Treat as priority-1 escalation; do not dismiss as false positive without thorough investigation. GitHub Gists and raw repository content are commonly abused as dead drops because GitHub is essentially impossible to block in modern enterprises. The adversary publishes a gist containing the C2 endpoint configuration, and the implant fetches the raw URL. Detection requires distinguishing legitimate developer activity (git clone, IDE syncing, package managers fetching from GitHub) from anomalous fetches by other processes. EDR process correlation is essential. Build per-host baselines: developer workstations have heavy legitimate GitHub traffic; finance / HR / production server access to gist.githubusercontent.com is highly anomalous. Filter on URL patterns too - implants typically fetch /username/gist-id/raw paths, not browsing patterns.'
