    analyst_notes: Non-browser HTTP libraries (WinHTTP, WinINet, curl, wget, python-requests, Go-http-client) downloading executable file types (.exe, .dll, .ps1, .vbs, .bat, .hta, .scr) is one of the highest-confidence indicators of post-exploitation tool transfer. Each individual signal has noise (legitimate scripts use these libraries; legitimate updates download executables), but the combination of non-browser UA + executable extension + unknown destination is near-zero false positive. Custom implants written in Go produce 'Go-http-client/1.1' UA. Python-based stagers produce 'python-requests/{version}'. Curl and wget are obvious. WinHTTP and WinINet are common Windows API patterns. Pair with destination domain age (NRD) and reputation for highest-confidence alerting.
