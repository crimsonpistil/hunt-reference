    analyst_notes: 'For process attribution, pivot to Kibana with Sysmon Event 3 filtered by the destination IP/port from this session - read winlog.event_data.Image for the culprit process. [AIR-GAP TRIPWIRE] This indicator detects connections to off-MPNet infrastructure that should be unreachable from an air-gapped environment. Any hit indicates a likely air-gap violation: bridged USB tether, rogue cellular modem, vendor/maintenance laptop bridging networks, supply-chain implant calling home, or misconfigured perimeter device. Treat as priority-1 escalation; do not dismiss as false positive without thorough investigation. Adversaries rent VPS infrastructure from commercial providers (DigitalOcean, Vultr, Linode, Hetzner, Contabo, AWS, Azure) as proxy/relay nodes. The IPs are legitimate hosting infrastructure but the use case is malicious. Maintain $KNOWN_VPS_RANGES from threat intel feeds (GreyNoise, Censys, ASN-based lists) - note this is NOT a blocklist (legitimate cloud workloads come from these ASNs too) but rather a watchlist for behavioral anomalies. Sustained connections (>5 minutes) carrying meaningful data (>10KB) from end-user workstations to bare-IP VPS endpoints are anomalous - legitimate cloud usage flows through DNS-named services, not random hosting IPs. Combine with destination-IP age (when did your network first see this IP), JA4 fingerprint, and process correlation.'
