    analyst_notes: Direct-IP HTTP requests (Host header is an IPv4 or IPv6 address rather than a domain) bypass DNS reputation, NRD detection, and threat intel domain feeds. Adversaries use this when their domain has been burned or to avoid creating DNS infrastructure entirely. Most legitimate web traffic uses domain names - direct-IP fetches are unusual and direct-IP fetches OF executables are essentially never legitimate. The pattern shows up in stager scripts and second-stage payload retrieval. Combine with destination IP being on a commercial VPS range (sid 9109003 from T1090) for very high confidence. Zeek http.log captures the Host header explicitly. Detection is a near-zero-FP pattern.
