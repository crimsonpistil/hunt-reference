    analyst_notes: 'For process attribution, pivot to Kibana with Sysmon Event 3 filtered by the destination IP/port from this session - read winlog.event_data.Image for the culprit process. [AIR-GAP TRIPWIRE] This indicator detects outbound traffic from MPNET to off-MPNET infrastructure. In a properly air-gapped environment this query should never produce hits; any hit indicates a likely air-gap violation: bridged USB tether, rogue cellular modem, vendor/maintenance laptop bridging networks, supply-chain implant calling home, or misconfigured perimeter device. Treat as priority-1 escalation; do not dismiss as false positive without thorough investigation. Hammertoss-class implants (APT29) and similar use Twitter/X as dead drops - the implant fetches a specific Twitter handle''s profile or tweets, parses encoded data from the tweet content (often steganographically embedded in images), and uses it to identify the actual C2 endpoint. The technique is OPSEC-optimized: even if the adversary''s Twitter account is taken down, the implant continues trying. Detection requires process correlation - non-browser processes fetching twitter.com or x.com are anomalous. Modern variants may use Mastodon, Bluesky, or other federated platforms with similar API patterns.'
