    analyst_notes: Outbound UDP traffic from internal hosts is mostly DNS (53), NTP (123), some VPN protocols (500/4500/51820), syslog (514), DHCP (67/68), and a small set of others. Custom UDP C2 channels stand out - high packet rate from internal hosts to external destinations on non-standard UDP ports. Build $ALLOWED_UDP allowlist for sanctioned UDP traffic (your DNS resolvers, NTP servers, sanctioned VPN endpoints). After exclusions, sustained UDP traffic to external destinations is anomalous. UDP-based C2 is less common than TCP because UDP doesn't provide reliability - but some sophisticated implants use it for stealth (no connection tracking).
