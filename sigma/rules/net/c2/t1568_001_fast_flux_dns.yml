    analyst_notes: 'Fast flux DNS rapidly rotates A records for a single domain across a pool of compromised hosts (typically residential broadband, IoT devices, or hosting nodes the operator controls). The domain resolves to a different IP every few minutes. Detection signal: a single domain that resolves to many distinct IPs across many distinct ASNs over a short time window. Legitimate use case: large CDNs (CloudFlare, Akamai, AWS) - but these stay within the CDN''s own ASN. Fast flux infrastructure spans many unrelated ASNs (residential ISPs from many countries). Maintain a $KNOWN_CDNS exclusion list. Aggregate by registered domain, not just FQDN - fast flux often uses many subdomains under a single registered domain.'
