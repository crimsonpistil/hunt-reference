    analyst_notes: 'certutil.exe is a Windows certificate management utility that can also download files via ''certutil -urlcache -split -f http://...'' - extensively abused by adversaries because it''s signed Microsoft code that bypasses application allowlisting. The User-Agent string ''CertUtil'' (or sometimes ''Microsoft-CryptoAPI'') is sent with the HTTP request and is highly distinctive. Legitimate certutil usage is internal CRL/OCSP fetches to PKI infrastructure - outbound certutil to internet hosts is essentially never legitimate. The technique is documented in MITRE LOLBAS project and remains in active use because many environments don''t audit certutil usage. Pair with EDR process correlation: certutil.exe spawned by an unusual parent (cmd.exe via macro, PowerShell, anything other than admin context) is the strongest signal.'
