    analyst_notes: 'jARM (by Salesforce) is an active TLS server fingerprinting tool - sends 10 specifically crafted TLS Client Hellos to a target server, observes the server''s responses, and builds a 62-character fingerprint. Different C2 frameworks have characteristic jARM fingerprints due to their default TLS implementations. Workflow: identify candidate C2 IPs from passive detection (beacon timing, JA3 anomaly, certificate analysis); use jARM.py to actively fingerprint them; compare against known C2 framework fingerprints. Cobalt Strike default jARM has been published, as have Sliver, Mythic, Havoc, Brute Ratel defaults. This is an investigation tool, not a real-time alert mechanism - but it''s powerful for confirming that a suspicious external IP is running a known C2 framework.'
