    analyst_notes: 'Cobalt Strike SMB beacons communicate over named pipes between compromised hosts - the parent beacon connects to the child beacon''s named pipe to send commands and receive results. Default pipe names: MSSE-{number}-server (older versions), postex_{hex}, status_{hex}, msagent_{hex}. Operators should customize but many don''t. The named pipe abuse is also used by other frameworks: Sliver uses configurable pipe names but defaults are documented. PowerShell Empire used \\.\pipe\empire-{id}. Detection: Zeek''s smb_files.log or smb.log captures pipe names. Operators using completely custom pipe names evade this - but the pattern of internal SMB to non-standard pipes (anything not srvsvc, lsass, samr, netlogon, eventlog, etc.) is itself anomalous and worth alerting on.'
