    analyst_notes: Low-reputation TLDs (.xyz, .top, .tk, .ml, .ga, .cf, .cc, .pw) are heavily abused for adversary infrastructure because they're cheap, easy to register anonymously, and have minimal abuse response from registrars. Most enterprise software and legitimate updates do NOT come from these TLDs. An executable file download from one of these TLDs is a strong adversary indicator. Pair with NRD detection (sid 9110506) - a brand-new domain on a low-rep TLD serving an .exe = essentially certain malicious. Build a $LEGITIMATE_LOW_REP_DOMAINS allowlist for the rare exception (some legitimate services do use these TLDs) and alert on everything else.
