    analyst_notes: ConnectWise Control (formerly ScreenConnect), Splashtop, NinjaRMM, Atera, LogMeIn, RustDesk, NetSupport Manager, and Parsec are remote management platforms heavily abused by adversaries. ScreenConnect specifically had a critical vulnerability (CVE-2024-1709, ConnectWise authentication bypass) exploited at scale in 2024 - adversaries with access to a ScreenConnect instance can deploy persistent agents to all managed endpoints. Each platform has distinct SNI patterns. RustDesk is an open-source self-hosted alternative that's increasingly seen in adversary operations because the operator can host the rendezvous server themselves. Block these at proxy/firewall unless your organization specifically uses one of them - and if you do use one, allowlist that vendor's SNI and alert on every other RMM tool's traffic.
