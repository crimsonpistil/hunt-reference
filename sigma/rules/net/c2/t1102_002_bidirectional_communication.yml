    analyst_notes: 'For process attribution, pivot to Kibana with Sysmon Event 3 filtered by the destination IP/port from this session - read winlog.event_data.Image for the culprit process. [AIR-GAP TRIPWIRE] This indicator detects connections to off-MPNet infrastructure that should be unreachable from an air-gapped environment. Any hit indicates a likely air-gap violation: bridged USB tether, rogue cellular modem, vendor/maintenance laptop bridging networks, supply-chain implant calling home, or misconfigured perimeter device. Treat as priority-1 escalation; do not dismiss as false positive without thorough investigation. Discord webhooks (POST to /api/webhooks/{id}/{token}) are extensively abused for C2 and exfiltration - they require no authentication, accept arbitrary message content and file attachments, and the destination URL contains both the channel and credentials in a single string. Stealer malware (Redline, Vidar, Raccoon, Lumma) almost universally uses Discord webhooks for stolen credential exfiltration. Bot API endpoints (/api/v{N}/channels/{id}/messages) provide bidirectional C2. Detection: any non-Discord-client process POSTing to discord.com is suspicious. Many enterprise environments have no legitimate Discord use case - block at proxy.'
