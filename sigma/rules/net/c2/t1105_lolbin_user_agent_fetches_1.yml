    analyst_notes: Background Intelligent Transfer Service (BITS) is the Windows service that handles Windows Update, WSUS, and similar background downloads. Its User-Agent is 'Microsoft BITS/{version}' and is highly distinctive. Adversaries abuse BITS via 'bitsadmin /transfer' or PowerShell's Start-BitsTransfer to download payloads with administrative tooling that's signed and trusted. BITS to non-Microsoft-Update destinations is anomalous. Build $ALLOWED_UPDATE_SOURCES allowlist (Microsoft published ranges, your WSUS server). Anything else from BITS is suspicious. The technique is documented across many APTs because BITS downloads run in the background, persist across reboots, and don't require an interactive user session. EDR correlation with bitsadmin.exe process or PowerShell Start-BitsTransfer cmdlet provides definitive identification.
