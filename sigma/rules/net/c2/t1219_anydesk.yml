    analyst_notes: AnyDesk connects to *.net.anydesk.com endpoints with HTTPS on TCP/443 primarily, with fallback TCP/6568 and TCP/7070 for direct connections. AnyDesk is heavily abused by ransomware affiliates and Scattered Spider - particularly because it's portable (single executable, no installation required) which makes it perfect for adversary deployment. The portable executable produces distinctive process behavior (anydesk.exe in non-standard locations, often %TEMP% or user-writeable paths). Network detection per the SNI patterns above; pair with EDR for portable-AnyDesk-deployment indicators (file path of the binary).
