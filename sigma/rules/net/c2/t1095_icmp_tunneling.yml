    analyst_notes: 'Standard ICMP echo (ping) packets carry small payloads - typically 32-64 bytes, all printable ASCII or sequential bytes. ICMP tunnels (ptunnel, icmpsh, custom implants) carry hundreds to thousands of bytes per packet, often encrypted. Detection: ICMP echo packets with payload >100 bytes from internal hosts to external destinations. Pair with high packet rate (50+ pings to same destination in 10 minutes) - legitimate ping rarely sustains this. The tunnel pattern: internal host pinging external IP frequently with full-MTU ICMP payloads = essentially always a tunnel. Block ICMP echo to/from internet at perimeter as basic hygiene.'
