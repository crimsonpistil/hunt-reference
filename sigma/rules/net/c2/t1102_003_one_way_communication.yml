    analyst_notes: 'For process attribution, pivot to Kibana with Sysmon Event 3 filtered by the destination IP/port from this session - read winlog.event_data.Image for the culprit process. [AIR-GAP TRIPWIRE] This indicator detects connections to off-MPNet infrastructure that should be unreachable from an air-gapped environment. Any hit indicates a likely air-gap violation: bridged USB tether, rogue cellular modem, vendor/maintenance laptop bridging networks, supply-chain implant calling home, or misconfigured perimeter device. Treat as priority-1 escalation; do not dismiss as false positive without thorough investigation. Cloud storage services are heavily abused for exfiltration (T1567 Exfiltration Over Web Service) but also for one-way C2 - implants upload status reports and harvested data to attacker-controlled cloud storage accounts. The detection challenge mirrors Slack: cloud storage clients are legitimate, so process correlation is essential. Focus on the API endpoints (content.dropboxapi.com, graph.microsoft.com, uploads.mega.nz) which are used by the sync clients but also by any custom HTTP code. Mega.nz is particularly favored by criminal actors due to its strong client-side encryption (which also defeats DLP inspection). For Microsoft 365 tenants, audit OAuth grants regularly.'
