    analyst_notes: 'Per-host JA4 baselining is one of the most powerful TLS-layer detection patterns. Most workstations have a small set of TLS clients in active use: Chrome, Edge, Firefox, the Outlook desktop client, Teams, OneDrive, Slack, a few system utilities. The set of JA4 fingerprints observed on a host is stable. A new JA4 fingerprint appearing on a host - especially making outbound connections to first-seen destinations - is a strong indicator of new code running. Implants written in Go, Rust, Python, or .NET produce distinctive JA4 fingerprints. Build the baseline in Kibana via aggregation: count distinct JA4s per source.ip, alert when new one appears. Worth investigating even when destination is benign - the new TLS client itself is the signal.'
