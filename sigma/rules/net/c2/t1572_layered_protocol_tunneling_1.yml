    analyst_notes: 'For process attribution, pivot to Kibana with Sysmon Event 3 filtered by the destination IP/port from this session - read winlog.event_data.Image for the culprit process. [AIR-GAP TRIPWIRE] This indicator detects outbound traffic from MPNET to off-MPNET infrastructure. In a properly air-gapped environment this query should never produce hits; any hit indicates a likely air-gap violation: bridged USB tether, rogue cellular modem, vendor/maintenance laptop bridging networks, supply-chain implant calling home, or misconfigured perimeter device. Treat as priority-1 escalation; do not dismiss as false positive without thorough investigation. Wireguard (UDP/51820), OpenVPN (UDP/1194), IPsec (UDP/500 IKE, UDP/4500 NAT-T) are legitimate VPN protocols used by VPN client software. When a workstation initiates these protocols to a destination that isn''t your corporate VPN concentrator, it''s either a personal VPN service (consumer policy violation) or an adversary-controlled tunnel endpoint. Personal VPN use cases: Mullvad, ProtonVPN, NordVPN - these have known endpoint ranges that can be added to a watchlist. Wireguard is increasingly used by adversaries because it''s simple, fast, and produces lightweight UDP traffic that''s easy to confuse with QUIC. Process correlation: only sanctioned VPN clients should be using these protocols; everything else is anomalous. Personal VPN policy enforcement: most enterprises should block consumer VPN endpoints at egress.'
