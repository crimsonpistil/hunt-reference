    analyst_notes: Tor (The Onion Router) routes traffic through 3+ hops with layered encryption - the entry node sees the originating IP but not the destination; the exit node sees the destination but not the originator. From a defender's perspective, you can identify connections to the Tor entry node list (published continuously at check.torproject.org/torbulkexitlist and via the Tor consensus). $TOR_NODES should be auto-updated daily from these sources. Tor is sometimes used legitimately by privacy-conscious users, journalists, and researchers - but in most enterprise environments it's a strong policy violation indicator. Tor browser uses ports 9001, 9030 for relay traffic, 9050 for SOCKS, and increasingly 443/80 for traffic that passes through obfs4 bridges (which themselves require additional detection - see next indicator).
