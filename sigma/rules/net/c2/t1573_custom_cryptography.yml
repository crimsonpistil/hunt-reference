    analyst_notes: Some implants use custom symmetric encryption rather than TLS for C2 - RC4, AES with hardcoded keys, XOR-with-rotating-key. The traffic flows over TCP/UDP without TLS handshake but the payload is still encrypted, producing high entropy (close to 8 bits per byte, the maximum). Detection requires payload entropy analysis - Zeek's entropy script (corelight/zeek-spicy-entropy or custom analyzer) calculates Shannon entropy per session. Encrypted traffic without TLS markers (no 16 03 0X TLS record header) on non-standard ports is a strong custom-crypto C2 indicator. T1573.001 specifically covers symmetric crypto; the same indicator catches RC4-based implants from older malware families.
