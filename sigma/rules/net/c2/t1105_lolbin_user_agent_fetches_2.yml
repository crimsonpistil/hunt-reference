    analyst_notes: 'PowerShell''s Invoke-WebRequest, Invoke-RestMethod, and (New-Object Net.WebClient).DownloadString send a default User-Agent containing ''WindowsPowerShell'' or ''Mozilla/5.0 (Windows NT 10.0; ...; WindowsPowerShell/...)''. PowerShell HTTP downloads are rare in normal user activity (sometimes legitimate for IT automation scripts, package managers like Chocolatey) but very common in adversary tooling. Detection: any PowerShell HTTP UA from a host that doesn''t legitimately use PowerShell for HTTP. Build per-host allowlists for sanctioned PowerShell HTTP patterns. The Empire and PowerSploit frameworks use PowerShell HTTP downloads extensively; modern Cobalt Strike powerpick and execute-assembly use in-memory loading that doesn''t always cross the network. Pair with PowerShell logging (Event ID 4104) for definitive correlation.'
