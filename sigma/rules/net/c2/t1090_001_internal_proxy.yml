    analyst_notes: '[AIR-GAP TRIPWIRE] netsh interface portproxy add v4tov4 is one of Volt Typhoon''s most documented network behaviors (CISA AA24-038A). They turn a compromised edge device, server, or domain controller into a quiet relay using only the built-in Windows netsh command - no malware, no extra tooling, which is why host AV misses it. The network signal is the giveaway: a host that should not be a server suddenly accepts an inbound TCP connection on an odd high port and, in the same window, originates an outbound connection toward another segment or external infrastructure - it is bridging two conversations. Hunt method: build per-host listener baselines and alert on first-seen listening ports, then correlate inbound-to-port-X with a paired outbound from the same host. The portproxy config also persists in the registry under HKLM\\SYSTEM\\CurrentControlSet\\Services\\PortProxy\\v4tov4\\tcp and shows in netsh interface portproxy show all on the host - pull both during triage. Volt Typhoon has used this on PRTG servers and edge appliances specifically to proxy traffic toward critical-infrastructure OT boundaries. Replace $KNOWN_SERVICE_PORTS with your real service-port allowlist so legitimate app servers do not drown the signal.'
