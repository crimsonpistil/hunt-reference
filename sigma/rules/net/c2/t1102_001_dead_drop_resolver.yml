    analyst_notes: 'For process attribution, pivot to Kibana with Sysmon Event 3 filtered by the destination IP/port from this session - read winlog.event_data.Image for the culprit process. [AIR-GAP TRIPWIRE] This indicator detects connections to off-MPNet infrastructure that should be unreachable from an air-gapped environment. Any hit indicates a likely air-gap violation: bridged USB tether, rogue cellular modem, vendor/maintenance laptop bridging networks, supply-chain implant calling home, or misconfigured perimeter device. Treat as priority-1 escalation; do not dismiss as false positive without thorough investigation. Dead drop resolvers are paste-style services where the adversary publishes the actual C2 endpoint (IP, domain, key, configuration) as a public paste. The implant fetches the paste, parses out the C2 details, and connects to the resolved infrastructure. The paste itself looks like random text or code. Detection signal: workstation processes (non-browsers) fetching raw pastes from paste.ee, pastebin, ghostbin, rentry, etc. Browser fetches are usually a developer or legitimate user; non-browser process fetches via WinHTTP, BITS, PowerShell, curl, python-requests are anomalous. Pair with EDR process telemetry. Block paste sites at proxy if your environment has no legitimate developer use case for them.'
