    analyst_notes: 'Most legitimate HTTPS sessions are short - a request, a response, the connection closes (or HTTP/2 multiplexes briefly). Tunneled HTTPS (ngrok, Cloudflare Tunnel, custom tools using HTTPS transport) generates sustained sessions with substantial bidirectional traffic - minutes to hours of session duration with hundreds of KB to MB transferred each way. Build per-host HTTPS session profiles: most workstations have many short sessions; one or two hosts with sustained heavy-bidirectional sessions to first-seen destinations are anomalous. Tools to know: ngrok generates client connections to ngrok.io endpoints; Cloudflare Tunnel uses cloudflared client connecting to *.cloudflareaccess.com or *.argotunnel.com; tailscale uses *.tailscale.com. These are increasingly used for legitimate purposes (development, remote access) - process correlation distinguishes legitimate tool use from implant abuse.'
