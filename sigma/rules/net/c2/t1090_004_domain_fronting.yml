    analyst_notes: Domain fronting works by presenting one domain in the TLS SNI (the only domain visible to network observers) while sending a different Host header inside the encrypted HTTPS request. CDN edge servers use the SNI to terminate TLS but route based on the inner Host header - meaning the SNI says 'images.bigcorp.com' (legitimate) but the Host header routes to 'attackerc2.com' (also hosted on the same CDN). The mismatch IS the detection. Requires either egress TLS inspection (to see the Host header) or a CDN egress policy enforcing SNI=Host. CloudFront and Google Cloud blocked domain fronting in 2018 by enforcing SNI=Host at the edge - Azure CDN and Fastly didn't fully follow until 2022. Variants persist on smaller CDNs and via SNI manipulation in newer techniques (ESNI, Encrypted ClientHello). Maintain detection coverage even though the technique has been partially mitigated upstream.
