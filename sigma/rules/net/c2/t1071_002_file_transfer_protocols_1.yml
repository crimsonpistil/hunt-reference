    analyst_notes: 'SMB to external destinations is essentially never legitimate - outbound TCP/445 to the internet should be blocked at the perimeter as a basic hygiene control. When it bypasses controls (egress firewall misconfiguration), implants can use SMB for both C2 and credential theft (responder-style hash capture against attacker-controlled SMB servers). The classic indicator: a UNC path injection (\\attacker.com\share) in an Office document or browser that triggers an outbound SMB authentication attempt, leaking the user''s NTLM hash to the adversary. Block outbound 445 at the perimeter and alert on any attempt - there''s no legitimate reason to allow it.'
