    analyst_notes: DGA implants generate hundreds to thousands of pseudo-random domains daily and try to resolve them - only the few that the operator has registered will succeed; the rest return NXDOMAIN. The signal is a workstation generating an anomalously high NXDOMAIN rate. Baseline normal NXDOMAIN rates per host (typo'd URLs, expired domains, internal lookup misses) - typically a few per hour at most. A workstation generating 30+ NXDOMAINs in 10 minutes is a strong DGA indicator. Conficker famously generated 50,000 candidate domains daily, of which only ~500 were registered. Modern DGAs (Necurs, Emotet, Qakbot, Murofet) generate 1000-10000 daily candidates. Combine with subdomain entropy analysis on the queried domains.
