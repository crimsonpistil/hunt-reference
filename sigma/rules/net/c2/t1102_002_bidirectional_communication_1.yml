    analyst_notes: 'For process attribution, pivot to Kibana with Sysmon Event 3 filtered by the destination IP/port from this session - read winlog.event_data.Image for the culprit process. [AIR-GAP TRIPWIRE] This indicator detects outbound traffic from MPNET to off-MPNET infrastructure. In a properly air-gapped environment this query should never produce hits; any hit indicates a likely air-gap violation: bridged USB tether, rogue cellular modem, vendor/maintenance laptop bridging networks, supply-chain implant calling home, or misconfigured perimeter device. Treat as priority-1 escalation; do not dismiss as false positive without thorough investigation. Telegram Bot API uses URLs of the form /bot{bot_id}:{bot_token}/{method} - the bot ID and token are embedded in the URL itself, making detection straightforward at the URL pattern level. /sendMessage and /sendDocument are exfil endpoints; /getUpdates polls for incoming commands (the bidirectional C2 pattern). Telegram is heavily abused by Russian-speaking criminal actors for C2 and stealer exfiltration. Like Discord, Telegram is allowlisted in many environments - block api.telegram.org if no legitimate business use case exists.'
