    analyst_notes: 'For process attribution, pivot to Kibana with Sysmon Event 3 filtered by the destination IP/port from this session - read winlog.event_data.Image for the culprit process. [AIR-GAP TRIPWIRE] This indicator detects outbound traffic from MPNET to off-MPNET infrastructure. In a properly air-gapped environment this query should never produce hits; any hit indicates a likely air-gap violation: bridged USB tether, rogue cellular modem, vendor/maintenance laptop bridging networks, supply-chain implant calling home, or misconfigured perimeter device. Treat as priority-1 escalation; do not dismiss as false positive without thorough investigation. Slack incoming webhooks (https://hooks.slack.com/services/T{team}/B{bot}/{token}) are abused for C2 and exfil similarly to Discord webhooks - no authentication required beyond knowing the URL, accepts arbitrary text and file content. Slack API endpoints (chat.postMessage, files.upload) provide bidirectional C2 with bot token authentication. Detection challenge: Slack is heavily used in enterprises, so blocking is not feasible. Focus on process correlation: legitimate Slack traffic comes from the Slack desktop app, browser tabs, or sanctioned integrations (Jira, GitHub, PagerDuty, Datadog). Anything else POSTing to Slack endpoints is suspicious. Maintain inventory of approved Slack integrations.'
