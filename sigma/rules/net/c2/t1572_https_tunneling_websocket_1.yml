    analyst_notes: 'WebSocket (RFC 6455) starts as an HTTP/HTTPS request with ''Upgrade: websocket'' and ''Connection: Upgrade'' headers, then upgrades to a persistent bidirectional channel that bypasses request-response HTTP semantics entirely. Once upgraded, the connection carries arbitrary binary or text data - perfect for C2 tunnels. Legitimate WebSocket use: real-time web applications (Slack, Discord webapp, trading platforms, messaging apps, video conferencing signaling). Detection challenge: distinguishing legitimate WebSocket use from C2 tunnels. Process correlation is the strongest signal - non-browser processes initiating WebSocket connections are highly anomalous. Sustained connections (>10 minutes) to first-seen destinations are anomalous regardless of process. The Upgrade headers are visible in cleartext HTTP and in the cleartext portion of HTTPS (Zeek http.log captures them when decrypting).'
