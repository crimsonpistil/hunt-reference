    analyst_notes: 'DNS tunneling tools (iodine, dnscat2, DNSExfiltrator, custom implants) encode data in subdomain labels - typically base32 or base64 encoded into 30-63 character subdomain segments. The signal is high query volume to a single registered domain with very long, high-entropy subdomain labels. Iodine specifically uses the format <encoded-data>.tunnel.attacker.com. Calculate Shannon entropy on subdomain strings - encoded data has near-uniform character distribution (entropy >4.5 for base32, >4.8 for base64); legitimate subdomains have lower entropy due to dictionary patterns. False positives: some CDNs use long hash-based subdomains (Akamai, CloudFront) - exclude known CDN domains.'
