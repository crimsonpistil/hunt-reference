    analyst_notes: Many implants spoof their User-Agent to look like a browser (Mozilla/5.0 with realistic browser version strings) but use a non-browser TLS library underneath, producing a JA4 fingerprint that doesn't match any real browser. The mismatch - claimed Chrome UA + non-Chrome JA4 - is a strong signal. Build $BROWSER_JA4_RANGE from current major browser fingerprints (Chrome, Firefox, Safari, Edge by version) - FoxIO publishes these. Then alert on any host claiming a browser UA but presenting a JA4 outside that range. Especially powerful against Python requests, Go http, and curl-based implants that try to blend in with browser-style UAs.
