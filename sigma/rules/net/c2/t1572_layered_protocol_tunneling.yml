    analyst_notes: 'For process attribution, pivot to Kibana with Sysmon Event 3 filtered by the destination IP/port from this session - read winlog.event_data.Image for the culprit process. [AIR-GAP TRIPWIRE] This indicator detects connections to off-MPNet infrastructure that should be unreachable from an air-gapped environment. Any hit indicates a likely air-gap violation: bridged USB tether, rogue cellular modem, vendor/maintenance laptop bridging networks, supply-chain implant calling home, or misconfigured perimeter device. Treat as priority-1 escalation; do not dismiss as false positive without thorough investigation. DNS-over-HTTPS sends DNS queries inside HTTPS to public resolvers (Cloudflare 1.1.1.1, Google 8.8.8.8 via dns.google, Quad9, OpenDNS DoH, AdGuard). When clients use DoH, on-network DNS inspection is bypassed entirely - your enterprise resolver, your DNS-based security tools, and your DNS query telemetry are all blind. Browsers (Firefox by default since 2020, Chrome opt-in) use DoH legitimately, which is itself a problem for defenders. Non-browser processes connecting to DoH endpoints are highly anomalous - there''s no legitimate reason for a generic application to bypass system DNS resolution. Block known DoH endpoints at the firewall (the SNI is visible) and force DNS through your enterprise resolver. This is essential hygiene for environments with serious DNS-based detection (DGA, NRD, tunnel detection from T1568 and T1071.004 - all bypassed by DoH).'
