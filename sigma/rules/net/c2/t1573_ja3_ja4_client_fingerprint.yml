    analyst_notes: 'JA3 (and modern replacement JA4) hashes the client TLS handshake parameters - cipher suites, extensions, elliptic curves, point formats - into a fingerprint that identifies the client implementation. Different TLS libraries produce different fingerprints: Chrome on Windows is one fingerprint; Firefox is another; the Python requests library is another; custom Go implants produce a Go-specific fingerprint. Maintain $MALICIOUS_JA3 and $MALICIOUS_JA4 from threat intel feeds - abuse.ch SSLBL, FoxIO JA4 database, Mandiant fingerprints. JA4 is preferred over JA3 because it includes more handshake elements and is more stable across TLS library versions. Some classic Cobalt Strike default JA3 hashes: 72a589da586844d7f0818ce684948eea, a0e9f5d64349fb13191bc781f81f42e1.'
