    analyst_notes: 'Cobalt Strike''s default keystore (cobaltstrike.store) contained a self-signed certificate with CN ''Major Cobalt Strike'' - this exact string in TLS certificate subjects across thousands of compromised networks is one of the most famously documented C2 indicators. Modern operators replace this default certificate, but a surprising number don''t. Other framework default certs to watch for: Metasploit''s default ''MetaSploit'' subject, Burp Suite''s CA cert (sometimes used as a C2 cert by lazy operators), Empire framework defaults. This is a near-zero-FP detection - no legitimate organization would have these strings in their certificate subjects. Worth deploying as a permanent baseline detection.'
