    analyst_notes: DNS TXT records are designed for arbitrary text data - perfect for embedding C2 commands and exfiltrated data. Legitimate TXT queries are rare in normal user traffic - they're typically email validation (SPF, DMARC, DKIM, _domainkey), Let's Encrypt challenges (_acme-challenge), and verification records (_github-challenge, etc). High-volume TXT queries from a workstation to non-validation subdomains is anomalous. Cobalt Strike's DNS C2 mode uses TXT records to tunnel beacon traffic; dnscat2 uses TXT/CNAME/MX. DNS over HTTPS (DoH) bypasses on-network DNS detection - block known DoH endpoints at the firewall and force traffic through your enterprise resolver.
