    analyst_notes: 'HTTP CONNECT is the standard mechanism for establishing tunnels through forward proxies. Legitimate use: clients tunneling HTTPS traffic through your corporate forward proxy. Anomalous use: workstation issuing CONNECT to an external endpoint that isn''t your sanctioned proxy. The CONNECT target reveals the actual destination - ''CONNECT attackerc2.com:443 HTTP/1.1'' shows the target host:port even before the tunnel encrypts. After CONNECT succeeds, the proxy relays raw bytes between client and target (typically TLS); the proxy doesn''t see the encrypted content but does see the connection metadata. Detection at the proxy layer is the cleanest place - your corporate forward proxy should log all CONNECT targets and alert on non-allowlisted destinations.'
