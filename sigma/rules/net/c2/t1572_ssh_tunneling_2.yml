    analyst_notes: 'SSH client banners (sent in cleartext during handshake before encryption begins) reveal the implementation: OpenSSH_8.9p1, PuTTY_Release_0.78, libssh_0.10.4, Cisco-1.25, dropbear_2022.83. Custom tunneling tools (Chisel, FRP, ngrok-style tunnels using SSH transport) often have characteristic banners or modified versions. Some tunneling tools mimic OpenSSH banners exactly to evade this detection - but many don''t. Zeek ssh.log captures both client and server banners. Build a $ALLOWED_SSH_CLIENTS allowlist of banners observed legitimately in your environment and alert on first-seen banners. New SSH tunneling tools appear regularly - Hexshell, Chisel, Wireguard-over-SSH, Cloudflare Tunnel - keep the allowlist tight and investigate new banners.'
