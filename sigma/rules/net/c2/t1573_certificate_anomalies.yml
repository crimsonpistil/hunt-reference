    analyst_notes: 'Modern public-internet TLS uses certificates signed by trusted CAs (Let''s Encrypt, DigiCert, Sectigo, GoDaddy, etc). A self-signed certificate on an external HTTPS connection is a strong anomaly - operators sometimes deploy self-signed certs on team servers to avoid the work of getting a real cert, or for short-lived infrastructure. Detection: issuer == subject in the certificate chain. Internal services (development environments, IoT devices, internal CAs) legitimately use self-signed certs - exclude internal traffic. The remaining external self-signed traffic is essentially always either misconfigured legitimate infrastructure (rare) or implant infrastructure (common).'
