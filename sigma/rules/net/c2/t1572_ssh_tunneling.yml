    analyst_notes: 'End-user workstations don''t typically initiate outbound SSH. When they do, it''s usually a developer workflow (which should be allowlisted by host) or a tunneled C2 channel. Build $ADMIN_HOSTS as the explicit allowlist of hosts permitted to initiate outbound SSH. Everything else from $USER_VLAN going to TCP/22 is anomalous. Port 2222 is a common alternative SSH port - adversaries use it because some egress firewalls allow it as ''developer access''. Pair with destination IP reputation and session-duration analysis: long sustained SSH sessions (hours) with bidirectional data transfer are tunnel indicators, not interactive admin sessions which are typically shorter and bursty.'
