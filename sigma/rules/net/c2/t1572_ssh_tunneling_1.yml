    analyst_notes: 'Interactive SSH sessions are typically: short bursts of input from the user, larger response from the server (command output), with idle gaps. Tunneled SSH (ssh -L for local port forward, ssh -R for reverse forward, ssh -D for SOCKS proxy) shows sustained bidirectional data flow because real application traffic is flowing through the encrypted tunnel. Build SSH session profiles: ratio of source-to-destination bytes, packet timing distribution, session duration. A 30+ minute session with substantial bidirectional data (>100KB each way) is essentially never an interactive shell - it''s a tunnel carrying file transfers, RDP sessions, or other application traffic. Zeek ssh.log captures connection metadata; ssh.log + conn.log together provide the timing and volume analysis surface.'
