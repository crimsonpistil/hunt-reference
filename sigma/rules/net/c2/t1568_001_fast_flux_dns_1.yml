    analyst_notes: Fast flux requires very low TTLs (typically 60-300 seconds) so resolvers don't cache stale IPs while the operator rotates the pool. Legitimate low TTLs occur on CDNs and DNS-based load balancers - these need to be in your $KNOWN_CDNS / $KNOWN_LB exclusion lists. After exclusions, low-TTL responses on non-CDN domains are a strong fast flux indicator, especially when combined with high IP/ASN diversity (sid 9156804). Pair these two indicators in your SIEM for high-confidence fast flux identification. Some legitimate websites use low TTLs for rapid failover - most enterprise and small business sites don't.
