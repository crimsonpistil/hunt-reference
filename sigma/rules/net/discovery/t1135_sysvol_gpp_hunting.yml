    analyst_notes: 'SYSVOL is the domain-controller share where Group Policy Objects (GPOs), startup/logon scripts, and ADMX templates are stored. Famously contained ''cpassword'' values in Group Policy Preferences (GPP) until MS14-025 deprecated the feature - and many environments still have stale legacy GPP files with reversibly-encrypted credentials. Tools: PowerSploit Get-GPPPassword, BloodHound''s data collection, Get-DomainPolicy. The signal: a single non-DC host doing repeated access to SYSVOL/NETLOGON shares - legitimate Group Policy processing happens on logon and at refresh intervals (~90 minutes), so burst access patterns are anomalous. Workstations should hit SYSVOL infrequently; sustained or rapid access is reconnaissance. Pair with EDR for PowerShell process correlation.'
