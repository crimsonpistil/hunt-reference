    analyst_notes: 'Kerberos AS-REQ responses leak username validity: ''KDC_ERR_C_PRINCIPAL_UNKNOWN'' means the username doesn''t exist; ''KDC_ERR_PREAUTH_REQUIRED'' means the username exists but pre-auth is required (need a valid password). Adversaries enumerate usernames by sending AS-REQ for candidate names and parsing the error responses. Tools: kerbrute (Ropnop''s username enumerator), MSF auxiliary/gather/kerberos_enumusers, GetUserSPNs.py with target list, Impacket. The signal: a single source generating many AS-REQ errors with these specific error codes. Zeek krb.log captures error codes explicitly. Threshold-based detection: 30+ unique usernames probed in 5 minutes is essentially always enumeration. Pair with subsequent password spray attempts (T1110.003) - username enumeration commonly precedes spraying.'
