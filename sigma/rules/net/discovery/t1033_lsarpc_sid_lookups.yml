    analyst_notes: 'LSARPC LsaLookupSids (opnum 15) and LsaLookupSids2 (opnum 76) resolve SIDs to usernames - useful for adversaries who''ve harvested SIDs (from process tokens, DACLs, or AD queries) and need to map them to user-friendly names. The detection target: bulk SID lookups (10+ SIDs in a minute from one source) which is the pattern produced by tools enumerating discovered SID lists. Legitimate use: Windows Event Log services, security tools translating audit events. Suspicious: workstation processes lookup-bursting many SIDs in sequence. The technique often appears in BloodHound''s SAMR collection method as a fallback when LDAP enumeration is restricted. Pair with EDR for definitive process attribution - PowerShell, Impacket lookupsid.py, custom enumeration tools.'
