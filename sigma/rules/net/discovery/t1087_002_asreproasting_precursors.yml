    analyst_notes: 'Accounts with the DONT_REQ_PREAUTH flag (UserAccountControl bit 0x400000 = 4194304) don''t require Kerberos pre-authentication - the KDC will issue an AS-REP encrypted with the user''s password hash to anyone who asks, allowing offline cracking (ASREProasting). The LDAP query filter to find these accounts uses the LDAP_MATCHING_RULE_BIT_AND OID ''1.2.840.113556.1.4.803'' against userAccountControl with value 4194304. Tools: GetNPUsers.py (Impacket), Rubeus, PowerView Get-DomainUser -PreauthNotRequired. The OID ''1.2.840.113556.1.4.803:=4194304'' is essentially unique to ASREProasting reconnaissance - legitimate applications don''t query for this UAC flag combination. Pre-auth-disabled accounts are rare in modern environments (most have it enabled) but legacy service accounts and unix-integrated accounts often have it disabled.'
