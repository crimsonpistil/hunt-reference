    analyst_notes: 'SAMR (interface 12345778-1234-abcd-ef00-0123456789ac) opnum 11 is SamrEnumerateGroupsInDomain - equivalent to LDAP group enumeration but via RPC. Opnum 7 is SamrLookupNamesInDomain (resolve names to RIDs). Opnum 25 is SamrGetMembersInGroup. Tools: ''net group /domain'', PowerView Get-DomainGroup, Impacket samrdump.py. SAMR-based enumeration is the older mechanism - most modern tools have migrated to LDAP - but legacy environments and specific RPC-based attack tools still produce SAMR traffic. Microsoft restricted non-admin SAMR access in Windows 10 1607+ via ''Restrict clients allowed to make remote calls to SAM'' setting, but many environments don''t enforce this. Pair with sid 9108705 (SAMR user enumeration) for full RPC-layer account/group discovery coverage.'
