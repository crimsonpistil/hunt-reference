    analyst_notes: 'The srvsvc RPC interface (UUID 4b324fc8-1670-01d3-1278-5a47bf6ee188) provides share management - including NetShareEnumAll (opnum 15) and NetShareEnum (opnum 16) which return the list of shares on a system. This is the underlying RPC call made by ''net view \\target'', ''PowerView Get-NetShare'', ''CrackMapExec --shares'', and most share enumeration tools. Detection: Zeek dce_rpc.log captures the interface UUID and opnum explicitly. Suricata content match looks for the UUID bytes (in network byte order) in the DCERPC bind/call. Legitimate share enumeration: file explorers browsing network neighborhood, IT management tools. Suspicious: workstations or non-IT-admin accounts issuing NetShareEnum against many internal targets in sequence. Pair with subsequent SMB tree connect attempts to identified shares.'
