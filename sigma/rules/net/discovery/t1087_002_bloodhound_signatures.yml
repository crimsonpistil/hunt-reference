    analyst_notes: SharpHound (BloodHound's data collector) issues LDAP queries with a specific complex filter that combines multiple samAccountType values (users 805306368, machines 805306369, group-managed accounts 536870912/536870913) and objectCategory filters in a single OR clause. This combined filter is essentially never used by legitimate applications - it's a SharpHound fingerprint. Detection in Zeek ldap.log captures the full filter string; in Suricata, multi-content matching across the filter components catches the signature. SharpHound also requests an unusually large attribute set (20+ attributes per user object including samAccountName, memberOf, servicePrincipalName, userAccountControl, primaryGroupID, msDS-AllowedToDelegateTo) - additional confirmation. Legitimate AD enumeration tools request fewer, more targeted attributes.
