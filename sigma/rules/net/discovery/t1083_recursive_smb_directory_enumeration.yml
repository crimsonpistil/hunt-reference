    analyst_notes: 'Source-scope this query with ip.src != $ALLOWED_SMB_CLIENTS (operator-maintained list of expected SMB-reading hosts e.g. backup servers, monitoring agents) - the default query catches all SMB traffic which will be noisy. If you ship Zeek logs to Kibana, you can sharpen this KQL by adding zeek.smb_files.action or zeek.smb_cmd.command filters (e.g. "SMB_FILE_READ" / "SMB_FILE_WRITE" / "get_dfs_referral") - the baseline KQL above falls back to port/protocol since Zeek shipping is not assumed. After identifying accessible shares (T1135), adversaries enumerate their contents recursively - finding sensitive files, source code, credentials, customer data. The network signal: sustained SMB sessions with continuous QUERY_DIRECTORY commands (SMB2) over many minutes, with substantial response data (directory listings). Tools: PowerShell Get-ChildItem -Recurse against UNC paths, Snaffler (specifically searches for credential-pattern files), Manyhats/Snaffler-derivatives, robocopy /L (list mode). Distinguishing from legitimate file usage: legitimate users open specific files; adversaries walk entire directory trees. Sustained high-volume query_directory traffic is the hallmark. Snaffler''s pattern is particularly distinctive: rapid directory enumeration with file extension/name pattern matching against a wordlist. Pair with EDR.'
