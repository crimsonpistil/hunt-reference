    analyst_notes: 'Source-scope this query with ip.src != $ALLOWED_SMB_CLIENTS (operator-maintained list of expected SMB-reading hosts e.g. backup servers, monitoring agents) - the default query catches all SMB traffic which will be noisy. If you ship Zeek logs to Kibana, you can sharpen this KQL by adding zeek.smb_files.action or zeek.smb_cmd.command filters (e.g. "SMB_FILE_READ" / "SMB_FILE_WRITE" / "get_dfs_referral") - the baseline KQL above falls back to port/protocol since Zeek shipping is not assumed. After identifying accessible shares, adversaries enumerate their contents - looking for credential files, configuration data, password lists, source code, customer databases. Tools: PowerShell Get-ChildItem -Recurse against UNC paths, Snaffler, manyriahs, custom scripts. The SMB protocol primitive is FIND_FIRST2/FIND_NEXT2 (SMB1) or QUERY_DIRECTORY (SMB2). The signal: rapid sequence of directory queries across many distinct paths from one source. Legitimate file usage typically focuses on a small set of paths at a time; rapid enumeration across 50+ paths in 10 minutes is reconnaissance. Snaffler in particular is increasingly common - it specifically searches for files matching credential patterns (web.config, *.kdbx, id_rsa, .git, unattend.xml). Pair with EDR.'
