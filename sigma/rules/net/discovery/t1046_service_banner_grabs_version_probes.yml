    analyst_notes: 'SSH banners are sent in cleartext by both client and server during the initial handshake before encryption. Banner-grab tools (nmap -sV, ssh banner scanners, custom Python) connect, read the banner, disconnect - producing very short-duration connections (<5 seconds) with minimal packets. The banner reveals the SSH implementation and version (OpenSSH_8.9p1, dropbear_2022.83, libssh_0.10.4) - useful for adversary target selection (vulnerable versions, fingerprinting). Detection: short SSH connections with low packet count from a non-typical-SSH-client host to many destinations. Build $SSH_CLIENTS allowlist for hosts that legitimately initiate SSH (admin workstations, automation accounts). Most workstations don''t initiate SSH at all.'
