    analyst_notes: 'For process attribution, pivot to Kibana with Sysmon Event 3 filtered by the destination IP/port from this session - read winlog.event_data.Image for the culprit process. [AIR-GAP TRIPWIRE] This indicator detects connections to off-MPNet infrastructure that should be unreachable from an air-gapped environment. Any hit indicates a likely air-gap violation: bridged USB tether, rogue cellular modem, vendor/maintenance laptop bridging networks, supply-chain implant calling home, or misconfigured perimeter device. Treat as priority-1 escalation; do not dismiss as false positive without thorough investigation. Adversaries use IP-lookup services to discover their own external IP - needed for C2 callback configuration, geo-awareness, and avoiding self-targeting. Same indicator surfaces in T1568.003 (DNS Calculation precursor) but the use case here is different: T1016 is general network configuration awareness, T1568.003 is C2 endpoint derivation. Process correlation distinguishes legitimate browser traffic (a user clicking ''what''s my IP'') from implant self-discovery (PowerShell, custom binary, python-requests). The detection has minimal false positives once browser exclusions are applied.'
