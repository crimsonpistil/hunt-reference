    analyst_notes: 'Source-scope this query with ip.src != $ALLOWED_SMB_CLIENTS (operator-maintained list of expected SMB-reading hosts e.g. backup servers, monitoring agents) - the default query catches all SMB traffic which will be noisy. If you ship Zeek logs to Kibana, you can sharpen this KQL by adding zeek.smb_files.action or zeek.smb_cmd.command filters (e.g. "SMB_FILE_READ" / "SMB_FILE_WRITE" / "get_dfs_referral") - the baseline KQL above falls back to port/protocol since Zeek shipping is not assumed. DFS (Distributed File System) provides a unified namespace across multiple file servers - \\domain.local\dfs\... resolves to the actual file server hosting the content. Adversaries query DFS namespaces to discover the full set of file servers and shares available across the domain. The SMB primitive is GET_DFS_REFERRAL - a specific SMB command type that''s rarely used by typical clients (browsers and Office apps issue these only when accessing DFS-published paths). The signal: DFS referral burst from one source. Legitimate DFS clients issue referrals occasionally during access; sustained enumeration is anomalous. Particularly relevant in enterprises with extensive DFS deployments - discovery via DFS is much faster than manual share-by-share enumeration. Zeek smb.log captures DFS referral commands.'
