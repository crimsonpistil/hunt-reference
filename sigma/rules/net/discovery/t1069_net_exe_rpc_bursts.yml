    analyst_notes: '''net group /domain'', ''net localgroup administrators'', ''net group "Domain Admins" /domain'' all generate RPC traffic to a domain controller through SAMR and LSARPC interfaces. The exact RPC opnum sequence varies by command - but the burst of multiple SAMR/LSARPC calls from one source within seconds is a recognizable signature of net.exe enumeration. lsarpc UUID is 12345778-1234-abcd-ef00-0123456789ab (note: nearly identical to SAMR but ending ''ab'' vs SAMR''s ''ac''). Detection: count distinct RPC calls to AD interfaces from one source per minute - burst patterns indicate enumeration. Better detection lives at the EDR layer with command-line monitoring; network detection provides confirmation and ground truth. Particularly valuable in environments without comprehensive EDR coverage.'
