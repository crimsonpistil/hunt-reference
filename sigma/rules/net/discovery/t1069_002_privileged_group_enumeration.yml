    analyst_notes: 'Privileged group membership enumeration is the highest-value reconnaissance against AD. Domain Admins, Enterprise Admins, Schema Admins, Account Operators, Backup Operators, and Server Operators are the standard targets. The ''adminCount=1'' attribute is automatically set by AdminSDHolder on members of protected groups - querying for it returns all currently/previously privileged accounts. Tools: PowerView Get-DomainGroupMember -Identity ''Domain Admins'', net group ''Domain Admins'' /domain, Get-ADGroupMember (RSAT), BloodHound. Detection at the LDAP filter level is high-confidence - these specific group names appearing in queries from non-admin-tool sources is essentially always reconnaissance. Pair with EDR for tool attribution.'
