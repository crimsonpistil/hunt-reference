    analyst_notes: 'The canonical AD user enumeration filter: ''(objectClass=user)'' or its variants ''(objectCategory=person)'' and ''(samAccountType=805306368)'' - the SAM account type for normal users. With subtree scope, this returns every user object in the domain. Tools: PowerView Get-DomainUser, ldapsearch, ADSearch, BloodHound SharpHound (--CollectionMethods Default includes user enumeration), Get-ADUser -Filter *. Build $LDAP_CLIENTS allowlist for legitimate sources: AD-integrated applications, IT management tools, sanctioned admin workstations. Workstations and non-IT-admin accounts shouldn''t issue bulk user enumeration queries. LDAPS (TCP/636) requires TLS inspection or Microsoft 4662 event log correlation; LDAP (TCP/389) is in cleartext and visible to Suricata. Microsoft Channel Binding and LDAP Signing requirements have made LDAP-on-389 increasingly rare in modern environments.'
