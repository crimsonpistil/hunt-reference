    analyst_notes: 'AXFR (Authoritative Transfer) is a DNS query that requests a complete copy of a zone - every record. Used legitimately between primary and secondary DNS servers for zone replication. From any other source, AXFR is reconnaissance - the adversary is trying to enumerate every host in your AD-integrated DNS zone in a single query. Most environments restrict AXFR to specific source IPs at the DNS server level, but misconfigurations are common. The signal: AXFR query from any non-DNS-server internal host. Detection: Zeek dns.log captures the query type explicitly. AXFR uses TCP/53 (not UDP) because zone data is typically too large for UDP - Suricata content match looks for the type code 0x00fc (252, AXFR) in the question section. Block AXFR from non-replicate sources at DNS server config; alert on attempts.'
