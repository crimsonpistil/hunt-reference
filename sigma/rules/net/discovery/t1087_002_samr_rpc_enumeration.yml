    analyst_notes: 'SAMR (Security Account Manager Remote) is the RPC interface for managing local and domain accounts. Interface UUID: 12345778-1234-abcd-ef00-0123456789ac. Key opnums for enumeration: SamrEnumerateDomainsInSamServer (opnum 6), SamrEnumerateUsersInDomain (opnum 13), SamrEnumerateGroupsInDomain (opnum 11), SamrEnumerateAliasesInDomain (opnum 15). This is the RPC-layer alternative to LDAP user enumeration - used by ''net user /domain'', ''net group /domain'', and various enumeration tools. Detection: Zeek dce_rpc.log captures the interface UUID and opnum. Suricata content match on the UUID byte pattern. Important note: Microsoft restricted SAMR access to non-admins in Windows 10 1607+ and added the SamrPwdNotRequired blocking - but legacy systems and some configurations still allow it. Pair with EDR for net.exe/PowerView attribution.'
