    analyst_notes: 'Service Principal Names (SPNs) identify Kerberos service instances - every domain account with an SPN can have a Kerberos service ticket requested for it, which can then be cracked offline (Kerberoasting). Adversaries query LDAP with filter ''(servicePrincipalName=*)'' to find all accounts with SPNs registered. Tools: PowerView Get-DomainUser -SPN, GetUserSPNs.py (Impacket), Rubeus, BloodHound. The query is the immediate precursor to T1558.003 Kerberoasting. Detection at the LDAP filter level catches the enumeration phase before the credential attack begins - early intervention opportunity. Legitimate apps occasionally query SPN attributes for specific accounts; the pattern ''(servicePrincipalName=*)'' (wildcard, returning all SPN-bearing accounts) is highly distinctive of attack tooling.'
