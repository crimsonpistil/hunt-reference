    analyst_notes: 'HTTP HEAD and OPTIONS methods retrieve response headers without the body - perfect for banner grabbing. Adversaries use them to identify web server implementations (Apache 2.4.x, nginx 1.20.x, IIS 10.0), application versions (X-Powered-By: PHP/8.1.0), and exposed methods. Tools: nmap -sV with HTTP probes, nikto, Burp Suite, custom Python (requests.head()). The signal: many HEAD/OPTIONS requests from one source to many distinct internal web servers. Browsers don''t typically issue HEAD requests; standard application traffic uses GET/POST. Vulnerability scanners (Nessus, Qualys) issue HEAD probes - exclude their source IPs. After exclusions, sustained HEAD/OPTIONS bursts are reconnaissance.'
