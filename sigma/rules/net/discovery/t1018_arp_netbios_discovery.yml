    analyst_notes: 'ARP scans (arp-scan, nmap -PR, custom L2 scanners) flood the local broadcast domain with ARP requests for every address in a target range - building a layer-2 host inventory. The signal: one MAC sending 50+ ARP requests for distinct target IPs in 60 seconds. Detection requires L2 visibility - a sensor on the same VLAN as the source, or Zeek deployed at the broadcast domain. Most Suricata deployments are routed-segment monitoring and don''t see ARP. If you have Zeek with arp analyzer enabled, arp.log captures every request with sender/target IPs. The detection is high-confidence: legitimate ARP traffic is bursty and small-scale (host coming online, gateway lookup) - sustained scan-rate ARP is essentially always reconnaissance. Particularly effective in flat networks (lab environments, IoT VLANs) where adversaries enumerate quickly.'
