    analyst_notes: 'Adversaries enumerate hosts by attempting SMB connections - even unauthenticated, the SMB negotiate response reveals the host''s existence, OS version (in older SMB1), domain name, and signing requirements. The signal is one source connecting to TCP/445 on 20+ distinct destinations in 60 seconds. Tools: nmap -p 445, CrackMapExec (cme), enum4linux, custom PowerShell loops. CrackMapExec specifically is an extremely common red team and threat actor tool - its initial enumeration phase produces this exact pattern. Build $SMB_LEGITIMATE_HOSTS for hosts that legitimately connect to many SMB destinations (DCs, file servers replicating, backup systems). Workstations connecting to many SMB destinations rapidly is anomalous. The pattern often immediately precedes lateral movement attempts.'
