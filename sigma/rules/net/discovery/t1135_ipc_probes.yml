    analyst_notes: IPC$ is the inter-process communication share - used as a transport for RPC calls including srvsvc share enumeration. Adversary tools first connect to IPC$ (often anonymously, sometimes with discovered credentials), then issue srvsvc calls through it to enumerate shares. The IPC$ connection sequence is more visible than the encrypted RPC payload. Multiple anonymous IPC$ connections from one source = enumeration sweep across hosts. Pair this with sid 9113501 (NetShareEnum DCERPC call) - together they confirm the full enumeration sequence. Anonymous IPC$ is restricted by default in modern Windows but legacy systems and Samba implementations often still permit it. Detection in Zeek smb.log captures the username and share access; null-username + IPC$ + many destinations = reconnaissance.
