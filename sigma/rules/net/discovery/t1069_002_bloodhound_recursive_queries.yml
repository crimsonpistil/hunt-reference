    analyst_notes: 'The LDAP_MATCHING_RULE_IN_CHAIN OID ''1.2.840.113556.1.4.1941'' performs recursive (transitive) group membership lookups - finding all users who are members of a group either directly OR through any chain of nested groups. Critical for adversaries because nested groups are extensively used in enterprise AD designs and direct member enumeration misses indirect access. Tools: PowerView Get-DomainGroupMember -Recurse, BloodHound (uses this OID extensively for path analysis), Get-ADGroupMember -Recursive. The OID is rarely used by legitimate applications - it''s expensive (recursive expansion across the entire group hierarchy) and most apps prefer direct membership checks. Suricata content match on the OID string catches the signature definitively. Combined with target group name analysis (Domain Admins recursive lookup), this is one of the highest-confidence BloodHound indicators.'
