    analyst_notes: 'SNMP (UDP/161) provides extensive system information when accessible: network interface lists, routing tables, ARP caches, running processes, installed software. Default community strings (''public'' for read, ''private'' for read-write) are still common in many environments - a goldmine for adversaries. Tools: snmpwalk, snmpcheck, onesixtyone (community string brute force), nmap snmp-* NSE scripts. The signal: SNMP requests from non-management-host sources, especially with bursts to many distinct devices (community string sprays) or sustained traffic to one device (full OID walks). Build $SNMP_MGMT allowlist for sanctioned monitoring (LibreNMS, Observium, Zabbix, PRTG). Workstations and application servers shouldn''t issue SNMP queries.'
