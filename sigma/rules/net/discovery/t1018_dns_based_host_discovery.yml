    analyst_notes: 'Reverse DNS lookups (PTR queries against in-addr.arpa) resolve IP addresses to hostnames. Adversaries enumerate internal hostnames by issuing PTR queries against every IP in a target range - much stealthier than ICMP sweeps because DNS traffic is universally allowed and rarely scrutinized. Tools: nslookup loops, dnsrecon, custom PowerShell. The signal: a non-DNS-server internal host issuing 50+ PTR queries against in-addr.arpa zones in 5 minutes. DNS servers themselves do this legitimately when handling client lookups - exclude $DNS_SERVERS. Workstations and application servers should rarely issue bulk PTR queries. The query stream looks like 1.0.10.in-addr.arpa, 2.0.10.in-addr.arpa, 3.0.10.in-addr.arpa, etc. - easy pattern to spot in Zeek dns.log. Combine with EDR for nslookup.exe/PowerShell process attribution.'
