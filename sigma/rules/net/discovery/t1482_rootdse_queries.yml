    analyst_notes: 'RootDSE (Root Directory Service Entry) is a special LDAP entry at the empty DN '''' that returns server-level information about the directory. Querying its attributes reveals: namingContexts (all naming contexts the DC hosts, including external trust domains), configurationNamingContext (the Configuration partition DN), rootDomainNamingContext (the forest root domain), forestFunctionality and domainFunctionality (DFL/FFL levels), supportedLDAPVersion, supportedSASLMechanisms. Adversaries query RootDSE early in reconnaissance to map the AD topology and identify cross-trust opportunities. Tools: PowerView Get-DomainSearcher, ADExplorer, BloodHound. Detection: LDAP base-scope query with empty DN against DCs from non-admin-tool sources. Many AD-integrated apps issue RootDSE queries legitimately at startup - but the specific attribute set (namingContexts + configurationNamingContext + rootDomainNamingContext together) is more common in reconnaissance than in legitimate apps.'
