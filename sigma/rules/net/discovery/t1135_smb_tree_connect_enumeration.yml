    analyst_notes: 'Source-scope this query with ip.src != $ALLOWED_SMB_CLIENTS (operator-maintained list of expected SMB-reading hosts e.g. backup servers, monitoring agents) - the default query catches all SMB traffic which will be noisy. If you ship Zeek logs to Kibana, you can sharpen this KQL by adding zeek.smb_files.action or zeek.smb_cmd.command filters (e.g. "SMB_FILE_READ" / "SMB_FILE_WRITE" / "get_dfs_referral") - the baseline KQL above falls back to port/protocol since Zeek shipping is not assumed. Some share enumeration tools work by attempting tree connects to common share names (ADMIN$, C$, IPC$, NETLOGON, SYSVOL, plus dictionary-based guesses like ''shared'', ''public'', ''data'', ''backup''). The pattern: rapid sequence of tree_connect attempts with different UNC paths from one source to one target. Successful connects indicate accessible shares; access denied responses indicate the share exists but isn''t accessible. Both responses are useful intelligence to the adversary. Zeek smb_files.log and smb.log capture tree connect operations. The signal is per-(src,dst) share count - 5+ distinct shares in a minute is anomalous (legitimate users typically connect to known shares, not enumerate many). Combine with successful-vs-denied response distribution: many denied = brute-force enumeration.'
