    analyst_notes: 'SMB null sessions are anonymous logons (empty username, empty password) that historically provided access to a wealth of information: user lists, group memberships, domain SIDs, share lists. Modern Windows defaults block null session enumeration - but legacy systems, misconfigured shares, and Linux SMB implementations (Samba) often still permit them. Adversaries probe systematically: connect with null credentials, query the IPC$ share, enumerate everything available. The signal: SMB session_setup with empty username from a non-trusted host. Zeek smb.log captures usernames; smb_auth.log captures auth attempts including null sessions. Pair with EDR for correlation - net.exe with /user:"" (empty), enum4linux, rpcclient anonymous binds.'
