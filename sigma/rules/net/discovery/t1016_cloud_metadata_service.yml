    analyst_notes: 'For process attribution, pivot to Kibana with Sysmon Event 3 filtered by the destination IP/port from this session - read winlog.event_data.Image for the culprit process. Cloud Instance Metadata Service (IMDS) at 169.254.169.254 provides instance configuration data including (in vulnerable IMDSv1 configs) instance role temporary credentials - a critical privilege escalation primitive in cloud environments. Adversaries who land on a cloud workload (EC2, Azure VM, GCP instance) immediately query IMDS to extract credentials, security group rules, network interface info, and user-data scripts (often containing secrets). Detection: HTTP traffic to 169.254.169.254 from non-cloud-init processes. AWS strongly recommends IMDSv2 (which requires session tokens and prevents SSRF abuse) - environments still on IMDSv1 are particularly vulnerable. The attack pattern is documented extensively in cloud security research (Capital One breach 2019, numerous SSRF-to-credential-theft incidents).'
