    analyst_notes: 'Group-Managed Service Accounts (gMSAs) are AD-managed service accounts with auto-rotating passwords. Enumerating them is interesting to adversaries because: (1) gMSAs often have privileged access to specific services and resources, (2) the msDS-ManagedPassword attribute can be retrieved by accounts in PrincipalsAllowedToRetrieveManagedPassword - if those principals are compromised, the gMSA password can be retrieved (Golden gMSA attack). Tools: PowerView Get-DomainGMSA, Impacket gMSA dumper, BloodHound. The samAccountType 536870913 is specific to gMSAs. Legitimate apps occasionally query gMSA attributes; bulk enumeration of all gMSAs is anomalous. Particularly relevant in environments with extensive service account use (which is most modern enterprises).'
