    analyst_notes: On-path DNS injection (DNS spoofing) typically uses very low TTLs (often 0) so the malicious response isn't cached long enough to be detected. Legitimate low TTLs occur on CDN endpoints (Akamai, Cloudflare, Fastly, AWS) which use DNS-based load balancing - these need to be excluded from the alert. Anomalously low TTLs on non-CDN domains, especially for high-value targets (banking sites, IdPs, internal infrastructure), suggest response injection. Combine with detection of duplicate DNS responses (the legitimate response arriving after the injected one). Pair with DNSSEC validation telemetry - DNS injection cannot survive DNSSEC validation, so signed-domain validation failures correlate strongly.
