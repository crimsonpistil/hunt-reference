    analyst_notes: Response injection often produces a length mismatch between the Content-Length header (set by the original server) and the actual delivered body (modified by the on-path injector). Most modern HTTP libraries handle Content-Length correctly so any mismatch is anomalous. Combined with smuggling-style discrepancies (TE.CL, CL.TE) this is a strong indicator of response tampering. Zeek http.log captures both the declared and actual response sizes - query for sessions where these diverge significantly (>100 bytes). Some legitimate causes exist (proxies that recompress, CDNs that modify), so baseline these and exclude known-good infrastructure before alerting.
