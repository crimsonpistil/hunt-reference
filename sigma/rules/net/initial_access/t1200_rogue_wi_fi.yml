    analyst_notes: Rogue access points beacon a corporate SSID (your Wi-Fi network name) from an unauthorized BSSID (MAC of the AP) to lure users into connecting through adversary-controlled infrastructure for credential harvesting and AiTM. Detection requires wireless monitoring infrastructure - most enterprise WLAN controllers (Cisco WLC, Aruba ClearPass, Meraki, Juniper Mist) include Wireless Intrusion Prevention (WIPS) that automatically detects rogue APs and impersonators. Maintain $AUTHORIZED_BSSIDS as your full enterprise AP MAC list. WiFi Pineapple and similar tools generate distinct beacon patterns. WIPS triggers should pipe to your SIEM. Pair with 802.1X EAP-TLS to make rogue AP exploitation harder (requires stolen client certs).
