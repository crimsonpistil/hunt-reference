    analyst_notes: 'Hardware management interfaces (IPMI, iLO, iDRAC, BMC) operate below the OS - they have their own network stack, IP address, and TLS implementation. A compromised BMC can persist across OS reinstalls and is invisible to host-based security tools. Network detection is the only reliable signal for BMC-level compromise. Maintain a separate VLAN for BMC interfaces ($MGMT_VLAN) and alert on any outbound connection from those IPs to non-vendor infrastructure. Legitimate BMC outbound: vendor health monitoring, firmware update servers, NTP, syslog. Anything else from a BMC = critical investigation. Hardware supply chain attacks against BMCs are documented (Bloomberg''s ''The Big Hack'' allegations 2018, multiple academic demonstrations of malicious BMC firmware).'
