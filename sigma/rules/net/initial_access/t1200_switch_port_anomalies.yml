    analyst_notes: A switch port should typically see one MAC address (the connected endpoint). Multiple MACs on a single port indicate either an unauthorized switch/hub introduced to expand connectivity, a network implant in transparent bridging mode (LAN Turtle, Packet Squirrel), or a virtualization host with bridged VMs. Detection requires switch port-MAC table data - pull this from your switches via SNMP, NetFlow with switch metadata, or 802.1X/MAC port security logs. Modern enterprise switches support 802.1X with single-MAC enforcement and MAC sticky learning - alert on 'secure port violation' SNMP traps. Most reliable detection comes from switch infrastructure rather than passive packet capture.
