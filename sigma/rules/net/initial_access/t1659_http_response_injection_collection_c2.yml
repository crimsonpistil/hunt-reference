    analyst_notes: 'Internal-to-internal HTTP responses containing JavaScript beacon code suggest an internal application has been compromised to inject content into responses served to internal users. Common beacon patterns: new Image().src=''http://...'' (sends GET request via image load), XMLHttpRequest+POST (sends data via XHR), fetch() with credentials, navigator.sendBeacon() (designed for analytics, abused for exfil). The injection might come from a compromised internal web app, an ad/analytics tag in an internal CMS, or an attacker-modified template. Particularly important for internal SharePoint, Confluence, and CMS deployments which serve content to many users.'
