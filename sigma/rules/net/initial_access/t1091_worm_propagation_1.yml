    analyst_notes: 'If you ship Zeek logs to Kibana, you can sharpen this KQL by adding zeek.smb_files.action or zeek.smb_cmd.command filters (e.g. "SMB_FILE_READ" / "SMB_FILE_WRITE" / "get_dfs_referral") - the baseline KQL above falls back to port/protocol since Zeek shipping is not assumed. USB-borne worms drop their payload to administrative shares (ADMIN$ = C:\Windows on remote host, C$ = C:\, IPC$ = inter-process communication) on neighboring systems. End-user workstations should never write to ADMIN$ or C$ on other workstations - this is admin tooling territory only. Detection: any SMB CREATE or WRITE operation targeting ADMIN$/C$ from a user VLAN source. Legitimate use cases (Group Policy, SCCM, RMM tools) come from known admin server VLANs, not user workstations.'
