    analyst_notes: HSTS preload list domains (google.com, microsoft.com, github.com, cloudflare.com, facebook.com, amazon.com, apple.com, and thousands of others) are hardcoded in modern browsers as HTTPS-only - browsers will refuse to make HTTP connections to these domains. An HTTP request to an HSTS preload domain from a modern browser indicates either a non-browser client (curl/wget/python script - possibly malicious), an outdated browser without the HSTS preload list, or a sophisticated SSL stripping attack with a custom client. Maintain $EXTERNAL_HSTS_DOMAINS list synced from the Chromium HSTS preload list. The HTTP probe itself is suspicious - successful exploitation would produce subsequent HTTPS to a different IP than the legitimate domain.
