    analyst_notes: 'Dependency confusion (Alex Birsan 2021) attack: adversary publishes a package on a public registry using the name of an internal-only package - when the build system resolves dependencies, the higher version on the public registry is preferred over the internal one. Detection: maintain a list of your internal package names ($MPNET_PACKAGES) and alert when those names are fetched from public registries. The fetch should always be from your internal registry (Artifactory, Nexus, Verdaccio). Configure package managers with explicit registry pinning (.npmrc, pip.conf) to prevent the public lookup from happening at all.'
