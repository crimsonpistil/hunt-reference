    analyst_notes: Remote template injection embeds a URL in an Office document that fetches a macro-enabled template (.dotm, .xltm) from an external server when the document is opened. The document itself contains no macros - it only fetches them remotely, bypassing static AV scanning. The network signal is a GET request for a .dotx/.dotm/.xltm file from an internal host to an unknown external server - often within seconds of the document being opened. The fetched template contains the actual malicious macro. This technique bypasses email gateway scanning because the original attachment is clean. Correlate with SMTP logs to identify the document that triggered the fetch.
