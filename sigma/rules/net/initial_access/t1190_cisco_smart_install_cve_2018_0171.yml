    analyst_notes: 'Cisco Smart Install (SMI) is a legacy zero-touch provisioning feature that listens on TCP/4786 with no authentication. CVE-2018-0171 lets an unauthenticated remote attacker read or overwrite the device configuration and execute arbitrary commands - and Salt Typhoon exploited exactly this in Cisco IOS / IOS XE for initial access into telecom networks. SMI should be disabled on production switches (no vstack), so ANY traffic to 4786 - from the internet, or east-west from an unexpected internal host - is suspect. Hunt method: alert on any inbound TCP/4786 to your switch management addresses; legitimate SMI use is rare and should come only from a known director. Pair with follow-on signals that indicate the access was used: a config pull over TFTP/UDP-69 (see T1602.002), new SSH authorized_keys or local accounts appearing on the device, ACL/loopback changes, or a new GRE tunnel in the running-config. The Shadowserver Foundation scans for exposed SMI globally - if your perimeter shows 4786 open, assume it has been probed. Remediation: disable Smart Install, patch IOS/IOS XE, and restrict management-plane access with control-plane ACLs.'
