    analyst_notes: 'LLDP (Link Layer Discovery Protocol, EtherType 0x88CC) and CDP (Cisco Discovery Protocol) are used by network devices to advertise their presence and capabilities to neighbors. Most enterprise endpoints don''t speak LLDP - only switches, IP phones, APs, and some servers. An LLDP advertisement from an unexpected source MAC is anomalous: either a rogue switch announcing itself, a network implant attempting to participate in network topology, or an unauthorized server. Some implants suppress LLDP/CDP to avoid detection. Zeek''s lldp parser (community package) captures LLDP details. Switch port monitoring will see the LLDP advertisements at the access layer. Pair with DHCP OUI detection for correlation.'
