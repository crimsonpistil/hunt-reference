    analyst_notes: DNS injection attacks race the legitimate DNS server - the adversary's spoofed response arrives at the victim resolver before the legitimate response. The legitimate response then arrives second and is silently discarded by the resolver. Network-level capture sees both responses with the same transaction ID, same query, but different answers. Zeek dns.log captures all DNS traffic including duplicates. Build detection that joins responses by transaction ID and resolver, alerting when the same query yields different answers within 1 second. This is a near-zero false positive indicator outside of legitimate DNS load balancers - and those should be in your $ALLOWED_DNS list.
