    analyst_notes: 'Network implants (LAN Turtle, Packet Squirrel) typically establish a persistent reverse SSH tunnel to adversary infrastructure for command and control. The connection is long-lived (hours to days), originates from a host VLAN that shouldn''t be making outbound SSH connections, and uses port 22, 443, 2222, or another common port. Most enterprise printers, IoT devices, and end-user workstations have no legitimate reason to initiate outbound SSH. Build per-VLAN baselines: which subnets should/shouldn''t initiate which protocols outbound. Long session duration (5+ minutes) plus low data volume = classic beacon/tunnel pattern. Pair with EDR if available to identify the source process - implants don''t run on the host, so EDR on the host won''t show the process.'
