    analyst_notes: Password-protected archives (.zip, .rar, .7z) and disk images (.iso, .img) are the dominant phishing attachment formats - they bypass AV scanning because the scanner cannot read the contents without the password (typically included in the email body). .lnk and .chm files are also high-value finds - both execute code on double-click. Focus on attachments from external senders with no prior mail history to your org. Zeek smtp.log captures MIME headers including filenames. Correlate sending domain age via passive DNS - newly registered MX senders with these attachment types are near-certain malicious. Also watch for mismatched Content-Type (e.g. application/octet-stream labeled as .pdf).
