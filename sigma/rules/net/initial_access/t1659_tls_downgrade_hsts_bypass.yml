    analyst_notes: TLS downgrade attacks force a connection to use deprecated TLS versions (SSLv3/POODLE, TLSv1.0/BEAST, TLSv1.1) which have known cryptographic weaknesses. Modern browsers and OS reject these by default - any internal client negotiating these versions to external servers indicates either a downgrade attack, a misconfigured client, or legacy software that needs upgrading. Build a $LEGACY_INTERNAL allowlist for known-legacy internal services that genuinely require old TLS, and alert on everything else. Zeek ssl.log captures TLS version explicitly. For external destinations, modern services (Google, Microsoft, AWS) all support TLS 1.3 - any negotiation to TLS 1.0/1.1 with these services is highly suspicious.
