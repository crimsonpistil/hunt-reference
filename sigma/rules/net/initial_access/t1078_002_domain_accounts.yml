    analyst_notes: Kerberos (TCP/UDP 88) should never be reachable from external IPs - it is an internal-only authentication protocol. External Kerberos connections indicate either a perimeter misconfiguration (DC exposed to internet) or an adversary with network-level access routing traffic through a compromised internal host. Content '|6a|' matches the Kerberos AS-REQ message tag. If your DC's port 88 is reachable externally this is a critical misconfiguration. Zeek kerberos.log captures all Kerberos AS-REQ and TGS-REQ details including CNameString (username) and error codes.
