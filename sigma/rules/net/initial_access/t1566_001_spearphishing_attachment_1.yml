    analyst_notes: Double extensions (invoice.pdf.exe) and Right-to-Left Override (RTLO, U+202E) characters in filenames make executables appear to be documents. RTLO reverses the display of characters following it - 'invoice_\u202egpj.exe' displays as 'invoice_exe.jpg' to the user. Both techniques are trivially detectable at the SMTP gateway level. The Unicode U+202E character in a filename is an immediate red flag with virtually no legitimate use case in email attachments. Most email gateways can strip or quarantine these - if you're still seeing them, your gateway needs tuning.
