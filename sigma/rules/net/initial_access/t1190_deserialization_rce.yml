    analyst_notes: Java serialized objects begin with the magic bytes 0xAC 0xED 0x00 0x05 - base64 encoded this becomes 'rO0AB'. Java deserialization exploits (ysoserial gadget chains) deliver these objects in HTTP request bodies, cookies, or custom headers to vulnerable Java applications (WebLogic, JBoss, Jenkins, Confluence). Content '|ac ed 00 05|' is the literal binary Java serialization magic. 'rO0AB' in base64-encoded form in a cookie or POST body is equally reliable. WebLogic T3/IIOP protocol also carries serialized payloads - watch TCP/7001 and TCP/7002 in addition to HTTP. This is a near-zero false positive indicator.
