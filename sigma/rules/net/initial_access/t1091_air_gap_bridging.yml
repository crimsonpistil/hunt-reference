    analyst_notes: 'In environments with air-gapped or strictly segmented VLANs (OT/ICS, classified networks, financial trading floors), any unexpected outbound traffic is a critical indicator. USB-borne malware can bridge air gaps either by configuring the infected host as a routing hop, exfiltrating data via the next time a USB is used to physically move data, or by abusing covert channels. Detection: define the expected traffic profile for your air-gapped segments (typically just ARP, DHCP, and NTP within the segment) and alert on anything else. Pair with USB device insertion events on hosts in those segments.'
