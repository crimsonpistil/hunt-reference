    analyst_notes: Command injection inserts OS commands into application parameters that are passed unsanitized to a shell - the classic first-stage commands are id, whoami, and cat /etc/passwd to confirm execution, followed by wget/curl to download a payload. The URL-encoded variants (%3B = ;, %7C = |, %60 = backtick, %0A = newline) are used to bypass WAF pattern matching. A 200 response with a response body containing root:x:0:0 or uid=0 in the body = successful exploitation. Monitor response bodies from your web servers for Unix/Windows system output patterns - successful command injection is immediately visible in the response.
