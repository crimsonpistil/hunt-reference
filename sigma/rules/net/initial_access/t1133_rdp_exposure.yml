    analyst_notes: Internet-facing RDP (TCP/3389) is one of the most commonly exploited initial access vectors - it should never be directly exposed to the internet. If it is, any successful connection from a non-whitelisted IP is an immediate incident. Content '|03 00|' = TPKT header, '|e0|' at offset 5 = Connection Request TPDU - identifies an active RDP session initiation (not just a port scan). Distinguish between connection attempts (few packets, no authentication) and successful sessions (sustained bidirectional traffic, large databytes.dst).
