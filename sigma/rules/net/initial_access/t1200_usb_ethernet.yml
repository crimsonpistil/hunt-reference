    analyst_notes: 'Bash Bunny, Rubber Ducky with Ethernet payload, and other malicious USB devices register as USB Ethernet adapters with the host OS - generating a NEW DHCP request from a new MAC address while the host''s primary MAC continues to operate normally. The new MAC OUI typically points to common USB Ethernet chipsets (Realtek RTL8152, ASIX AX88179, Microchip LAN9512). Detection: a host generating multiple concurrent DHCP requests from different MACs is anomalous - primary NIC plus USB-Ethernet adapter. Pair with USB device logs (Windows Event 6416, USB device telemetry from EDR) for definitive correlation. Most enterprise environments should disable USB Ethernet/storage entirely via Group Policy or device control software.'
