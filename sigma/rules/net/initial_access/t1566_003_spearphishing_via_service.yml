    analyst_notes: Spearphishing via service uses trusted platforms (LinkedIn, Teams, Discord, Slack, Telegram) to deliver phishing links, bypassing email gateway controls entirely. The network signal is a redirect click through the platform's link tracking system - LinkedIn uses /redirect/, Twitter uses t.co, Discord uses discord.com/channels/ with external links, Teams uses teams.microsoft.com/l/. The redirect leads to the actual phishing payload. Detection requires SSL/TLS inspection at the proxy layer to see the URL paths. Correlate the redirect destination with newly registered domain indicators and threat intel. LinkedIn is the primary vector for Lazarus and Kimsuky social engineering.
