    analyst_notes: SSH brute force tools (Hydra, Medusa, Patator) generate rapid successive SSH connections - each attempt completes the TCP handshake and SSH banner exchange before failing authentication and disconnecting. Low databytes.dst confirms no successful session. Content 'SSH-' matches the SSH protocol banner at the start of every SSH connection. Zeek ssh.log captures authentication success/failure explicitly - use Zeek for definitive auth failure correlation. Distinguish brute force (rapid, many failures, low databytes) from successful access (few connections, high databytes.dst, sustained session).
