    analyst_notes: Adversaries with on-path access (compromised CDN, ISP-level injection, compromised proxy, hostile Wi-Fi) inject JavaScript into legitimate HTTP responses to deliver exploits or harvest credentials. The injected script typically loads from a newly registered or low-reputation domain. Detection requires inspecting response bodies - HTTPS prevents this except where you have TLS inspection, so this primarily catches HTTP traffic to legitimate sites that should be HTTPS. eval(atob()) and document.write(unescape()) are obfuscation patterns common in injected payloads. Compare response content against known-good baselines for high-value sites. Subresource Integrity (SRI) on legitimate sites prevents injection by verifying script hashes - alert when SRI is missing on critical pages.
