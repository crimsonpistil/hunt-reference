    analyst_notes: MS-RPRN (Print System Remote Protocol, UUID 12345678-1234-abcd-ef00-0123456789ab) - RpcRemoteFindFirstPrinterChangeNotificationEx (opnum 65) accepts an arbitrary UNC path for the change-notification destination, causing the target system to authenticate to the path. Discovered as 'PrinterBug' by Lee Christensen (SpecterOps, 2018) and documented in the original SpoolService research. Particularly devastating against domain controllers because the spooler service runs by default on DCs (until disabled per modern hardening guidance). Combined with AD CS Web Enrollment relay, PrinterBug → DA is a one-shot attack. Modern environments should disable the Print Spooler service on DCs (CIS benchmark recommendation). Detection at the spooler RPC opnum is high-confidence; legitimate use of opnum 65 is rare.
