    analyst_notes: 'Golden Tickets are forged TGTs encrypted with the krbtgt account''s NT hash (obtained via DCSync). The forged ticket can claim any user identity, any group membership, any expiration. Network signature: TGS-REQ messages where no prior AS-REQ exists for the same client principal - the ''TGT'' came from nowhere on the wire. Zeek-based correlation can detect this (track AS-REQ events, alert on TGS-REQ without preceding AS-REQ within reasonable timeframe). Other detection signatures: ticket lifetimes anomalously long (10 years+ default in Mimikatz), ticket encryption type RC4 when AES is expected, account names that don''t exist in AD. Rotating krbtgt password twice (12-hour spacing) invalidates all existing Golden Tickets - recommended whenever DCSync is observed. Particularly important to detect because Golden Tickets persist across user/admin password resets.'
