    analyst_notes: MS-DFSNM (DFS Namespace Management, UUID 4fc742e0-4a10-11cf-8273-00aa004ae673) - DFSCoerce (Filip Dragović, 2022) abuses NetrDfsRemoveStdRoot (opnum 12) and NetrDfsAddStdRoot (opnum 13) which accept UNC paths and trigger authentication. Less commonly mitigated than PetitPotam (Microsoft's PetitPotam patches don't help here). Particularly relevant against domain controllers running the DFS Namespace service. Detection at the interface UUID + opnum level. The technique is essentially identical to PetitPotam in flow - coerce auth, capture or relay. SpecterOps' Coercer.py tool implements this and many other coercion techniques in a single framework - common in red team operations. Worth maintaining alongside PetitPotam and PrinterBug for full coercion coverage.
