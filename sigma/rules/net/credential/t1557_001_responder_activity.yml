    analyst_notes: 'Legitimate LLMNR/NBT-NS responders are: every Windows host on the broadcast domain (which is the problem - any host can answer), but in practice, large-scale answering (one host responding to many queries) is anomalous. Responder by default answers ALL queries - fingerprint: source IP appearing in many LLMNR/NBT-NS responses to many destinations within minutes. Detection: count responses by source IP per minute; any source answering more than a baseline (typically 5-10 unique destinations per 60 seconds) is suspicious. Modern best practice: DISABLE LLMNR and NBT-NS via Group Policy. Once disabled, ANY LLMNR/NBT-NS response on the network is adversary activity (zero false positive). The detection improvements when LLMNR is disabled are dramatic - strongly recommend pursuing this in environments where you have GPO control.'
