    analyst_notes: 'After Responder/Inveigh/mitm6 captures an NTLM authentication, the attacker either: (1) saves the Net-NTLMv2 hash for offline cracking, or (2) relays it in real-time to another target (ntlmrelayx, Inveigh-Relay). The relay scenario produces a distinctive pattern: NTLM authentication FROM a workstation TO another workstation that doesn''t normally accept NTLM logins. Build $SERVERS allowlist (your actual servers - file servers, app servers, DCs); any NTLM auth to a non-server internal destination is suspicious. Particularly diagnostic: NTLM auth TO a workstation = relayed credentials (workstations rarely accept incoming NTLM unless misconfigured). The challenge-response can also be relayed to LDAP/LDAPS for ACL modification, to MSSQL for xp_cmdshell, or to AD CS for certificate enrollment.'
