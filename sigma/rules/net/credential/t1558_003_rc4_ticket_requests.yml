    analyst_notes: 'In modern AD environments (2008 R2+), Kerberos defaults to AES256 for service tickets when both client and server support it. RC4-HMAC (etype 23, encoded as 0x17 in ASN.1) is requested explicitly by Kerberoasting tools to produce crackable hashes. Detection: TGS-REQ messages where etype includes RC4 but doesn''t include AES, or where the requested service is anomalous. Tools: Rubeus (kerberoast command), Impacket GetUserSPNs.py, PowerView Invoke-Kerberoast, BloodHound''s roastable users query. The msg-type=12 = TGS-REQ; cipher=rc4-hmac in Zeek''s kerberos.log is the canonical detection field. Modern environments should set ''msDS-SupportedEncryptionTypes'' on service accounts to AES-only - accounts still permitting RC4 are the roastable targets. Pair with subsequent service ticket use (rare for Kerberoasting since the goal is offline cracking) for full-chain.'
