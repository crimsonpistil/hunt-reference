    analyst_notes: 'Password spraying via Kerberos: one password tried against many usernames produces a burst of AS-REQ messages from one source for many distinct CNAMEs (client principal names). Tools: Rubeus brute, kerbrute, Spray365. The pattern: 10+ distinct CNAMEs in AS-REQ from one source within 5 minutes. Failed AS-REQ produces KRB-ERROR with code KDC_ERR_PREAUTH_FAILED (24) for valid users with wrong password, KDC_ERR_C_PRINCIPAL_UNKNOWN (6) for invalid users - adversaries can use the response codes to enumerate valid usernames separately from the spray. Pair with Windows Event ID 4768 (TGT requested) failure events on DCs for definitive correlation. Particularly important to detect during off-hours or from unusual source IPs (cloud, residential) which indicate external password sprays after credential leaks.'
