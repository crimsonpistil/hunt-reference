    analyst_notes: 'Before Kerberoasting, adversaries enumerate which accounts have SPNs (and are therefore roastable). The standard query is an LDAP search with filter ''(&(samAccountType=805306368)(servicePrincipalName=*))'' - find user accounts (not computer accounts) with SPNs. PowerView Get-DomainUser -SPN, BloodHound''s collector, Impacket GetUserSPNs all use this pattern. The enumeration phase precedes the actual TGS-REQ requests by seconds-to-minutes. Detection at the LDAP filter level catches this preparation step. Pair with sid 9155801 (RC4 TGS-REQ) for full kill-chain visibility - first the enum, then the roast. Legitimate use: AD admin tools (Active Directory Users and Computers, PowerShell AD module) - restrict to $LDAP_ADMINS allowlist. After exclusions, this query from a workstation is essentially always pre-Kerberoasting.'
