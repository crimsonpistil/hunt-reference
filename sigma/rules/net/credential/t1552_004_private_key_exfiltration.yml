    analyst_notes: 'Private keys are typically host-side artifacts but adversaries often exfiltrate them across the network: copying ~/.ssh/id_rsa from compromised Linux/Mac systems to attacker storage, dragging .pem files via SMB from jump hosts to staging shares, exfiltrating .ppk (PuTTY private keys) from Windows admin systems. Detection: filename patterns in SMB or SSH file transfer logs. The list covers the main SSH key types (RSA, DSA, ECDSA, Ed25519), generic .pem (PKCS#8 format used for many key types), .key (catch-all), .ppk (PuTTY). False positives possible: legitimate backup software, configuration management. Build $BACKUP_HOSTS allowlist. Pair with subsequent SSH activity from the destination host using the keys - the smoking-gun chain is ''private key copied from A to B → B uses key to SSH to C''.'
