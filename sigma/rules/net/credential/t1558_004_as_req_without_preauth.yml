    analyst_notes: 'Normal Kerberos AS-REQ exchanges include PA-ENC-TIMESTAMP (padata-type 2) - a timestamp encrypted with the user''s password hash, proving they know the password before the KDC issues the AS-REP. AS-REProasting bypasses this: AS-REQ without PA-ENC-TIMESTAMP, KDC returns AS-REP with encrypted ticket data anyway because the account allows it. Detection: AS-REQ messages (msg-type 10) without padata-type 2. Combined with RC4 etype, this is essentially diagnostic of AS-REProasting. The negative content match in Suricata (content:!"|a1 03 02 01 02|" within preauth field) catches the missing PA-ENC-TIMESTAMP. Zeek''s kerberos.log captures padata-type cleanly; Kibana detection is straightforward. Note: legitimate AS-REQ from misconfigured accounts will fire this - but those accounts ARE the security debt that needs fixing, so the alerts are still actionable.'
