    analyst_notes: 'MS-EFSRPC (Encrypting File System Remote Protocol, UUID c681d488-d850-11d0-8c52-00c04fd90f7e) was originally for managing encrypted file system operations remotely. PetitPotam (Lionel Gilles, 2021) discovered that several functions accept arbitrary UNC paths and trigger NTLM authentication to fetch them: EfsRpcOpenFileRaw (opnum 0), EfsRpcEncryptFileSrv (4), EfsRpcDecryptFileSrv (5), EfsRpcQueryUsersOnFile (7), EfsRpcQueryRecoveryAgents (9), EfsRpcRemoveUsersFromFile (10), EfsRpcAddUsersToFile (11), EfsRpcSetFileEncryptionKey (12), EfsRpcNotSupported (13), EfsRpcOpenSecuredFile (15). All can be called by any authenticated user against any system with the EFS service running. Microsoft has progressively patched some opnums; others remain. Detection at the interface level catches all PetitPotam variants. Combine with subsequent NTLM authentication from target to attacker for full chain confirmation.'
