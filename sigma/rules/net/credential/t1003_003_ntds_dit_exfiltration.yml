    analyst_notes: 'ntds.dit is the entire Active Directory database - every domain user, computer, and password hash. Extracting it is game-over for the domain, and Volt Typhoon does exactly this (CISA AA24-038A): they use ntdsutil to create domain controller install media containing usernames and password hashes, archive ntds.dit (plus the SYSTEM and SECURITY registry hives, needed to decrypt it) into a multi-volume password-protected 7-Zip, stage it locally in C:\\Windows\\Temp\\, and have appended a .gif extension to the database copy to masquerade the file type. Network-visible signals: (1) a large file read/copy off a DC over SMB, especially of a file named ntds, ntds.dit, or something oversized with an innocuous extension; (2) the staged archive then moving off the DC or out of the environment. Because the operators rename and re-extension the file, do not rely on the literal name ntds.dit alone - alert on large SMB reads sourced from DC subnets to non-DC hosts, and on multi-volume archive patterns (.7z.001, .7z.002). Legitimate sources of ntds.dit movement are narrow: sanctioned backup software and DC promotion/demotion - allowlist those servers ($BACKUP_SERVERS, $DC_SUBNET) and treat everything else as priority-1. Pair with the NTDS dumping commands on the host (ntdsutil, vssadmin create shadow, Install-ADServiceAccount) and Directory Service Access auditing on the DC.'
