    analyst_notes: 'MFA fatigue / push bombing: adversary has valid username + password, attempts authentication repeatedly, generating MFA push notifications to the user''s phone. After enough prompts (sometimes hundreds), users accept one out of habit, exhaustion, or confusion. Documented Scattered Spider operations sent 100+ pushes over a single day to break victims. Detection requires MFA provider log access - Okta system logs, Azure AD sign-in logs, Duo logs. Mention here for kill-chain completeness because this is a critical modern Credential Access technique. Mitigations: number-matching MFA (user must type a number from the prompt), FIDO2 hardware tokens (no push to fatigue), behavioral analytics in the IDP that detects unusual MFA prompt frequency. SOC playbook: receive ''unusual MFA volume'' alert from IDP → contact user via known channel → investigate authentication source.'
