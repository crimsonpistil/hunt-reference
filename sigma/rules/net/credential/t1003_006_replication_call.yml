    analyst_notes: 'DsGetNCChanges (opnum 3) is the actual replication call - this is where password hashes are returned. The request includes the DN of the object to replicate (typically CN=krbtgt for Golden Ticket setup, or specific user/admin DNs). The response contains encrypted password hashes that the attacker decrypts using the session key. Detection: opnum 3 calls to DRSUAPI from non-DC sources. The signature is essentially proof of DCSync - it goes beyond binding the interface to actually requesting replication. Mimikatz, Impacket secretsdump, DSInternals all generate this traffic. Critical to alert on - DCSync is one of the highest-severity events in any AD environment. Combine with subsequent Kerberos activity from the same source (forged ticket use) for kill-chain through to T1558.001 Golden Ticket.'
