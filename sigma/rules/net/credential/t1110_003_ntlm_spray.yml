    analyst_notes: 'NTLM password spraying targets services that accept NTLM authentication: SMB (TCP/445), HTTP (TCP/80), HTTPS (TCP/443) for IIS apps, OWA, ADFS. Tools: CrackMapExec, MailSniper, custom scripts. The username field is visible in the NTLMSSP_AUTHENTICATE message even though the password hash is not - Zeek''s ntlm.log captures usernames. Pattern: 10+ distinct usernames from one source within 5 minutes against the same or different targets. Internal NTLM spraying (workstation to file servers) indicates lateral spray after initial compromise; external NTLM spraying (internet-facing OWA, ADFS) is initial access. Both are critical to catch. Modern advice: disable NTLM where possible (Kerberos-only environments). Where NTLM remains, this signature is high-confidence.'
