    analyst_notes: 'DRSUAPI (UUID e3514235-4b06-11d1-ab04-00c04fc2dcd2) is the Directory Replication Service Remote Protocol. Legitimate use: domain controllers replicating with each other. Adversary use: Mimikatz lsadump::dcsync, Impacket secretsdump.py, DSInternals, Get-ADReplAccount. The first sign of DCSync on the network is an RPC bind to the DRSUAPI interface from a non-DC source. Tight detection: $DOMAIN_CONTROLLERS allowlist excludes DC-to-DC replication; ANY other source binding to DRSUAPI is DCSync. Near-zero false positives. Pair with sid 9100602 (DsGetNCChanges call) for definitive proof - the bind is the activation, the subsequent opnum 3 call is the actual hash request. Particularly important to alert on regardless of source - even from another server, DCSync indicates compromise of a privileged account.'
