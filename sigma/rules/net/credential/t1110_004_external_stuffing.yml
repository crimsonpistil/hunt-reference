    analyst_notes: 'Credential stuffing tests username/password pairs from data breaches against your authentication endpoints. Differs from password spraying in that each attempt uses a different password (the leaked one for that user) - but the network pattern is similar: many distinct usernames from limited source IPs. Modern stuffing tools rotate IPs through residential proxy networks to evade rate limits - detection at the URI + username-count aggregation catches the pattern even when IP rotation hides single sources. Most relevant for internet-facing authentication: OWA/EWS/M365, ADFS, Okta, custom web apps, VPN portals (SSL VPN). Pair with: source IP reputation (residential proxy networks are high-suspicion), geographic anomalies (login attempts from countries the user has never been to), user-agent anomalies (automation framework UAs).'
