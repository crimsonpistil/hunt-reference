    analyst_notes: 'Silver Tickets are forged service tickets (TGS) encrypted with a service account''s NT hash. They bypass the KDC entirely - the attacker presents the forged TGS directly to the target service, which trusts it because it''s encrypted with its own key. Network signature: AP-REQ messages (msg-type 14) presenting a service ticket without any preceding TGS-REQ from the same client to the KDC. Even harder to detect than Golden Tickets because Silver Tickets don''t touch the KDC at all. Detection requires service-side log correlation (Event ID 4624 with anomalous ticket characteristics) or Zeek-based session tracking. Mitigation: rotate service account passwords regularly (Silver Tickets remain valid until the password changes), use group Managed Service Accounts (gMSA) which auto-rotate.'
