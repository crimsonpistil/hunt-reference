    analyst_notes: 'DNS tunneling encodes data into DNS queries - typically as base32/base64-encoded subdomains under an attacker-controlled parent domain. Each query exfils a small chunk; thousands of queries exfil a meaningful payload. Tools: dnscat2, iodine, DNSExfiltrator, custom. Pattern: many unique subdomains under one parent domain, queries longer than typical (50+ characters), high query rate from one source. Detection: aggregate unique subdomain count per (source, parent_domain) - legitimate DNS rarely exceeds 20-30 unique subdomains under one parent in a 10-minute window. Some legitimate services trigger false positives (CDNs, security products with DNS-based reputation lookups, email anti-spam services) - build allowlists for known-good parent domains. Zeek''s dns.log captures all of this beautifully; SIEM aggregation queries are the right detection layer. DNS tunneling is slow but extraordinarily stealthy - many environments don''t egress-monitor DNS at all, making it a preferred channel for high-stealth operations.'
