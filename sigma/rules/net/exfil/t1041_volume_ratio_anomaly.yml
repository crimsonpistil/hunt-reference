    analyst_notes: 'Normal HTTPS browsing has bytes-in HEAVILY exceeding bytes-out - you download web pages, images, video; you upload tiny request headers and the occasional form submission. Typical legitimate ratio is 1:10 to 1:100 (out:in). Exfiltration over HTTPS inverts this: you''re sending data to a server that''s just acknowledging receipt with small responses. Detection: outbound flows with bytes_out > 100MB AND bytes_out > 50× bytes_in over the session lifetime. Tunable threshold - adjust based on your environment''s normal upload patterns (cloud backup users, content creators, video uploaders all skew higher upload volumes legitimately). Pair with destination reputation: known-good destinations (Google Drive, Dropbox, OneDrive when sanctioned) are allowlist; ratios to unknown destinations are high-priority alerts. Zeek''s conn.log has orig_bytes and resp_bytes fields - aggregate across flows per source IP per destination IP per hour for clean ratio detection.'
