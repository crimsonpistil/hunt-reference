    analyst_notes: 'Outbound SMB to the internet is essentially always either malicious or misconfigured. Legitimate SMB traffic stays internal - even cloud storage providers (Azure Files, AWS FSx) typically front their SMB endpoints with VPN/private link, not raw internet exposure. Detection: any TCP/445 to non-internal destinations. Common scenarios: (1) NTLM hash capture by external attacker (file:// URL in phishing email triggers SMB connect to attacker server), (2) deliberate SMB-as-exfil (rare but used by some operators for data transfer to attacker SMB servers), (3) misconfigured app trying to connect to attacker-typo''d hostname. Modern best practice: BLOCK outbound SMB at the firewall - it''s near-zero false positive impact and shuts down a whole class of attacks. If you can''t block, this detection is essentially zero-false-positive in most environments. Pair with destination reputation: residential IPs, hosting providers, and recently-registered domains with SMB ports open are high-priority.'
