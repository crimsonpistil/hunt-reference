    analyst_notes: 'Discord webhooks have become one of the most common exfil channels for infostealer malware in 2024-2026. Why: (1) Discord is allowed in many corporate environments (gaming companies, community-focused businesses, marketing teams), (2) webhooks need no auth - just a URL - so they''re trivial to use in malware, (3) Discord''s TLS termination at discord.com or discordapp.com looks like normal user traffic. The /api/webhooks/{id}/{token} URI pattern is the giveaway - webhooks live at this path and POST requests carry the exfil payload. RedLine, Raccoon, Vidar, AsyncRAT, and dozens of other commodity malware families now default to Discord webhooks for exfil. Detection: any POST to discord.com/api/webhooks/. If your environment legitimately uses Discord (e.g., for community ops, dev integrations), allowlist specific webhook IDs you know about; everything else is high-priority. Same pattern applies to Slack incoming webhooks (hooks.slack.com/services/) and Telegram bot APIs (api.telegram.org/bot{token}). Pair with volume and source IP - exfil-via-webhook is increasingly seen on workstations where users have been phished into running stealer malware.'
