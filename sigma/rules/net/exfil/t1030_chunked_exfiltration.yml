    analyst_notes: 'Adversaries aware of bulk-volume detections deliberately chunk exfil: each session stays under a threshold (1MB-10MB), but they make 100+ sessions to the same destination. Net result: hundreds of MB or GB exfiltrated, but no individual flow trips a ''large transfer'' alert. Detection requires AGGREGATION: per (source, destination) tuple, count flows AND sum bytes across an hourly window. Alert when flow count exceeds 100 AND aggregate bytes exceed 500MB to a single destination - this is essentially diagnostic of chunked exfil. False positives: legitimate APIs that produce chatty traffic (cloud sync, certain SaaS apps) - build per-application baselines. Particularly relevant when destination is a known exfil-friendly service (combine with T1567 destination matching). The chunk-size sweet spot for adversaries is typically 1-5MB per chunk: small enough to avoid bulk-flow detection, large enough to exfil meaningful data without taking days. Detection threshold should match this range.'
