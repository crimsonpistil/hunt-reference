    analyst_notes: 'FTP for exfil is common in two scenarios: (1) opportunistic - adversary uses whatever''s available and outbound TCP/21 isn''t blocked, (2) deliberate - older malware (APT class going back years) used FTP because it was reliable across firewall configs. Modern environments should block outbound FTP entirely; if you can''t, this signature catches what gets through. Detection: FTP STOR commands (file upload) with significant bytes transferred. Zeek''s ftp.log captures command, filename, response code, and bytes. False positives: legitimate FTP to sanctioned partners (build $SANCTIONED_FTP allowlist), automated industry-specific FTP (still common in healthcare, finance for legacy data exchange). FTPS on port 990 is encrypted but produces same signature on the control channel. Pair with destination reputation and filename patterns - uploads with archive extensions are particularly suspicious.'
