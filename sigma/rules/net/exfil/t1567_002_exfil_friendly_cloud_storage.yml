    analyst_notes: 'Mega, Anonfiles (defunct as of 2023 but successors exist), Bunkr, Gofile, Filebin, Catbox, 1Fichier, file.io - these services share traits adversaries love: anonymous upload, large file size limits, no/minimal account requirements, often privacy-focused so they resist law enforcement. Mega in particular is heavily used in ransomware double-extortion (Conti, BlackCat, Scattered Spider all documented Mega exfil). Detection: outbound TLS with SNI matching this list. Treat any hit as high-priority - these services are essentially never legitimately used in business contexts. Some users might have personal accounts they shouldn''t be using on corp networks; even those cases are policy violations worth investigating. Pair with volume - even small uploads to Mega from a workstation are suspicious; large uploads are essentially confirmed exfil. Modern best practice: block these destinations at the proxy/firewall entirely. Detection becomes a ''verify the block is working'' activity.'
