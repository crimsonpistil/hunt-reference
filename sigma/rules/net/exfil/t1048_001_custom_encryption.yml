    analyst_notes: 'When adversaries don''t use standard TLS - to avoid TLS fingerprinting, JA3 detection, or because their malware is older - they often roll their own encryption: AES-CBC with hardcoded keys, RC4, XOR with a long key, or simple stream ciphers. The result on the wire is high-entropy traffic that LOOKS encrypted but isn''t using SSL/TLS. Detection: outbound flows with payload entropy >7.5 (close to maximum 8.0 for fully random data) on non-standard-encrypted ports. Zeek can compute this via custom scripts; commercial NDR platforms (Corelight, ExtraHop, Vectra) typically include this as a feature. False positives: compressed file transfers (gzip, lz4), already-encrypted archives being moved (T1560.001), some media streaming protocols with custom codecs. Combine with: destination reputation, process correlation if EDR is available, anomalous port usage. Particularly useful for catching APT-class custom malware C2/exfil channels that don''t show up on TLS-based detection.'
