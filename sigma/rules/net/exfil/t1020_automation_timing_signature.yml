    analyst_notes: 'Automated exfil produces highly-regular timing fingerprints: flow every 60 seconds with <5s standard deviation, flow every 5 minutes precisely, flow at exact :00 of each hour. Human users don''t produce this regularity - they have variable behavior. Tools: RITA (Real Intelligence Threat Analytics) is the canonical open-source beacon detection tool, working from Zeek conn.log. Commercial NDR platforms (Corelight, ExtraHop, Vectra) include beacon detection by default. Pattern: 20+ flows from one source to one destination within an hour, with very low standard deviation in inter-arrival times. Often detected as part of C2 beacon detection (TA0011) but also applies to scheduled exfil - automated exfil tools often run on cron-like timers that produce this signature. False positives: legitimate scheduled tasks (Windows Update checks, NTP syncing, monitoring agents calling home) - build per-application baselines. After exclusions, the signature is high-confidence. Particularly important to detect because automation-driven exfil can persist for weeks before discovery if no detection layer monitors timing patterns.'
