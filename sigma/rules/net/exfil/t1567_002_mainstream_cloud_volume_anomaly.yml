    analyst_notes: 'Dropbox, OneDrive, Google Drive are legitimate services your users probably DO use. Detection isn''t about the destination - it''s about VOLUME and asymmetry. A legitimate Dropbox user might upload 100MB occasionally; an exfil operation pushes 1GB+ in a session. Build per-user or per-source-IP baselines if possible: outliers exceeding 95th percentile of normal upload volume are worth investigating. False positives: legitimate large uploads (videos, design assets, dataset uploads for ML, backup activities) - these should be predictable per-user. Cloud-side detection is more precise (Microsoft 365 audit logs, Google Workspace audit logs, Dropbox business audit logs) and SHOULD be your primary detection layer for these services - but network-side catches the egress side and provides correlation. Modern best practice: enforce sanctioned cloud storage via DLP/CASB; restrict personal accounts via tenant-restriction headers in proxies.'
