    analyst_notes: 'Many C2 frameworks (Cobalt Strike, Sliver, Mythic, Brute Ratel) chunk exfil data into POST requests with bodies in the 1-5MB range to avoid triggering single-large-flow detections. The pattern: 50+ POST requests to the same destination within 10 minutes, each with bodies >1MB. This is rarely legitimate behavior - even file uploads to legitimate services (Google Drive, Dropbox) typically use multipart upload protocols that produce different patterns. Detection at the POST count + body size aggregate is high-confidence. Pair with destination IP reputation and TLS certificate/SNI patterns from C2 detection (TA0011) - exfil over already-classified C2 destinations is essentially confirmed exfil. For TLS-decrypted environments, the body content itself can reveal archive headers (PK for ZIP, Rar! for RAR) - high-fidelity content match.'
