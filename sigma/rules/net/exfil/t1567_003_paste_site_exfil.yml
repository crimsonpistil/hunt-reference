    analyst_notes: 'Paste sites and temporary file shares (transfer.sh - files auto-delete, Pastebin - text up to 512KB, ix.io - command-line-friendly) appeal to adversaries because: (1) anonymous, (2) often allow large content, (3) frequently bypass corporate DLP that focuses on cloud storage. Some are deliberate command-line-friendly (curl-based usage), making them well-suited to scripted exfil. Detection: outbound TLS to these specific destinations. Hits are high-priority - these services are rarely legitimately used in business contexts. Modern best practice: block these destinations at the proxy. False positives: developers occasionally use Pastebin or transfer.sh for legitimate sharing (tune by user role); some IRC/forum communities reference paste sites. Pair with volume - even small uploads (text-only paste of credentials, config files) are concerning. Encrypted pastes (PrivateBin) are particularly suspicious because they actively prevent inspection.'
