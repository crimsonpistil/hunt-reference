    analyst_notes: 'Cloud priv-esc is usually not an exploit - it''s IAM being used as designed by someone who shouldn''t. Known escalation primitives to hunt: attaching AdministratorAccess or a wildcard policy to a controlled principal; CreatePolicyVersion + SetDefaultPolicyVersion to quietly widen an existing policy; iam:PassRole combined with a service (Lambda/EC2/Glue) to run code as a more privileged role; AddUserToGroup into an admin group. Azure: role assignment changes granting Owner/Contributor/User Access Administrator; adding to privileged Entra roles (Global Administrator, Privileged Role Administrator). Detection: alert on policy/role mutations whose RESULT is broad privilege, weight higher when actor == target (self-escalation) or actor was flagged upstream. FALSE POSITIVES: IAM/platform teams doing legitimate grants, IaC applying policy - all of which should come from $CI_PRINCIPALS or known admin principals with change records. The dangerous chain: compromised low-priv identity -> PassRole/policy attach -> now admin -> data access. Detecting the middle step is the intervention point.'
