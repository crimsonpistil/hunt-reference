    analyst_notes: 'The apex cloud-persistence move. If an attacker can add a federated identity provider or alter a role trust policy, they can mint valid tokens for ANY identity without touching a password again - the cloud version of a Golden SAML / Golden Ticket. AWS: CreateSAMLProvider, UpdateAssumeRolePolicy widening a role to trust an external account or ''*''. Azure/Entra: adding a federated domain, changing domain authentication to federated, or altering token-signing configuration (the AADInternals-style attack APT29 used in SolarWinds follow-on activity). These events are RARE in a stable tenant, which makes them excellent detections: alert on essentially every occurrence and verify against a change ticket. FALSE POSITIVES: genuine SSO onboarding, M&A tenant work, planned IdP migration - all of which should have change records. There is almost no benign high-frequency source for these events; treat unexplained ones as priority-1.'
