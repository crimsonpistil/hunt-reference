    analyst_notes: 'Programmatic access keys (AKIA...) are the cloud equivalent of a reusable password and are the most commonly leaked cloud secret (git commits, CI logs, public S3, laptop theft). A key that has only ever been used from your CI runners or corporate egress suddenly calling from a VPS provider (DigitalOcean, OVH, Hetzner, a residential-proxy ASN) is high-signal. Detection: baseline each access_key_id to its historical set of source ASNs / IPs, alert on first-seen. FALSE POSITIVES: legitimately new CI regions, a developer traveling, a new SaaS integration using the key. Build $CI_PRINCIPALS and known-integration allowlists. The strongest chain is new-ASN key use FOLLOWED BY discovery calls (GetCallerIdentity, ListBuckets, ListUsers) - stolen-key operators orient themselves immediately. AWS best practice this feeds: prefer short-lived role credentials over long-lived keys; this hunt also inventories which keys are still long-lived.'
