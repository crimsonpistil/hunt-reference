    analyst_notes: 'A durable persistence primitive: an attacker who compromises one identity mints a second access key so they keep access even if the first credential is rotated. High-signal variants: (1) actor principal differs from the user the key is created ON - lateral credential planting; (2) key created on a $CLOUD_ADMINS member; (3) key created immediately after a suspicious login. Azure/Entra equivalents: addKey / addPassword to a service principal or application (watch Add service principal credentials in the audit log) - a heavily abused APT29 technique for tenant persistence. FALSE POSITIVES: legitimate key rotation (usually paired with a DeleteAccessKey shortly after and performed by the user themselves or IAM automation), onboarding. Build $CI_PRINCIPALS and rotation-automation allowlists. Chain to watch: CreateAccessKey -> the new key used from a new ASN within minutes.'
