    analyst_notes: 'Attackers love accounts nobody watches: former employees not fully deprovisioned, service accounts for a retired project, break-glass accounts. A principal silent for 90+ days that logs in and starts doing things is worth a look, especially if it skips normal onboarding patterns (no prior MFA registration event, first action is high-value). Detection: maintain per-principal last-seen; alert on reactivation past a threshold gap. FALSE POSITIVES: seasonal/contractor accounts, quarterly audit logins, DR test accounts, $BREAKGLASS during a real incident (correlate with change tickets). This hunt doubles as hygiene: the dormant-account inventory it produces is exactly what IAM should be deprovisioning.'
