    analyst_notes: 'Stolen-credential operators don''t know the environment, so their first move is to orient: who am I (GetCallerIdentity), what can I touch (ListBuckets, ListUsers, ListRoles, DescribeInstances, GetAccountAuthorizationDetails). The tell is VARIETY and RATE - dozens of distinct read-only actions from one principal in minutes, often ones that principal has never called before. Detection: per-principal distinct read-only action count in a sliding window; weight higher if the principal was flagged by any T1078.004 hunt. FALSE POSITIVES: cloud security posture tools (Prowler, ScoutSuite, Wiz, Steampipe), infra-as-code plan/refresh (Terraform), backup and inventory jobs - these enumerate broadly by design. Build $CI_PRINCIPALS and scanner-identity allowlists; those are exactly the identities that legitimately enumerate. After exclusions, an interactive human principal enumerating broadly is a strong lead. GetAccountAuthorizationDetails specifically (dumps the entire IAM graph) is a favorite of attackers mapping privilege-escalation paths - alert on it outside known posture tooling.'
