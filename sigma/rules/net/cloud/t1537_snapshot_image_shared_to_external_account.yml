    analyst_notes: 'The stealthiest cloud exfil: the attacker never downloads anything through your egress, so network monitoring sees nothing. Instead they snapshot a volume/database and SHARE the snapshot with an AWS account they control, or replicate a bucket cross-account, then read it from their side. Detection is entirely control-plane: ModifySnapshotAttribute / ModifyImageAttribute adding an external account ID or ''all'' (public); CreateDBSnapshot followed by a share; PutBucketPolicy / PutBucketAcl opening a bucket to an external principal or public; S3 replication configured to an external-account bucket. Maintain your org''s known account-ID list; alert on any share to an ID outside it and on any public grant. FALSE POSITIVES: legitimate cross-account sharing within your org, sanctioned data-partner accounts (allowlist them), public buckets that are public by design (static sites - inventory these so the alert is meaningful). This is a top hunt for cloud data-theft precisely because it defeats network-centric detection - it belongs in every cloud hunt program.'
